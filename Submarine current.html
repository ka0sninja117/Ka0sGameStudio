                        ctx.moveTo(ringRadius * Math.cos(angleRad), ringRadius * Math.sin(angleRad));
                        ctx.lineTo((ringRadius + tickLength) * Math.cos(angleRad), (ringRadius + tickLength) * Math.sin(angleRad));
                        ctx.stroke();
                    }
                }

                ctx.restore();
            }

            /**
             * Draws the submarine's visual elements.
             * @param {number} currentDrawingZoomFactor - Current zoom for line widths.
             * @param {number} fadeFactor - Current depth fade factor.
             */
            function drawSubmarineVisuals(currentDrawingZoomFactor, fadeFactor) {
                ctx.save();
                ctx.translate(submarine.worldX, submarine.worldY); // Move to submarine's world position
                ctx.rotate(degreesToRadians(submarine.heading)); // Rotate around its center

                // Calculate compass radius in world units
                const compassRadiusWorldUnits = COMPASS_VISUAL_RADIUS_PX / currentDrawingZoomFactor;

                // Interpolate submarine color based on depth
                const depthFactor = submarine.depth / MAX_DEPTH;
                const currentSubmarineColor = interpolateColor(SUBMARINE_COLOR_BASE, SUBMARINE_COLOR_DEEP, depthFactor);
                ctx.fillStyle = currentSubmarineColor;

                // --- Draw the single unified wing (renders first, "under" the body) ---
                // Changed from '#87ceeb' to currentSubmarineColor
                ctx.fillStyle = currentSubmarineColor;
                const WING_TOTAL_SPAN = SUBMARINE_WIDTH + (2 * 6); // Wing extends 6 units beyond body on each side
                const WING_X_START = -WING_TOTAL_SPAN / 2;
                const WING_Y_START = SUBMARINE_WING_OFFSET; // Top edge of the wing
                const WING_HEIGHT = SUBMARINE_WING_HEIGHT; // Height of the wing
                ctx.beginPath();
                ctx.rect(WING_X_START, WING_Y_START, WING_TOTAL_SPAN, WING_HEIGHT);
                ctx.fill();

                // Draw main oval body
                ctx.beginPath();
                ctx.ellipse(0, 0, SUBMARINE_WIDTH / 2, SUBMARINE_HEIGHT / 2, 0, 0, Math.PI * 2);
                ctx.fill();

                // Draw a small oval for the sail (cockpit)
                ctx.beginPath();
                ctx.ellipse(0, COCKPIT_OFFSET_Y, COCKPIT_RADIUS_X, COCKPIT_RADIUS_Y, 0, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff'; // White
                ctx.fill();

                // Draw Periscope Indicator (small black circle)
                if (submarine.periscopeAlpha > 0) { // Only draw if visible
                    ctx.beginPath();
                    ctx.arc(0, COCKPIT_OFFSET_Y, COCKPIT_RADIUS_X / 2, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0, 0, 0, ${submarine.periscopeAlpha})`; // Black with dynamic alpha
                    ctx.fill();
                }

                // Draw Propeller
                ctx.save();
                ctx.translate(0, PROPELLER_OFFSET_Y); // Move to propeller's position (at the rear)
                ctx.rotate(submarine.propellerRotationAngle); // Apply propeller rotation

                ctx.fillStyle = currentSubmarineColor; // Same color as submarine body
                ctx.lineWidth = 1 / currentDrawingZoomFactor; // Thin outline
                ctx.strokeStyle = `rgba(0, 0, 0, ${1 - fadeFactor * 0.5})`; // Darker outline for contrast

                // Draw a central circle for the hub (halved radius)
                ctx.beginPath();
                ctx.arc(0, 0, PROPELLER_WIDTH / 4, 0, Math.PI * 2); // PROPELLER_WIDTH / 4 = 1.5
                ctx.fill();
                ctx.stroke();

                // Draw blades (adjusted dimensions for 50% size)
                for (let i = 0; i < PROPELLER_BLADE_COUNT; i++) {
                    const angle = (i * (2 * Math.PI / PROPELLER_BLADE_COUNT));
                    ctx.beginPath();
                    ctx.ellipse(
                        (PROPELLER_WIDTH / 2) * Math.cos(angle), // PROPELLER_WIDTH / 2 = 3
                        (PROPELLER_WIDTH / 2) * Math.sin(angle), // PROPELLER_WIDTH / 2 = 3
                        PROPELLER_WIDTH / 2.5, // Blade length = 2.4
                        PROPELLER_HEIGHT / 6,  // Blade width = 1
                        angle, // Rotate each blade
                        0, Math.PI * 2
                    );
                    ctx.fill();
                    ctx.stroke();
                }

                ctx.restore(); // Restore propeller's transform

                // Draw White Highlight (Opacity based on depth)
                const MIN_HIGHLIGHT_OPACITY = 0.1;
                const MAX_HIGHLIGHT_OPACITY = 0.9;
                const highlightOpacity = MIN_HIGHLIGHT_OPACITY +
                                         (MAX_HIGHLIGHT_OPACITY - MIN_HIGHLIGHT_OPACITY) * (submarine.depth / MAX_DEPTH);
                ctx.strokeStyle = `rgba(255, 255, 255, ${highlightOpacity})`;
                ctx.lineWidth = 3 / currentDrawingZoomFactor;
                ctx.beginPath();
                ctx.ellipse(0, 0, SUBMARINE_WIDTH / 2, SUBMARINE_HEIGHT / 2, 0, 0, Math.PI * 2);
                ctx.stroke();

                // --- Draw lime green forward direction line (extends to compass ring) ---
                ctx.strokeStyle = '#32CD32'; // Lime green
                ctx.lineWidth = 2 / currentDrawingZoomFactor; // Use the requested thickness
                ctx.beginPath();
                // Line starts from the front of the submarine (local 0, -SUBMARINE_HEIGHT / 2)
                // and extends to the compass radius in the forward direction (local 0, -compassRadiusWorldUnits)
                ctx.moveTo(0, -SUBMARINE_HEIGHT / 2);
                ctx.lineTo(0, -compassRadiusWorldUnits); // Extend to the compass ring
                ctx.stroke();

                // --- Draw thin red line to targeted enemy if exists and visible ---
                if (submarine.targetedMasterId !== null) {
                    const targetedShip = patrolShips.find(ship => ship.assignedMasterId === submarine.targetedMasterId);
                    if (targetedShip && isShipActivelyRevealed(targetedShip, submarine, islands, patrolShips)) {
                        const targetDx = targetedShip.worldX - submarine.worldX;
                        const targetDy = targetedShip.worldY - submarine.worldY;
                        const angleToTarget_WorldRad = Math.atan2(targetDy, targetDx); // Angle from world +X (East)
                        
                        // Angle in the submarine's current rotated drawing context
                        // (0 is context +X, -PI/2 is context -Y which is sub's forward)
                        const angleInRotatedCtx = angleToTarget_WorldRad - degreesToRadians(submarine.heading);

                        const targetLineEndX = compassRadiusWorldUnits * Math.cos(angleInRotatedCtx);
                        const targetLineEndY = compassRadiusWorldUnits * Math.sin(angleInRotatedCtx);

                        ctx.strokeStyle = '#FF0000'; // Bright bold red
                        ctx.lineWidth = 2 / currentDrawingZoomFactor; // Match green line thickness
                        ctx.beginPath();
                        ctx.moveTo(0, 0); // Start from submarine's center
                        ctx.lineTo(targetLineEndX, targetLineEndY); // Extend to compass radius in target direction
                        ctx.stroke();
                    }
                }

                ctx.restore(); // Restore submarine's rotation and translation
            }

            /**
             * Draws a torpedo on the canvas.
             * @param {object} torpedo - The torpedo object.
             * @param {number} zoomFactor - The current zoom factor for the canvas.
             */
            function drawTorpedo(torpedo, zoomFactor) {
                ctx.save();
                ctx.translate(torpedo.worldX, torpedo.worldY);
                ctx.rotate(degreesToRadians(torpedo.heading)); // Rotate torpedo to its heading

                // Set color based on torpedo type
                ctx.fillStyle = (torpedo.type === 'enemy-torpedo') ? 'blue' : 'gold'; // Blue for enemy, gold for player
                ctx.beginPath();
                ctx.ellipse(0, 0, 4, 10, 0, 0, Math.PI * 2); // Simple torpedo shape (oval)
                ctx.fill();

                ctx.restore();
            }

            /**
             * Draws all active torpedoes on the canvas.
             * @param {number} zoomFactor - The current zoom factor for the canvas.
             */
            function drawTorpedoes(zoomFactor) {
                for (const torpedo of torpedoes) {
                    drawTorpedo(torpedo, zoomFactor);
                }
            }

            /**
             * Draws a missile on the canvas.
             * @param {object} missile - The missile object.
             * @param {number} zoomFactor - The current zoom factor for the canvas.
             */
            function drawMissile(missile, zoomFactor) {
                ctx.save();
                ctx.translate(missile.worldX, missile.worldY);
                ctx.rotate(degreesToRadians(missile.heading)); // Rotate to missile's heading

                // Draw the main missile body (circle)
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(0, 0, missile.currentRadius, 0, Math.PI * 2);
                ctx.fill();

                // Draw the rectangle tail if it has extended
                if (missile.hasExtendedTail) {
                    ctx.fillStyle = 'white'; // White tail
                    // Tail is drawn *behind* the circle (along positive local Y, since missile's "forward" is -Y)
                    // The missile circle itself is at (0,0) in its local space. The tail should extend from the back of it.
                    // If missile is pointing up (-Y), its rear is at +Y. So, draw tail starting at +radius.
                    ctx.fillRect(-MISSILE_TAIL_WIDTH / 2, missile.currentRadius, MISSILE_TAIL_WIDTH, MISSILE_TAIL_LENGTH);
                }
                ctx.restore();
            }

            /**
             * Draws all active missiles on the canvas.
             * @param {number} zoomFactor - The current zoom factor for the canvas.
             */
            function drawMissiles(zoomFactor) {
                for (const missile of missiles) {
                    drawMissile(missile, zoomFactor);
                }
            }

            /**
             * Draws an explosion on the canvas.
             * @param {object} explosion - The explosion object.
             * @param {number} zoomFactor - The current zoom factor for the canvas.
             */
            function drawExplosion(explosion, zoomFactor) {
                const elapsedTime = performance.now() - explosion.startTime;
                const progress = elapsedTime / explosion.duration;

                if (progress < 1) {
                    ctx.save();
                    ctx.translate(explosion.x, explosion.y);

                    const currentRadius = EXPLOSION_MAX_RADIUS * progress;
                    const alpha = 1 - progress; // Fades out

                    ctx.strokeStyle = `rgba(255, 165, 0, ${alpha})`; // Orange fading out
                    ctx.fillStyle = `rgba(255, 140, 0, ${alpha * 0.5})`; // Darker orange, more transparent
                    ctx.lineWidth = 3 / zoomFactor;

                    ctx.beginPath();
                    ctx.arc(0, 0, currentRadius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();

                    ctx.restore();
                }
            }

            /**
             * Draws all active explosions on the canvas.
             * @param {number} zoomFactor - The current zoom factor for the canvas.
             */
            function drawExplosions(zoomFactor) {
                for (const explosion of explosions) {
                    drawExplosion(explosion, zoomFactor);
                }
            }

            /**
             * Draws a 5-point star.
             * @param {CanvasRenderingContext2D} ctx - The rendering context.
             * @param {number} cx - Center X coordinate.
             * @param {number} cy - Center Y coordinate.
             * @param {number} outerRadius - Radius to outer points.
             * @param {number} innerRadius - Radius to inner points.
             */
            function drawStar(ctx, cx, cy, outerRadius, innerRadius) {
                let rot = Math.PI / 2 * 3;
                let x = cx;
                let y = cy;
                let step = Math.PI / 5; // Angle between points for 5-point star

                ctx.beginPath();
                ctx.moveTo(cx, cy - outerRadius); // Start at top point
                for (let i = 0; i < 5; i++) {
                    x = cx + Math.cos(rot) * outerRadius;
                    y = cy + Math.sin(rot) * outerRadius;
                    ctx.lineTo(x, y);
                    rot += step;

                    x = cx + Math.cos(rot) * innerRadius;
                    y = cy + Math.sin(rot) * innerRadius;
                    ctx.lineTo(x, y);
                    rot += step;
                }
                ctx.closePath();
            }

            /**
             * Draws an enemy headquarters.
             * @param {number} hqX - X coordinate of the HQ center.
             * @param {number} hqY - Y coordinate of the HQ center.
             * @param {number} hqWidth - Width of the HQ rectangle.
             * @param {number} hqHeight - Height of the HQ rectangle.
             * @param {number} zoomFactor - Current zoom for line widths.
             */
            function drawHeadquarters(hqX, hqY, hqWidth, hqHeight, zoomFactor) {
                ctx.save();
                ctx.translate(hqX, hqY);

                // Draw the black rectangle
                ctx.fillStyle = HQ_FILL_COLOR;
                ctx.fillRect(-hqWidth / 2, -hqHeight / 2, hqWidth, hqHeight);

                // Draw the dark green border
                ctx.strokeStyle = HQ_BORDER_COLOR;
                ctx.lineWidth = 2 / zoomFactor; // Adjust border thickness with zoom
                ctx.strokeRect(-hqWidth / 2, -hqHeight / 2, hqWidth, hqHeight);

                // Draw the red star in the center
                ctx.fillStyle = STAR_COLOR;
                const starOuterRadius = Math.min(hqWidth, hqHeight) / 2.5; // Scale star to fit
                const starInnerRadius = starOuterRadius / 2;
                drawStar(ctx, 0, 0, starOuterRadius, starInnerRadius);
                ctx.fill();

                ctx.restore();
            }

            /**
             * Draws the orange triangle lock-on indicator for patrol ships.
             * @param {object} ship - The patrol ship object.
             * @param {number} zoomFactor - The current zoom factor for the canvas.
             */
            function drawLockOnIndicator(ship, zoomFactor) {
                if (!ship.isDetectingPlayer || ship.lockOnProgress === 0) return;

                ctx.save();
                ctx.translate(ship.worldX, ship.worldY);
                // Rotate to match the ship's current heading (which is fireBearing during lock-on)
                ctx.rotate(degreesToRadians(ship.heading)); // Now using ship.heading directly which is set to fireBearing

                // Triangle dimensions
                const triangleSize = 30;
                const halfSize = triangleSize / 2;

                // Line width increases from 1 to 5 pixels
                const lineWidth = (1 + ship.lockOnProgress * 4) / zoomFactor;
                ctx.lineWidth = lineWidth;
                ctx.strokeStyle = 'orange';

                ctx.beginPath();
                ctx.moveTo(0, -halfSize);       // Top point (aligned with local -Y, which is the ship's forward)
                ctx.lineTo(-halfSize, halfSize); // Bottom-left
                ctx.lineTo(halfSize, halfSize);  // Bottom-right
                ctx.closePath();
                ctx.stroke();

                ctx.restore();
            }


            /**
             * The main game drawing function.
             */
            function draw() {
                // Determine if we are in a "surface perspective" view (either actually surfaced or periscope deployed)
                const isAtSurface = submarine.depth <= FADE_START_DEPTH;
                const isDepthValidForPeriscope = submarine.depth >= MIN_PERISCOPE_DEPTH && submarine.depth <= MAX_PERISCOPE_DEPTH;
                const isSpeedValidForPeriscope = Math.abs(submarine.speed) < MAX_PERISCOPE_SPEED;
                const isPeriscopeActive = submarine.periscopeDeployed && !submarine.isPeriscopeAnimating && isDepthValidForPeriscope && isSpeedValidForPeriscope;

                let currentDrawingZoomFactor = submarine.currentViewZoomFactor; // Default zoom for normal view

                // Step 1: Set up the main camera transform
                ctx.save();
                if (submarine.isMapModeActive) {
                    currentDrawingZoomFactor = Math.min(canvas.width / WORLD_WIDTH, canvas.height / WORLD_HEIGHT);
                    const mapTranslateX = (canvas.width - WORLD_WIDTH * currentDrawingZoomFactor) / 2;
                    const mapTranslateY = (canvas.height - WORLD_HEIGHT * currentDrawingZoomFactor) / 2;
                    ctx.translate(mapTranslateX, mapTranslateY);
                    ctx.scale(currentDrawingZoomFactor, currentDrawingZoomFactor);
                } else {
                    ctx.translate(canvas.width / 2, canvas.height / 2);
                    ctx.scale(currentDrawingZoomFactor, currentDrawingZoomFactor);
                    ctx.translate(-submarine.worldX, -submarine.worldY);
                }

                // *** START BACKGROUND AND SUBMERGED LAYERS (ALWAYS DRAWN) ***
                // Fill entire canvas with submerged ocean color
                let fadeFactor = 0;
                if (FADE_END_DEPTH - FADE_START_DEPTH !== 0) { // Avoid division by zero
                     fadeFactor = (submarine.depth - FADE_START_DEPTH) / (FADE_END_DEPTH - FADE_START_DEPTH);
                }
                
                fadeFactor = Math.max(0, Math.min(1, fadeFactor));
                const submergedOceanColor = interpolateColor(OCEAN_COLOR_BASE, OCEAN_COLOR_OBSCURED, fadeFactor);
                
                // Calculate the visible world area coordinates
                const visibleWorldLeft = submarine.worldX - (canvas.width / 2 / currentDrawingZoomFactor);
                const visibleWorldTop = submarine.worldY - (canvas.height / 2 / currentDrawingZoomFactor);
                const visibleWorldWidth = canvas.width / currentDrawingZoomFactor;
                const visibleWorldHeight = canvas.height / currentDrawingZoomFactor;

                ctx.fillStyle = submergedOceanColor;
                ctx.fillRect(visibleWorldLeft, visibleWorldTop, visibleWorldWidth, visibleWorldHeight);

                // Draw islands with depth fading (for submerged view)
                for (const island of islands) {
                    let islandColor = interpolateColor(ISLAND_COLOR_BASE, OCEAN_COLOR_OBSCURED, fadeFactor); // Default: faded by depth
                    // If at surface AND not in map mode, and this island is visible, draw full color
                    if (isAtSurface && !submarine.isMapModeActive) {
                        islandColor = `rgb(${ISLAND_COLOR_BASE[0]}, ${ISLAND_COLOR_BASE[1]}, ${ISLAND_COLOR_BASE[2]})`;
                    }
                    ctx.fillStyle = islandColor;
                    ctx.beginPath();
                    for (let j = 0; j < island.points.length; j++) {
                        const p = island.points[j];
                        if (j === 0) ctx.moveTo(p.x, p.y);
                        else ctx.lineTo(p.x, p.y);
                    }
                    ctx.closePath();
                    ctx.fill();

                    // Draw Headquarters on islands that have them
                    if (island.hasHeadquarters) {
                        const islandCentroid = getPolygonCentroid(island.points);
                        drawHeadquarters(islandCentroid.x, islandCentroid.y, HQ_WIDTH, HQ_HEIGHT, currentDrawingZoomFactor);
                    }
                }

                // Draw patrol ships in the main view. Their visibility depends on several factors.
                for (const ship of patrolShips) {
                    let shipAlpha = 0; // Default to not visible
                    const currentTime = performance.now();

                    // If revealed by a temporary sonar ping (when submerged)
                    if (ship.isRevealedBySonar && currentTime < ship.revealedSonarEndTime) {
                        shipAlpha = 1;
                    }

                    // If at surface and in direct line of sight (visual detection)
                    // This is independent of sonar ping status.
                    const dx = ship.worldX - submarine.worldX;
                    const dy = ship.worldY - submarine.worldY;
                    const distToShip = Math.sqrt(dx * dx + dy * dy);

                    if (isAtSurface && !submarine.isMapModeActive && // Check if sub is at surface and not in map mode
                        distToShip <= SURFACE_DETECTION_RANGE && isShipInCurrentView(ship)) {
                        if (!isLineOfSightBlocked(submarine.worldX, submarine.worldY, ship.worldX, ship.worldY, ship, islands, patrolShips, true)) {
                            shipAlpha = 1; // If visible by surface LoS, make it fully opaque
                        }
                    }

                    // If in map mode, all ships that have been 'detected' are visible on map
                    if (submarine.isMapModeActive && ship.isDetected) {
                        shipAlpha = 1;
                    }

                    // Periscope visibility is handled by the clipped pass below, so don't include it here for global drawing.

                    drawPatrolShip(ship, currentDrawingZoomFactor, shipAlpha);
                    drawLockOnIndicator(ship, currentDrawingZoomFactor); // Draw lock-on indicator if applicable
                }

                // *** END BACKGROUND AND SUBMERGED LAYERS ***


                // *** START PERISCOPE VIEW (CLIPPED) ***
                if (isPeriscopeActive && !submarine.isMapModeActive) { // Only for normal view
                    ctx.save(); // Save context before clipping

                    // Define the periscope FOV wedge
                    const subHeadingRad = degreesToRadians(submarine.heading);
                    const periscopeWorldPointX = submarine.worldX - COCKPIT_OFFSET_Y * Math.sin(subHeadingRad);
                    const periscopeWorldPointY = submarine.worldY + COCKPIT_OFFSET_Y * Math.cos(subHeadingRad);

                    const dxWorld = submarine.worldMouseX - periscopeWorldPointX;
                    const dyWorld = submarine.worldMouseY - periscopeWorldPointY;

                    const periscopeToMouseWorldAngle = Math.atan2(dyWorld, dxWorld);

                    const fovAngleRad = degreesToRadians(PERISCOPE_FOV_ANGLE_DEG);

                    const fovStartAngle = periscopeToMouseWorldAngle - fovAngleRad;
                    const fovEndAngle = periscopeToMouseWorldAngle + fovAngleRad;

                    // Normalize angles for arc drawing
                    const normalizedFovStart = normalizeAngle(fovStartAngle);
                    const normalizedFovEnd = normalizeAngle(fovEndAngle);

                    ctx.beginPath();
                    // Start from the periscope's world position
                    ctx.moveTo(periscopeWorldPointX, periscopeWorldPointY);
                    // Line to the end of the first FOV ray
                    ctx.lineTo(periscopeWorldPointX + PERISCOPE_SURFACE_VIEW_RANGE * Math.cos(normalizedFovStart),
                               periscopeWorldPointY + PERISCOPE_SURFACE_VIEW_RANGE * Math.sin(normalizedFovStart));
                    
                    // Arc along the view range to the end of the second FOV ray
                    // The 'false' parameter makes it draw clockwise, which is consistent with our angle system from left to right in the FOV.
                    ctx.arc(periscopeWorldPointX, periscopeWorldPointY, PERISCOPE_SURFACE_VIEW_RANGE,
                            normalizedFovStart, normalizedFovEnd, false); 
                    
                    // Line back to the periscope's world position
                    ctx.lineTo(periscopeWorldPointX, periscopeWorldPointY);
                    ctx.closePath();
                    ctx.clip(); // Apply the clip path

                    // Inside the clipped area, draw the "surface" view
                    // Fill with bright ocean color
                    ctx.fillStyle = `rgb(${OCEAN_COLOR_BASE[0]}, ${OCEAN_COLOR_BASE[1]}, ${OCEAN_COLOR_BASE[2]})`;
                    ctx.fillRect(visibleWorldLeft, visibleWorldTop, visibleWorldWidth, visibleWorldHeight);

                    // Redraw islands with full color (no fading)
                    for (const island of islands) {
                        ctx.fillStyle = `rgb(${ISLAND_COLOR_BASE[0]}, ${ISLAND_COLOR_BASE[1]}, ${ISLAND_COLOR_BASE[2]})`;
                        ctx.beginPath();
                        for (let j = 0; j < island.points.length; j++) {
                            const p = island.points[j];
                            if (j === 0) ctx.moveTo(p.x, p.y);
                            else ctx.lineTo(p.x, p.y);
                        }
                        ctx.closePath();
                        ctx.fill();

                        // Draw Headquarters on islands that have them (full color)
                        if (island.hasHeadquarters) {
                            const islandCentroid = getPolygonCentroid(island.points);
                            drawHeadquarters(islandCentroid.x, islandCentroid.y, HQ_WIDTH, HQ_HEIGHT, currentDrawingZoomFactor);
                        }
                    }

                    // Redraw patrol ships that are "periscope visible" within the FOV
                    // They should appear opaque in this view
                    for (const ship of patrolShips) {
                        // Check if the ship is actually within the periscope's line of sight and FOV
                        const distToShipCenter = Math.sqrt(
                            (ship.worldX - periscopeWorldPointX)**2 +
                            (ship.worldY - periscopeWorldPointY)**2
                        );
                        if (distToShipCenter <= PERISCOPE_SURFACE_VIEW_RANGE) {
                            const angleToShip = Math.atan2(
                                ship.worldY - periscopeWorldPointY,
                                ship.worldX - periscopeWorldPointX
                            );
                            if (isAngleBetween(angleToShip, fovStartAngle, fovEndAngle)) { // Use non-normalized angles here for comparison
                                if (!isLineOfSightBlocked(periscopeWorldPointX, periscopeWorldPointY, ship.worldX, ship.worldY, ship, islands, patrolShips, true)) {
                                    drawPatrolShip(ship, currentDrawingZoomFactor, 1); // Draw at full alpha
                                    drawLockOnIndicator(ship, currentDrawingZoomFactor); // Draw lock-on indicator if applicable
                                }
                            }
                        }
                    }

                    ctx.restore(); // Restore context to remove the clip
                }
                // *** END PERISCOPE VIEW ***


                // *** START OVERLAY LAYERS (ALWAYS DRAWN) ***
                // These elements should be drawn on top of both submerged and periscope views.
                drawRevealedAreas(currentDrawingZoomFactor);
                ctx.save();
                ctx.globalAlpha = 0.5;
                drawGrid(currentDrawingZoomFactor);
                ctx.restore();
                drawSonarPings(currentDrawingZoomFactor);
                drawSubmarineVisuals(currentDrawingZoomFactor, fadeFactor); // Submarine is always drawn, its visual alpha changes with depth
                if (isPeriscopeActive) {
                    drawPeriscopeLines(currentDrawingZoomFactor); // Periscope lines are drawn on top
                }
                drawTorpedoes(currentDrawingZoomFactor); // Draw torpedoes over everything
                drawMissiles(currentDrawingZoomFactor); // NEW: Draw missiles over everything
                drawExplosions(currentDrawingZoomFactor); // Draw explosions over everything
                if (showHitboxes) drawHitboxes(currentDrawingZoomFactor); // Hitboxes on top for debug

                // NEW: Draw mouse targeter and confirmed target
                drawMouseTargeterAndConfirmedTarget(currentDrawingZoomFactor);

                ctx.restore(); // Restore main camera transform

                // Draw static compass circle (always at center of canvas, outside world transform)
                drawCompass();
            }

            /**
             * Draws the mouse targeter and the confirmed missile target box.
             * @param {number} currentDrawingZoomFactor - Current zoom for line widths.
             */
            function drawMouseTargeterAndConfirmedTarget(currentDrawingZoomFactor) {
                const TARGET_BOX_SIZE = 15;
                const TARGET_BOX_LINE_WIDTH = 2;

                // If missiles are selected, draw the mouse targeter
                if (WEAPON_LIST[currentWeaponIndex] === 'Missiles') {
                    ctx.strokeStyle = 'red';
                    ctx.lineWidth = TARGET_BOX_LINE_WIDTH / currentDrawingZoomFactor; // Adjust thickness with zoom

                    // Draw square around mouse position (which is already clamped worldMouseX/Y)
                    ctx.beginPath();
                    ctx.rect(submarine.worldMouseX - TARGET_BOX_SIZE / 2, submarine.worldMouseY - TARGET_BOX_SIZE / 2, TARGET_BOX_SIZE, TARGET_BOX_SIZE);
                    ctx.stroke();
                }

                // Draw all confirmed missile target boxes
                for (const target of submarine.missileTargets) {
                    ctx.strokeStyle = 'red';
                    ctx.lineWidth = TARGET_BOX_LINE_WIDTH / currentDrawingZoomFactor; // Adjust thickness with zoom
                    ctx.beginPath();
                    ctx.rect(target.worldX - TARGET_BOX_SIZE / 2, target.worldY - TARGET_BOX_SIZE / 2, TARGET_BOX_SIZE, TARGET_BOX_SIZE);
                    ctx.stroke();
                }
            }


            /**
             * Flashes the text content of a given element red twice, then reverts to original color.
             * @param {string} elementId - The ID of the HTML element to flash.
             */
            function flashElementRed(elementId) {
                const element = document.getElementById(elementId);
                if (!element) return;

                // To target the specific weapon item, we need to find it within the weapons display
                let targetElement = element;
                if (elementId === 'missileWeaponItem') { // Custom ID for the missile weapon item
                    const weaponItems = weaponsAndEquipmentDisplay.querySelectorAll('.weapon-item');
                    for (const item of weaponItems) {
                        if (item.textContent === 'Missiles') {
                            targetElement = item;
                            break;
                        }
                    }
                    if (targetElement === element) { // If still the original element, means missile item not found
                        console.warn("Could not find 'Missiles' weapon item to flash.");
                        return;
                    }
                }

                const originalColor = targetElement.style.color || '#e6edf3'; // Get current color or default
                const originalBackgroundColor = targetElement.style.backgroundColor || ''; // Get current background
                const originalBorderColor = targetElement.style.borderColor || 'transparent'; // Get current border

                // Store if it was selected to restore green border
                const wasSelected = targetElement.classList.contains('selected');

                const flashColor = '#ff4d4d'; // Red for flash
                const flashBgColor = 'rgba(255, 0, 0, 0.4)'; // Red with alpha
                const flashBorderColor = '#ff4d4d'; // Red border

                const flashDuration = 150; // Milliseconds for each flash state

                // Apply first flash state
                targetElement.style.color = flashColor;
                targetElement.style.backgroundColor = flashBgColor;
                targetElement.style.borderColor = flashBorderColor;

                setTimeout(() => {
                    // Restore to original/selected state
                    targetElement.style.color = originalColor;
                    targetElement.style.backgroundColor = originalBackgroundColor;
                    if (wasSelected) {
                        targetElement.style.borderColor = '#8aff8a'; // Restore selected green border
                    } else {
                        targetElement.style.borderColor = originalBorderColor;
                    }

                    // Second flash state
                    setTimeout(() => {
                        targetElement.style.color = flashColor;
                        targetElement.style.backgroundColor = flashBgColor;
                        targetElement.style.borderColor = flashBorderColor;

                        setTimeout(() => {
                            // Final restore
                            targetElement.style.color = originalColor;
                            targetElement.style.backgroundColor = originalBackgroundColor;
                            if (wasSelected) {
                                targetElement.style.borderColor = '#8aff8a'; // Restore selected green border
                            } else {
                                targetElement.style.borderColor = originalBorderColor;
                            }
                        }, flashDuration);
                    }, flashDuration);
                }, flashDuration);
            }


            /**
             * Updates the UI displays with current submarine status.
             */
            function updateUI() {
                // Guard clause to ensure elements are initialized
                if (!currentTurnRateDisplay || !radialDirectionDisplay || !currentSpeedDisplay || !accelerationDisplay || !currentDepthDisplay || !verticalSpeedDisplay || !sonarPingHotkey || !periscopeHotkey || !targetingDisplay || !weaponsAndEquipmentDisplay || !playerHealthDisplay) {
                    return;
                }
                currentTurnRateDisplay.textContent = `${submarine.turnRate.toFixed(1)}\u00B0/s`;
                radialDirectionDisplay.textContent = `${submarine.heading.toFixed(1)}\u00B0`;

                // Update order for movement indicators
                accelerationDisplay.textContent = `${submarine.acceleration.toFixed(1)} m/s²`;
                currentSpeedDisplay.textContent = `${submarine.speed.toFixed(1)} m/s`;

                // Update depth indicators - now include units inside the span for coloring
                verticalSpeedDisplay.textContent = `${submarine.verticalSpeed.toFixed(1)} m/s`;
                currentDepthDisplay.textContent = `${submarine.depth.toFixed(1)} m`;

                // Update player health display
                playerHealthDisplay.textContent = `${(submarine.currentHealth / submarine.maxHealth * 100).toFixed(0)}%`;


                // Update sonar ping hotkey display
                const currentTime = performance.now();
                const timeSinceLastPing = currentTime - lastSonarPingTime;
                const pingTimeLeft = SONAR_COOLDOWN_MS - timeSinceLastPing;

                if (pingTimeLeft <= 0) {
                    sonarPingHotkey.textContent = 'F: Sonar Ping';
                    sonarPingHotkey.style.color = '#8aff8a'; // Green
                } else {
                    sonarPingHotkey.textContent = `F: Sonar Ping (${(pingTimeLeft / 1000).toFixed(1)}s)`;
                    sonarPingHotkey.style.color = '#ff4d4d'; // Red
                }

                // Update periscope hotkey display
                let periscopeHotkeyText = "G: ";
                let periscopeHotkeyColor = '#8aff8a'; // Default green

                const timeSinceLastPeriscopeAction = performance.now();
                const isPeriscopeOnCooldown = (currentTime - submarine.lastPeriscopeActionTime) < PERISCOPE_COOLDOWN_MS;
                const isCurrentlyAnimating = submarine.isPeriscopeAnimating;

                const isDepthValid = submarine.depth >= MIN_PERISCOPE_DEPTH && submarine.depth <= MAX_PERISCOPE_DEPTH;
                const isSpeedValid = Math.abs(submarine.speed) < MAX_PERISCOPE_SPEED;
                const canPerformAction = isDepthValid && isSpeedValid;

                if (isCurrentlyAnimating || isPeriscopeOnCooldown) {
                    const remainingTime = Math.max(0, PERISCOPE_COOLDOWN_MS - (timeSinceLastPeriscopeAction - submarine.lastPeriscopeActionTime));
                    periscopeHotkeyText += `Periscope (${(remainingTime / 1000).toFixed(1)}s)`;
                    periscopeHotkeyColor = '#ff4d4d'; // Red while on cooldown/animating
                } else {
                    if (submarine.periscopeDeployed) {
                        periscopeHotkeyText += "Retract Periscope";
                    } else {
                        periscopeHotkeyText += "Deploy Periscope";
                    }

                    if (!canPerformAction) {
                        periscopeHotkeyColor = '#ff4d4d'; // Red if conditions not met
                    }
                }
                periscopeHotkey.textContent = periscopeHotkeyText;
                periscopeHotkey.style.color = periscopeHotkeyColor;
                
                // Call the new UI update function for targeting display
                updateTargetingUI();
                // Call the new UI update function for weapons and equipment display
                updateWeaponsUI();
            }


            /**
             * Updates the targeting UI display with current patrol boat statuses.
             * Also maintains the hotkeyToMasterIdMap for dynamic hotkey assignment.
             */
            function updateTargetingUI() {
                const targetingDisplay = document.getElementById('targetingDisplay');
                if (!targetingDisplay) return;

                // Clear previous entries
                targetingDisplay.innerHTML = '';

                // Create a fragment for efficient updates
                const fragment = document.createDocumentFragment();

                // Filter for ships that have been detected at least once (i.e., assigned a master ID)
                const detectedShips = patrolShips.filter(ship => ship.isDetected);

                // Sort ships by assignedMasterId for consistent display order
                const sortedShips = [...detectedShips].sort((a, b) => a.assignedMasterId - b.assignedMasterId);

                hotkeyToMasterIdMap = []; // Reset hotkey mapping for this frame

                sortedShips.forEach((ship, index) => {
                    const hotkeyNumber = index + 1; // 1-based index for hotkey display
                    if (hotkeyNumber > 9) return; // Only display hotkeys up to 9

                    hotkeyToMasterIdMap[hotkeyNumber - 1] = ship.assignedMasterId; // Store mapping: hotkeyIndex (0-8) -> masterId

                    const isCurrentlyVisible = isShipActivelyRevealed(ship, submarine, islands, patrolShips);

                    const entryDiv = document.createElement('div');
                    entryDiv.classList.add('targeting-entry'); // Add base class for styling

                    let displayText = `Master #${ship.assignedMasterId}`; // Use assignedMasterId

                    if (isCurrentlyVisible) {
                        // Calculate distance
                        const dx = ship.worldX - submarine.worldX;
                        const dy = ship.worldY - submarine.worldY;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        // Calculate absolute bearing (0 North, clockwise)
                        let absoluteBearingRad = Math.atan2(dy, dx);
                        let absoluteBearingDeg = (absoluteBearingRad * 180 / Math.PI + 90 + 360) % 360;

                        // Use absoluteBearingDeg directly as requested (0 North, clockwise)
                        displayText = `[${distance.toFixed(0)}m, ${absoluteBearingDeg.toFixed(0)}\u00B0] ${displayText}`;
                        entryDiv.style.color = '#8aff8a'; // Green
                        entryDiv.style.fontWeight = 'bold';
                    } else {
                        entryDiv.style.color = '#e6edf3'; // White
                        entryDiv.style.fontWeight = 'normal';
                    }

                    // Add hotkey number prefix
                    entryDiv.textContent = `${hotkeyNumber}: ${displayText}`;

                    // Add/remove targeted class
                    // The "targeted" class is only applied if the ship is the targeted one AND is currently visible
                    if (submarine.targetedMasterId === ship.assignedMasterId && isCurrentlyVisible) {
                        entryDiv.classList.add('targeted');
                    } else {
                        entryDiv.classList.remove('targeted');
                    }

                    fragment.appendChild(entryDiv);
                });
                targetingDisplay.appendChild(fragment);
            }

            /**
             * Updates the Weapons and Equipment UI display.
             */
            function updateWeaponsUI() {
                if (!weaponsAndEquipmentDisplay) return;

                // Clear previous entries, but keep the title
                const title = weaponsAndEquipmentDisplay.querySelector('h3');
                weaponsAndEquipmentDisplay.innerHTML = '';
                if (title) weaponsAndEquipmentDisplay.appendChild(title); // Re-add the existing title

                const fragment = document.createDocumentFragment();

                WEAPON_LIST.forEach((weaponName, index) => {
                    const weaponItemDiv = document.createElement('div');
                    weaponItemDiv.classList.add('weapon-item');
                    if (index === currentWeaponIndex) {
                        weaponItemDiv.classList.add('selected');
                    }
                    weaponItemDiv.textContent = weaponName;
                    fragment.appendChild(weaponItemDiv);
                });
                weaponsAndEquipmentDisplay.appendChild(fragment);
            }


            /**
             * The main game loop.
             * @param {DOMHighResResResTimeStamp} timestamp - The current time provided by requestAnimationFrame.
             */
            function gameLoop(timestamp) {
                if (!lastTimestamp) lastTimestamp = timestamp;
                const deltaTime = timestamp - lastTimestamp;
                lastTimestamp = timestamp;

                // Update game state regardless of map mode
                if (!isGameOver) {
                    update(deltaTime);
                }
                draw();
                updateUI(); // Always update UI

                animationFrameId = requestAnimationFrame(gameLoop);
            }

            // --- Keyboard Event Listeners ---
            document.addEventListener('keydown', async (event) => {
                // Attempt to start audio context on first user interaction
                if (!hasAudioContextStarted) {
                    try {
                        await Tone.start();
                        console.log("Audio context successfully started/resumed.");
                        initializeAudioSynths(); // Initialize synths AFTER Tone.start()
                        hasAudioContextStarted = true;
                    } catch (e) {
                        console.error("Failed to start audio context:", e);
                    }
                }

                // Toggle hitbox visualization with 'O' key (removed from UI, but still functional)
                if (event.code === 'KeyO' && !event.repeat) {
                    showHitboxes = !showHitboxes;
                    draw(); // Redraw immediately to show/hide hitboxes
                    return;
                }

                // Toggle Map View with 'M' key (removed from UI, but still functional)
                if (event.code === 'KeyM' && !event.repeat) {
                    submarine.isMapModeActive = !submarine.isMapModeActive;
                    draw(); // Redraw immediately to reflect map mode change
                    return;
                }

                // Handle number keys for targeting (1-9)
                if (event.code.startsWith('Digit') && !event.repeat) {
                    const hotkeyDigit = parseInt(event.code.slice(5)); // Get the hotkey number (1-9)
                    if (hotkeyDigit >= 1 && hotkeyDigit <= 9) {
                        // Look up the masterId associated with this hotkey digit
                        const targetMasterId = hotkeyToMasterIdMap[hotkeyDigit - 1]; // Use 0-based index for array

                        if (targetMasterId !== undefined) { // Check if a ship is mapped to this hotkey
                            const targetShip = patrolShips.find(ship => ship.assignedMasterId === targetMasterId);

                            // Only allow targeting if the ship exists AND is currently actively revealed
                            if (targetShip && isShipActivelyRevealed(targetShip, submarine, islands, patrolShips)) {
                                if (submarine.targetedMasterId === targetMasterId) { // Check against masterId now
                                    // If the same ship (by masterId) is pressed again, deactivate targeting
                                    submarine.targetedMasterId = null;
                                    console.log(`Deactivated targeting for Master #${targetMasterId}`);
                                } else {
                                    // Set as new target
                                    submarine.targetedMasterId = targetMasterId;
                                    console.log(`Targeting Master #${targetMasterId} (Hotkey: ${hotkeyDigit})`);
                                }
                            } else {
                                // If the mapped ship is not actively revealed or doesn't exist, clear the current target.
                                submarine.targetedMasterId = null;
                                console.log(`Cannot target Hotkey ${hotkeyDigit}: Mapped ship (Master #${targetMasterId}) not actively revealed or does not exist, untargeting.`);
                            }
                        } else {
                            // No ship is mapped to this hotkey slot, clear current target.
                            submarine.targetedMasterId = null;
                            console.log(`No ship assigned to hotkey ${hotkeyDigit}, untargeting.`);
                        }
                        updateUI();
                        return;
                    }
                }

                // Handle 'V' key for cycling weapons
                if (event.code === 'KeyV' && !event.repeat) {
                    currentWeaponIndex = (currentWeaponIndex + 1) % WEAPON_LIST.length;
                    // When changing weapon, clear any existing missile targets.
                    // This prevents stale targets from being drawn if you switch away from missiles.
                    if (WEAPON_LIST[currentWeaponIndex] !== 'Missiles') {
                        // No need to clear missile targets on weapon switch now, as they represent designated, un-impacted targets.
                        // submarine.missileTargets = [];
                    }
                    updateWeaponsUI(); // Update the UI to show the new selection
                    return; // Consume the event
                }

                // Handle 'Space' key for firing weapon (NEW)
                if (event.code === 'Space' && !event.repeat) {
                    const currentTime = performance.now();

                    // Only fire if the current weapon is Torpedoes
                    if (WEAPON_LIST[currentWeaponIndex] === 'Torpedoes') {
                        const targetShip = (submarine.targetedMasterId !== null) ? patrolShips.find(ship => ship.assignedMasterId === submarine.targetedMasterId) : null;
                        
                        // Determine if the torpedo should start with a locked target or as an untargeted seeker
                        let initialMasterIdToTrack = null;
                        let initialLastKnownTargetWorldX = null;
                        let initialLastKnownTargetWorldY = null;

                        if (targetShip && isShipActivelyRevealed(targetShip, submarine, islands, patrolShips)) {
                            // If a target is actively locked AND actively revealed, launch with that target
                            initialMasterIdToTrack = submarine.targetedMasterId;
                            initialLastKnownTargetWorldX = targetShip.worldX;
                            initialLastKnownTargetWorldY = targetShip.worldY;
                            console.log(`Launched Torpedo (ID: ${torpedoCounter + 1}) at Master #${submarine.targetedMasterId}!`);
                        } else {
                            // Launch without a target, it will seek on its own
                            console.log(`Launched Torpedo (ID: ${torpedoCounter + 1}) without a target. It will seek its own!`);
                        }

                        torpedoCounter++; // Increment counter for unique ID
                        const newTorpedo = {
                            id: torpedoCounter, // Assign unique ID for debugging
                            worldX: submarine.worldX,
                            worldY: submarine.worldY,
                            speed: submarine.speed + TORPEDO_INITIAL_SPEED_BONUS,
                            initialSpeed: submarine.speed + TORPEDO_INITIAL_SPEED_BONUS,
                            maxAccelerationBonus: TORPEDO_MAX_ACCELERATION_BONUS, // Player torpedoes always use their fixed bonus
                            heading: submarine.heading,
                            launchTime: currentTime,
                            masterIdToTrack: initialMasterIdToTrack, // Will be null if no active target
                            targetSubmarine: false, // Player torpedo does not target submarine
                            lastKnownTargetWorldX: initialLastKnownTargetWorldX,
                            lastKnownTargetWorldY: initialLastKnownTargetWorldY,
                            lastPingTime: currentTime, // Torpedo starts pinging immediately
                            type: 'player-torpedo' // Differentiate player's torpedo
                        };
                        torpedoes.push(newTorpedo);
                    } else if (WEAPON_LIST[currentWeaponIndex] === 'Missiles') {
                        // Check missile launch cooldown
                        if (currentTime - lastMissileLaunchTime < MISSILE_LAUNCH_COOLDOWN_MS) {
                            console.log(`Missile launch on cooldown (${((MISSILE_LAUNCH_COOLDOWN_MS - (currentTime - lastMissileLaunchTime)) / 1000).toFixed(1)}s remaining).`);
                            return; // Do nothing if on cooldown
                        }

                        // Check missile firing conditions
                        const canFireMissile = submarine.depth <= MISSILE_MAX_DEPTH_FOR_FIRE && Math.abs(submarine.speed) < MISSILE_MAX_SPEED_FOR_FIRE;

                        if (!canFireMissile) {
                            console.log(`Cannot fire missile: Depth must be <= ${MISSILE_MAX_DEPTH_FOR_FIRE}m and Speed < ${MISSILE_MAX_SPEED_FOR_FIRE}m/s.`);
                            flashElementRed('missileWeaponItem'); // Flash the missile weapon item
                            // Also flash depth/speed displays for feedback
                            if (submarine.depth > MISSILE_MAX_DEPTH_FOR_FIRE) {
                                flashElementRed('currentDepthDisplay');
                            }
                            if (Math.abs(submarine.speed) >= MISSILE_MAX_SPEED_FOR_FIRE) {
                                flashElementRed('currentSpeedDisplay');
                            }
                            return; // Stop here if conditions not met
                        }

                        // Find the first UNTARGETED missile target
                        const availableTarget = submarine.missileTargets.find(target => {
                            // Check if this target's ID is NOT already assigned to an active missile
                            return !missiles.some(missile => missile.assignedTargetId === target.id);
                        });

                        if (!availableTarget) {
                            console.log("No untargeted locations available for missile launch. Right-click to designate new targets.");
                            flashElementRed('missileWeaponItem'); // Flash the missile weapon item
                            return; // Cannot fire if no untargeted locations
                        }
                        
                        // If an available target is found, fire a missile at it
                        const missileLaunchRadians = degreesToRadians(submarine.heading); // Use sub's current heading for launch vector

                        // Calculate missile launch position (between propeller and sail along sub's axis)
                        const launchLocalX = 0;
                        const launchLocalY = MISSILE_LAUNCH_LOCAL_Y_OFFSET; // Positive Y is towards rear
                        
                        // Rotate local offset by submarine's heading to get world offset
                        // localX is 0, so rotation is simplified
                        const rotatedLaunchX = -launchLocalY * Math.sin(missileLaunchRadians);
                        const rotatedLaunchY = launchLocalY * Math.cos(missileLaunchRadians);

                        const launchWorldX = submarine.worldX + rotatedLaunchX;
                        const launchWorldY = submarine.worldY + rotatedRearY;

                        // Calculate initial heading towards availableTarget
                        const dx = availableTarget.worldX - launchWorldX;
                        const dy = availableTarget.worldY - launchWorldY;
                        const initialHeadingDeg = normalizeDegreeAngle(radiansToDegrees(Math.atan2(dy, dx)) + 90);

                        missileCounter++;
                        const newMissile = {
                            id: missileCounter,
                            worldX: launchWorldX,
                            worldY: launchWorldY,
                            targetX: availableTarget.worldX,
                            targetY: availableTarget.worldY,
                            assignedTargetId: availableTarget.id, // Link this missile to a specific target by its ID
                            speed: MISSILE_INITIAL_SPEED,
                            heading: initialHeadingDeg, // Missile will maintain this heading towards its target
                            launchTime: currentTime,
                            currentRadius: MISSILE_START_RADIUS,
                            hasExtendedTail: false,
                            type: 'player-missile'
                        };
                        missiles.push(newMissile);
                        lastMissileLaunchTime = currentTime; // Reset missile launch cooldown
                        console.log(`Missile (ID: ${newMissile.id}) launched towards target ID: ${newMissile.assignedTargetId} at (${newMissile.targetX.toFixed(0)}, ${newMissile.targetY.toFixed(0)}).`);
                    }
                    return; // Consume the event
                }


                // If game is over, ignore all other inputs
                if (isGameOver) return;

                // Prevent default browser actions for relevant keys
                if (['KeyW', 'KeyS', 'KeyA', 'KeyD', 'KeyX', 'KeyQ', 'KeyE', 'KeyF', 'KeyG', 'KeyV', 'Space'].includes(event.code)) {
                    event.preventDefault();
                }

                // Always update pressed state at the very beginning of keydown
                keysPressed[event.code] = true;

                // --- Handle Engine Stop (X) ---
                if (event.code === 'KeyX' && !event.repeat) {
                    submarine.isBrakingWithX = true;
                    if (submarine.speed > 0) {
                        // Set acceleration directly, bypassing smoothing rate for immediate effect
                        submarine.acceleration = MAX_BRAKING_ACCELERATION_FROM_FORWARD_MOTION;
                        submarine.targetAcceleration = MAX_BRAKING_ACCELERATION_FROM_FORWARD_MOTION;
                    } else {
                        submarine.targetAcceleration = 0; // Don't apply negative accel if already stopped or reversing
                        submarine.acceleration = 0; // Also set current acceleration to 0
                    }
                    submarine.targetTurnRate = 0; // Stop turning immediately when braking
                    submarine.turnRate = 0; // Apply immediately
                }

                // --- Handle Acceleration Control (W/S) ---
                // W or S always takes precedence and cancels 'X' braking
                if (event.code === 'KeyW' && !event.repeat) {
                    submarine.isBrakingWithX = false; // Cancel 'X' braking
                    submarine.targetAcceleration = FORWARD_ACCELERATION_MAGNITUDE;
                } else if (event.code === 'KeyS' && !event.repeat) {
                    submarine.isBrakingWithX = false; // Cancel 'X' braking
                    // If moving forward, pressing 'S' should allow max negative acceleration for braking, with smoothing.
                    // Otherwise, use regular reverse acceleration.
                    submarine.targetAcceleration = (submarine.speed > 0) ? MAX_BRAKING_ACCELERATION_FROM_FORWARD_MOTION : REVERSE_ACCELERATION_MAGNITUDE;
                }

                // --- Handle Turn Control (A/D) ---
                // Pressing A or D also cancels 'X' braking to allow turning control
                if (event.code === 'KeyA' && !event.repeat) { // Turn Left
                    submarine.isBrakingWithX = false; // Cancel 'X' braking if turning
                    const effectiveTurnRate = (Math.abs(submarine.speed) < SPEED_THRESHOLD_FOR_REDUCED_TURN_RATE) ?
                                             REDUCED_TURN_RATE_MAGNITUDE : REGULAR_TURN_RATE_MAGNITUDE;
                    submarine.targetTurnRate = -effectiveTurnRate; // Turn at max rate
                } else if (event.code === 'KeyD' && !event.repeat) { // Turn Right
                    submarine.isBrakingWithX = false; // Cancel 'X' braking if turning
                    const effectiveTurnRate = (Math.abs(submarine.speed) < SPEED_THRESHOLD_FOR_REDUCED_TURN_RATE) ?
                                             REDUCED_TURN_RATE_MAGNITUDE : REGULAR_TURN_RATE_MAGNITUDE;
                    submarine.targetTurnRate = effectiveTurnRate; // Turn at max rate
                }

                // --- Handle Vertical Control (Q/E) ---
                // Swapped Q and E functionality
                if (event.code === 'KeyQ' && !event.repeat) { // Surface
                    submarine.targetVerticalSpeed = BASE_SURFACE_SPEED;
                } else if (event.code === 'KeyE' && !event.repeat) { // Dive
                    submarine.targetVerticalSpeed = BASE_DIVE_SPEED;
                }


                // Handle Sonar Ping 'F' key with cooldown
                if (event.code === 'KeyF' && !event.repeat) {
                    const currentTime = performance.now();
                    if (currentTime - lastSonarPingTime >= SONAR_COOLDOWN_MS) {
                        const newPing = {
                            x: submarine.worldX,
                            y: submarine.worldY,
                            color: 'yellow',
                            radius: 0,
                            prevRadius: 0, // Initialize prevRadius for new pings
                            maxRadius: SONAR_PING_MAX_RADIUS,
                            speed: SONAR_PING_SPEED,
                            echoedIslands: new Set(),
                            echoedShips: new Set(), // Initialize for echoes off ships
                            synth: new Tone.MembraneSynth({
                                pitchDecay: 0.05,
                                octaves: 10,
                                envelope: {
                                    attack: 0.001,
                                    decay: 0.4,
                                    sustain: 0.01,
                                    release: 0.8
                                }
                            }),
                            gainNode: new Tone.Gain(1).toDestination(),
                            type: 'ping' // Mark as revealed by ping (submarine ping)
                        };
                        newPing.synth.connect(newPing.gainNode);
                        newPing.synth.triggerAttack("C4");
                        sonarPings.push(newPing);
                        lastSonarPingTime = currentTime; // Update last ping time
                        console.log("Playing player ping sound!");
                    } else {
                        console.log("Sonar on cooldown!");
                    }
                }

                // Handle Periscope 'G' key
                if (event.code === 'KeyG' && !event.repeat) {
                    const currentTime = performance.now();
                    const isOnCooldown = (currentTime - submarine.lastPeriscopeActionTime) < PERISCOPE_COOLDOWN_MS;
                    const isCurrentlyAnimating = submarine.isPeriscopeAnimating;

                    // Re-use the already declared variables from the update function
                    const isDepthValid = submarine.depth >= MIN_PERISCOPE_DEPTH && submarine.depth <= MAX_PERISCOPE_DEPTH;
                    const isSpeedValid = Math.abs(submarine.speed) < MAX_PERISCOPE_SPEED;
                    const canPerformAction = isDepthValid && isSpeedValid;

                    if (!isOnCooldown && !isCurrentlyAnimating) {
                        if (canPerformAction) {
                            submarine.isPeriscopeAnimating = true;
                            submarine.periscopeAnimationStartTime = currentTime;
                            // Toggle periscopeDeployed state directly
                            submarine.targetPeriscopeState = !submarine.periscopeDeployed;
                            submarine.lastPeriscopeActionTime = currentTime; // Start cooldown for deploy/retract action
                            console.log(`Periscope ${submarine.periscopeDeployed ? 'retraction' : 'deployment'} initiated!`);
                        } else {
                            // Not deployed, conditions not met, can't deploy
                            console.log(`Cannot deploy periscope: conditions not met (depth ${MIN_PERISCOPE_DEPTH}-${MAX_PERISCOPE_DEPTH}m, speed < ${MAX_PERISCOPE_SPEED}m/s).`);
                            // Flash the relevant indicator(s)
                            if (!isDepthValid) {
                                flashElementRed('currentDepthDisplay');
                            }
                            if (!isSpeedValid) {
                                flashElementRed('currentSpeedDisplay');
                            }
                        }
                    } else {
                        console.log("Periscope on cooldown or animating.");
                    }
                }
            });

            document.addEventListener('keyup', (event) => {
                keysPressed[event.code] = false;

                // If game is over, ignore all inputs
                if (isGameOver) return;

                // --- Handle Acceleration Keyup (W/S) ---
                // If neither W nor S is still pressed, AND we are not in 'X' braking mode, set targetAcceleration to 0
                if (!keysPressed['KeyW'] && !keysPressed['KeyS'] && !submarine.isBrakingWithX) {
                    submarine.targetAcceleration = 0;
                }

                // --- Handle Turn Keyup (A/D) ---
                // If neither A nor D is still pressed, set targetTurnRate and current turnRate to 0
                if (!keysPressed['KeyA'] && !keysPressed['KeyD']) {
                    submarine.targetTurnRate = 0;
                    submarine.turnRate = 0;
                }

                // --- Handle Vertical Control Keyup (Q/E) ---
                // If neither Q nor E is still pressed, set verticalSpeed to 0
                if (!keysPressed['KeyQ'] && !keysPressed['KeyE']) {
                    submarine.targetVerticalSpeed = 0;
                }
            });

            // Add wheel event listener for zoom
            canvas.addEventListener('wheel', (event) => {
                event.preventDefault(); // Prevent page scrolling

                if (submarine.isMapModeActive) {
                    return; // Don't zoom in map mode
                }

                const ZOOM_INCREMENT_FACTOR = 0.05; // Amount to zoom in/out per scroll "tick"

                if (event.deltaY < 0) { // Scroll up: zoom in (increase zoomFactor)
                    submarine.currentViewZoomFactor *= (1 + ZOOM_INCREMENT_FACTOR);
                } else { // Scroll down: zoom out (decrease zoomFactor)
                    submarine.currentViewZoomFactor /= (1 + ZOOM_INCREMENT_FACTOR);
                }

                // Clamp zoom factor
                // Maximum zoom in is 1 (original scale, 1 world unit = 1 pixel)
                // Minimum zoom out is MIN_ZOOM_FACTOR_CALCULATED (derived from MAX_VIEW_HEIGHT_ZOOM_OUT_UNITS)
                submarine.currentViewZoomFactor = Math.min(1, Math.max(MIN_ZOOM_FACTOR_CALCULATED, submarine.currentViewZoomFactor));

                // Redraw the scene with the new zoom level
                draw();
            });

            // Add mousemove event listener to track mouse position for periscope line
            canvas.addEventListener('mousemove', (event) => {
                if (submarine.isMapModeActive) return; // Map mode doesn't use mouse for view

                const rect = canvas.getBoundingClientRect();
                const canvasMouseX = event.clientX - rect.left;
                const canvasMouseY = event.clientY - rect.top;

                // Convert canvas coordinates to world coordinates directly
                const currentDrawingZoomFactor = submarine.currentViewZoomFactor;
                
                // Calculate un-clamped world coordinates for the mouse position
                let rawWorldMouseX = (canvasMouseX - canvas.width / 2) / currentDrawingZoomFactor + submarine.worldX;
                let rawWorldMouseY = (canvasMouseY - canvas.height / 2) / currentDrawingZoomFactor + submarine.worldY;

                // Apply clamping ONLY if missiles are selected
                if (WEAPON_LIST[currentWeaponIndex] === 'Missiles') {
                    const dx = rawWorldMouseX - submarine.worldX;
                    const dy = rawWorldMouseY - submarine.worldY;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist > MISSILE_TARGET_RANGE) {
                        const ratio = MISSILE_TARGET_RANGE / dist;
                        submarine.worldMouseX = submarine.worldX + dx * ratio;
                        submarine.worldMouseY = submarine.worldY + dy * ratio;
                    } else {
                        submarine.worldMouseX = rawWorldMouseX;
                        submarine.worldMouseY = rawWorldMouseY;
                    }
                } else {
                    // If not missile mode, just update normally
                    submarine.worldMouseX = rawWorldMouseX;
                    submarine.worldMouseY = rawWorldMouseY;
                }
            });

            // Add event listener for right-click (contextmenu)
            canvas.addEventListener('contextmenu', (event) => {
                event.preventDefault(); // Prevent default context menu
                if (WEAPON_LIST[currentWeaponIndex] === 'Missiles') {
                    const rect = canvas.getBoundingClientRect();
                    const canvasMouseX = event.clientX - rect.left;
                    const canvasMouseY = event.clientY - rect.top;

                    // Convert canvas coordinates to world coordinates, considering current view transform
                    const currentDrawingZoomFactor = submarine.currentViewZoomFactor;
                    const worldX = (canvasMouseX - canvas.width / 2) / currentDrawingZoomFactor + submarine.worldX;
                    const worldY = (canvasMouseY - canvas.height / 2) / currentDrawingZoomFactor + submarine.worldY;

                    // Clamp the world coordinates to MISSILE_TARGET_RANGE
                    const dx = worldX - submarine.worldX;
                    const dy = worldY - submarine.worldY;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    let newTarget = {};
                    if (dist > MISSILE_TARGET_RANGE) {
                        const ratio = MISSILE_TARGET_RANGE / dist;
                        newTarget = {
                            worldX: submarine.worldX + dx * ratio,
                            worldY: submarine.worldY + dy * ratio,
                            id: Date.now() + Math.random() // Unique ID for each target
                        };
                    } else {
                        newTarget = { 
                            worldX: worldX, 
                            worldY: worldY, 
                            id: Date.now() + Math.random() // Unique ID for each target
                        };
                    }
                    submarine.missileTargets.push(newTarget); // Add new target to the array
                    draw(); // Redraw to show the new target box
                    console.log(`Missile target set at (${newTarget.worldX.toFixed(0)}, ${newTarget.worldY.toFixed(0)}). Total targets: ${submarine.missileTargets.length}`);
                }
            });

            // Add event listener to the "Try Again" button to attempt audio context start
            document.getElementById('tryAgainButton').addEventListener('click', async () => {
                if (!hasAudioContextStarted) {
                    try {
                        await Tone.start();
                        console.log("Audio context successfully started/resumed via Try Again button.");
                        initializeAudioSynths();
                        hasAudioContextStarted = true;
                    }
                    catch (e) {
                        console.error("Failed to start audio context via Try Again button:", e);
                    }
                }
                resetGame(); // Ensure resetGame is called after potential audio context start
            });


            // --- Canvas Resizing ---
            function resizeCanvas() {
                canvas.width = canvas.clientWidth;
                canvas.height = canvas.clientHeight;
                // Recalculate MIN_ZOOM_FACTOR_CALCULATED on resize
                MIN_ZOOM_FACTOR_CALCULATED = canvas.height / MAX_VIEW_HEIGHT_ZOOM_OUT_UNITS;
                // Ensure current zoom doesn't fall below the new minimum if canvas shrinks
                submarine.currentViewZoomFactor = Math.max(submarine.currentViewZoomFactor, MIN_ZOOM_FACTOR_CALCULATED);
                draw();
            }

            // --- Initialization ---
            window.addEventListener('load', () => {
                // Audio context synths are initialized upon first user interaction via keydown/click listeners.

                submarine.worldX = WORLD_WIDTH / 2;
                submarine.worldY = WORLD_HEIGHT / 2;
                submarine.depth = 0; // Ensure initial depth is 0
                submarine.verticalSpeed = 0; // Ensure initial vertical speed is 0
                submarine.targetedMasterId = null; // Initialize targeted ship ID
                submarine.propellerRotationAngle = 0; // Initialize propeller rotation angle
                submarine.currentHealth = submarine.maxHealth; // Initialize player current health
                submarine.missileTargets = []; // Initialize missile targets array

                generateIslands();

                // Spawn patrol ships after islands are generated
                patrolShips = [];
                masterShipCounter = 0; // Reset counter for new game to start from Master #1

                for (let i = 0; i < PATROL_SHIP_COUNT; i++) {
                    let newShip = null;
                    let spawnAttempts = 0;
                    const MAX_SPAWN_ATTEMPTS = 100; // Increased attempts

                    while (spawnAttempts < MAX_SPAWN_ATTEMPTS) {
                        spawnAttempts++;
                        // Always pick a random island for target island
                        const targetIslandIndex = Math.floor(Math.random() * islands.length);
                        const targetIsland = islands[targetIslandIndex];

                        newShip = createPatrolShip(targetIsland); // Create ship (its position is based on targetIsland)

                        let collidesAtSpawn = false;
                        for (const island of islands) { // Check against ALL islands for initial collision
                            if (circlePolygonCollision({ x: newShip.worldX, y: newShip.worldY, radius: newShip.radius }, island.points)) {
                                collidesAtSpawn = true;
                                break;
                            }
                        }

                        if (!collidesAtSpawn) {
                            patrolShips.push(newShip);
                            break; // Successfully spawned without initial collision
                        } else {
                            // console.log(`Attempt ${spawnAttempts}: New ship tried to spawn on an island, retrying...`);
                        }
                    }

                    if (spawnAttempts >= MAX_SPAWN_ATTEMPTS) {
                        console.warn(`Failed to spawn a patrol ship without initial collision after ${MAX_SPAWN_ATTEMPTS} attempts. Spawning anyway (might be on an island).`);
                        patrolShips.push(newShip); // Fallback: push the last attempted ship, even if it collides
                    }
                }

                currentTurnRateDisplay = document.getElementById('currentTurnRateDisplay');
                radialDirectionDisplay = document.getElementById('radialDirectionDisplay');
                currentSpeedDisplay = document.getElementById('currentSpeedDisplay');
                accelerationDisplay = document.getElementById('accelerationDisplay');
                currentDepthDisplay = document.getElementById('currentDepthDisplay');
                verticalSpeedDisplay = document.getElementById('verticalSpeedDisplay'); // Get new vertical speed display element
                sonarPingHotkey = document.getElementById('sonarPingHotkey'); // Get sonar ping hotkey element for dynamic display
                periscopeHotkey = document.getElementById('periscopeHotkey'); // Get new periscope hotkey element
                targetingDisplay = document.getElementById('targetingDisplay'); // Get new targeting display element
                weaponsAndEquipmentDisplay = document.getElementById('weaponsAndEquipmentDisplay'); // Get new weapons display element
                playerHealthDisplay = document.getElementById('playerHealthDisplay'); // Get new player health display element

                gameOverScreen = document.getElementById('gameOverScreen');
                gameOverReasonDisplay = document.getElementById('gameOverReason');
                // tryAgainButton listener is added directly above this block.

                // Initial resize and set zoom factor
                resizeCanvas(); // This will also calculate MIN_ZOOM_FACTOR_CALCULATED
                gameLoop(0);
                window.addEventListener('resize', resizeCanvas);
            });
        })(); // End of IIFE
    </script>
</body>
