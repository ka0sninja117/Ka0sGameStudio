<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submarine Bridge Simulator</title>
    <!-- Version: 0.001 -->
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tone.js CDN for audio -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js"></script>
    <style>
        /* Custom styles for the game, outside of Tailwind for specific elements */
        html, body {
            height: 100%; /* Make html and body fill viewport height */
            margin: 0;
            overflow: hidden; /* Prevent body scroll, let game-container manage it */
        }
        body {
            font-family: 'Inter', sans-serif; /* Using Inter font as requested */
            background-color: #0d1117; /* Dark background */
            color: #e6edf3; /* Light text color */
            display: flex; /* Make body a flex container */
            flex-direction: column; /* Stack children vertically */
            /* Removed justify-content and align-items from body so game-container can fill space */
        }
        .game-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1200px; /* Max width for the whole game content */
            flex-grow: 1; /* Allow game-container to grow and fill available space */
            padding: 1rem;
            position: relative;
            gap: 0; /* Reduced gap between canvas and info container */
            margin: 0 auto; /* Center the game-container horizontally */
        }
        canvas {
            background-color: #010409; /* Darker background for the canvas */
            border: 2px solid #30363d;
            border-radius: 0.5rem;
            display: block;
            touch-action: none; /* Prevent default touch actions like scrolling */
            flex-grow: 1; /* Allow canvas to take available space */
            min-height: 200px; /* Minimum height for canvas */
        }
        /* Container for the three info boxes */
        #overallInfoContainer {
            display: flex;
            justify-content: center; /* Center the three boxes */
            gap: 1rem; /* Space between the boxes */
            width: 100%; /* Take full width of parent (game-container) */
            margin-top: 2px; /* Adjusted margin to bring it closer to the canvas */
            flex-wrap: wrap; /* Allow wrapping on smaller screens */
            flex-shrink: 0; /* Prevent this container from shrinking below its content's height */
            align-items: flex-start; /* Align items to the top to prevent stretching */
            border-top: 1px solid #FFD700; /* Golden thin line at the top */
            padding-top: 5px; /* Add some padding to separate the line from content */
        }
        .info-box {
            background-color: rgba(0, 0, 0, 0.6); /* Slightly transparent dark background */
            color: #e6edf3; /* White for static text */
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-family: 'SF Mono', 'Cascadia Code', monospace; /* Monospace font for data */
            font-size: 0.9rem;
            display: flex; /* Changed from inline-flex to flex for better block-level behavior */
            flex-direction: column;
            justify-content: center;
            align-items: flex-start; /* Align text to start for better readability when width shrinks */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            text-align: left; /* Ensure text alignment is consistent */
            gap: 0.25rem; /* Small gap between stacked items */
            /* Removed white-space: nowrap; to allow content to wrap if needed */
        }
        .info-box .value-display { /* Applied to spans containing dynamic values and units */
            font-weight: bold;
            color: #8aff8a; /* Lime green for values and their units */
            display: inline-block; /* Allows text to fill its space */
            min-width: 3ch; /* Ensure minimum width for values to prevent jumping */
            text-align: right; /* Align numbers to the right for neatness */
        }

        /* Game Over Screen styles */
        #gameOverScreen {
            position: absolute;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.8);
            display: none; /* Hidden by default */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 50;
            border-radius: 0.5rem; /* Match canvas border radius */
        }
        #gameOverScreen.show {
            display: flex; /* Show when 'show' class is added */
        }
        #gameOverScreen h2 {
            font-size: 2.5rem; /* Larger heading */
            font-weight: bold;
            margin-bottom: 1rem;
            color: #ff4d4d; /* Reddish for game over */
        }
        #gameOverScreen p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            text-align: center;
            padding: 0 1rem;
        }
        #gameOverScreen button {
            background-color: #007bff;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 0.5rem;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        #gameOverScreen button:hover {
            background-color: #0056b3;
        }

        /* Styling for the targeting entry */
        .targeting-entry {
            background-color: rgba(211, 211, 211, 0.1); /* Light grey, slightly transparent */
            padding: 2px 4px;
            border-radius: 3px;
            margin-bottom: 2px; /* Small gap between entries */
        }

        /* Styling for the targeted ship entry */
        .targeting-entry.targeted {
            outline: 2px solid #ff4d4d; /* Red outline for targeted */
            outline-offset: 2px; /* Space between text and outline */
            background-color: rgba(255, 0, 0, 0.2); /* Slightly transparent red for targeted */
        }

        /* Styles for Weapons and Equipment Box - now part of info-box */
        #weaponsAndEquipmentDisplay {
            /* Inherits most styles from .info-box */
            display: grid; /* Changed to grid for two columns */
            grid-template-columns: repeat(2, minmax(0, 1fr)); /* Two columns, equal width */
            gap: 0.25rem 0.5rem; /* Vertical and horizontal gap between items */
            justify-content: center; /* Center the grid content horizontally */
            align-items: flex-start; /* Align text to start */
            padding: 0.5rem 1rem; /* Consistent with info-box */
            font-size: 0.85rem; /* Reduced font size for tighter fit */
            /* Removed absolute positioning */
            min-width: 150px; /* Ensure it doesn't shrink too much */
        }
        #weaponsAndEquipmentDisplay h3 {
             grid-column: span 2; /* Make title span both columns */
             margin-top: 0; /* Remove default margin */
             margin-bottom: 0.5rem; /* Small margin below title */
             text-align: center; /* Center the title */
             font-size: 0.9rem; /* Keep title slightly larger */
        }

        #weaponsAndEquipmentDisplay .weapon-item {
            padding: 2px 6px;
            border-radius: 3px;
            background-color: rgba(211, 211, 211, 0.1); /* Light grey background */
            border: 1px solid transparent; /* Default transparent border */
            transition: border-color 0.1s ease-in-out, background-color 0.1s ease-in-out;
            text-align: center; /* Center text within each weapon item */
            white-space: nowrap; /* Prevent text wrapping within item */
        }

        #weaponsAndEquipmentDisplay .weapon-item.selected {
            border-color: #8aff8a; /* Green outline for selected */
            background-color: rgba(138, 255, 138, 0.2); /* Slightly transparent green background */
        }
        /* Hotkey UI Background */
        #hotkeyDisplay {
            background-color: rgba(30, 30, 30, 0.7); /* Slightly grey transparent background */
            padding: 0.5rem 1rem; /* Added padding for better appearance */
            border-radius: 0.5rem; /* Ensure rounded corners */
        }
    </style>
</head>
<body>
    <div class="game-container">

        <!-- Game Canvas -->
        <canvas id="gameCanvas" class="w-full"></canvas>

        <!-- Overall Info Container for separate boxes -->
        <div id="overallInfoContainer">
            <!-- Player Health Box (New) -->
            <div id="playerHealthBox" class="info-box">
                <div>Health</div> <!-- Removed colon here -->
                <div><span id="playerHealthDisplay" class="value-display"></span></div>
            </div>

            <!-- Turning Indicators Box (Left) -->
            <div id="turnIndicatorsBox" class="info-box">
                <div>∆ Heading: <span id="currentTurnRateDisplay" class="value-display">0.0&deg;/s</span></div>
                <div>Heading: <span id="radialDirectionDisplay" class="value-display">0.0&deg;</span></div>
            </div>

            <!-- Depth Indicators Box (Center) -->
            <div id="depthIndicatorsBox" class="info-box">
                <div>Elevation: <span id="verticalSpeedDisplay" class="value-display">0.0 m/s</span></div>
                <div>Depth: <span id="currentDepthDisplay" class="value-display">0.0 m</span></div>
            </div>

            <!-- Movement Indicators Box (Right) -->
            <div id="movementIndicatorsBox" class="info-box">
                <div>∆ Speed: <span id="accelerationDisplay" class="value-display">0.0 m/s²</span></div>
                <div>Speed: <span id="currentSpeedDisplay" class="value-display">0.0 m/s</span></div>
            </div>

            <!-- Weapons and Equipment Display - Now inside overallInfoContainer -->
            <div id="weaponsAndEquipmentDisplay" class="info-box">
                <h3 class="font-bold mb-1">Weapons</h3>
                <!-- Dynamic content will be inserted here by JavaScript -->
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOverScreen" class="hidden">
            <h2>GAME OVER</h2>
            <p id="gameOverReason"></p>
            <button id="tryAgainButton">Try Again</button>
        </div>

        <!-- Hotkey Display - Moved to top-left, smaller, translucent -->
        <div id="hotkeyDisplay" class="absolute top-4 left-4 text-gray-200 px-2 py-1 rounded-md text-xs">
            WASD: Movement <br>
            Q/E: Dive/Surface <br>
            X: Engine Stop <br>
            <span id="sonarPingHotkey">F: Sonar Ping</span> <br>
            <span id="periscopeHotkey">G: Deploy Periscope</span> <br>
            1-9: Target Enemy <br>
            V: Cycle Weapon <br>
            Space: Fire Weapon
        </div>

        <!-- Targeting Display - New UI element for enemy tracking -->
        <div id="targetingDisplay" class="absolute top-4 right-4 bg-gray-800 text-gray-200 px-2 py-1 rounded-md text-xs shadow-lg opacity-80">
            <!-- Dynamic content will be inserted here by JavaScript -->
        </div>

    </div>

    <script type="module">
        (function() { // IIFE for scope isolation
            // Get the canvas and its context
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            // Game parameters
            const GRID_SIZE = 50; // Size of each grid cell on the map
            const SUBMARINE_COLOR_BASE = [77, 88, 93]; // RGB for #4d585d (dark slate grey)
            const SUBMARINE_COLOR_DEEP = [20, 25, 28]; // RGB for almost black at max depth (darker grey/blue)
            const OCEAN_COLOR_BASE = [70, 130, 180]; // Changed to a darker steel blue
            const OCEAN_COLOR_OBSCURED = [0, 0, 10]; // Very dark blue, almost black for deep water
            const ISLAND_COLOR_BASE = [139, 69, 19]; // RGB for #8B4513 (Dirt brown for islands)

            // Depth-based fading parameters
            const FADE_START_DEPTH = 2; // Meters
            const FADE_END_DEPTH = 10;   // Meters

            // Submarine drawing dimensions (base size in world units)
            const SUBMARINE_WIDTH = 20;
            const SUBMARINE_HEIGHT = 60;
            const SUBMARINE_WING_HEIGHT = 8 * 0.95; // Still used for the height of the single wing
            const SUBMARINE_WING_OFFSET = -15; // Still used for the Y-position of the single wing

            const COCKPIT_RADIUS_X = 4;
            const COCKPIT_RADIUS_Y = 6;
            const COCKPIT_OFFSET_Y = -11.2;

            // Propeller parameters (SHRUNK BY 50%)
            const PROPELLER_WIDTH = 6;
            const PROPELLER_HEIGHT = 6;
            const PROPELLER_OFFSET_Y = 28; // Distance from submarine center to propeller center
            const PROPELLER_BLADE_COUNT = 3;
            const PROPELLER_ROTATION_SPEED_FACTOR = 0.1; // How fast the propeller rotates per unit of speed

            // World dimensions (for islands and wrapping)
            const WORLD_WIDTH = 3000;
            const WORLD_HEIGHT = 3000;
            const NUM_ISLANDS = 10; // Number of randomly generated islands

            // Headquarters Parameters (NEW)
            const MAX_HEADQUARTERS = 3; // Maximum number of HQs
            const HQ_WIDTH = 40 * 2; // Doubled
            const HQ_HEIGHT = 20 * 2; // Doubled
            const HQ_FILL_COLOR = '#000000'; // Black
            const HQ_BORDER_COLOR = '#228B22'; // Dark Green
            const STAR_COLOR = '#FF0000'; // Red

            // Physics Constants
            const MAX_FORWARD_SPEED = 120; // units per second
            const MAX_BACKWARD_SPEED = -10; // units per second

            // Acceleration Control Parameters (New Model)
            const FORWARD_ACCELERATION_MAGNITUDE = 10; // Positive acceleration when 'W' is pressed
            const REVERSE_ACCELERATION_MAGNITUDE = -5; // Negative acceleration when 'S' is pressed (for starting reverse or if speed is already negative)
            const MAX_BRAKING_ACCELERATION_FROM_FORWARD_MOTION = -40; // Max negative acceleration for braking from forward motion

            const ACCELERATION_SMOOTHING_RATE = 50; // How quickly actual acceleration changes towards target (units/s^3)

            // Rotation control
            const REGULAR_TURN_RATE_MAGNITUDE = 35; // Regular maximum turn rate in degrees per second
            const REDUCED_TURN_RATE_MAGNITUDE = REGULAR_TURN_RATE_MAGNITUDE / 2; // Half limit when speed is low
            const SPEED_THRESHOLD_FOR_REDUCED_TURN_RATE = 5; // Speed below which turn rate is halved

            // Vertical maneuverability
            const SPEED_THRESHOLD_FOR_REDUCED_VERTICAL_MANEUVERABILITY = 10; // Speed below which vertical limits are halved

            // Sonar Ping Parameters
            const SONAR_PING_SPEED = 500; // units per second expansion
            const SONAR_PING_MAX_RADIUS = 750; // Reduced ping size as requested
            const SONAR_PING_FADE_START_RADIUS = 725; // Radius at which fading begins
            const SONAR_PING_THICKNESS_START = 10; // Initial ping line width
            const SONAR_PING_THICKNESS_END = 1; // Final ping line width at max radius
            const REVEAL_AREA_RADIUS = 200; // Radius for revealing island areas
            const SONAR_COOLDOWN_MS = 1000; // 1 second cooldown for sonar ping

            // Depth Parameters
            const MAX_DEPTH = 200; // meters
            const BASE_DIVE_SPEED = -5; // The maximum dive speed when not limited by horizontal speed (halved again)
            const BASE_SURFACE_SPEED = 10; // The maximum surface speed when not limited by horizontal speed (halved again)
            const VERTICAL_SPEED_SMOOTHING_RATE = 20; // How quickly vertical speed changes (m/s^2)

            // Periscope Parameters
            const MIN_PERISCOPE_DEPTH = 1;
            const MAX_PERISCOPE_DEPTH = 20;
            const MAX_PERISCOPE_SPEED = 15;
            const PERISCOPE_ANIMATION_DURATION_MS = 1000; // 1 second for deployment/retraction animation
            const PERISCOPE_COOLDOWN_MS = 1000; // Cooldown after an action, can be same as animation duration
            const PERISCOPE_FOV_LINE_LENGTH = 800; // Extend FOV lines to new range
            const PERISCOPE_FOV_ANGLE_DEG = 35; // Angle for FOV lines (+/- 35 degrees)
            const PERISCOPE_SURFACE_VIEW_RANGE = 800; // Increased to 800 units

            // Patrol Ship Parameters (NEW)
            const PATROL_SHIP_COUNT = 3;
            const PATROL_SHIP_RADIUS = 12; // Smaller than submarine (SUBMARINE_WIDTH / 2 = 10, SUBMARINE_HEIGHT / 2 = 30)
            const PATROL_SHIP_MIN_SPEED = 10;
            const PATROL_SHIP_MAX_SPEED = 70;
            const PATROL_SHIP_ACCEL_LIMIT = 20; // Max acceleration rate gain
            const PATROL_SHIP_ORBIT_BUFFER = 70; // Extra distance from island's max extent
            const PATROL_SHIP_SPEED_CHANGE_INTERVAL_MIN_MS = 5000; // 5 seconds
            const PATROL_SHIP_SPEED_CHANGE_INTERVAL_MAX_MS = 15000; // 15 seconds
            const REVEAL_DURATION_MS = 2000; // 2 seconds for temporary sonar revelation of ships
            const SURFACE_DETECTION_RANGE = 750; // New: Max range for surface detection (CHANGED FROM 1000 TO 750)
            const PATROL_SHIP_MAX_HEALTH = 50; // Patrol ship max health
            const PATROL_SHIP_DETECTION_RANGE = 400; // Patrol boat detection range for submarine
            const PATROL_SHIP_FIRE_DELAY_MS = 2000; // 2 seconds of uninterrupted detection to fire
            const PATROL_SHIP_TORPEDO_COOLDOWN_MS = 3000; // Cooldown for patrol boat torpedo firing (changed to 3s)
            const PATROL_SHIP_POST_FIRE_PATROL_DURATION_MS = 2000; // New: Duration patrol boat continues patrolling after firing
            const HQ_BOOST_RANGE = 500; // Range within which HQ boosts torpedoes

            // Torpedo Parameters (NEW)
            const TORPEDO_INITIAL_SPEED_BONUS = 30; // Added to sub's speed
            const TORPEDO_STRAIGHT_TRAVEL_DURATION_MS = 750; // 0.75 seconds
            const TORPEDO_MAX_ACCELERATION_BONUS = 40; // Added to launch speed for max speed
            const TORPEDO_TURN_RATE_MULTIPLIER = 2; // Double the sub's regular turn limit
            const TORPEDO_LIFETIME_MS = 15000; // Torpedo disappears after 15 seconds (was 10s)
            const TORPEDO_PROXIMITY_ACCEL_DISTANCE = 300; // Increased to 300
            const TORPEDO_PROXIMITY_ACCEL_SPEED = 200; // Speed when within proximity
            const TORPEDO_PING_RADIUS = 300; // Radius of torpedo's sonar ping (was 200)
            const TORPEDO_PING_INTERVAL_MS = 500; // Torpedo pings every 0.5 seconds
            const TORPEDO_DAMAGE = 80; // Damage dealt by a torpedo
            const TORPEDO_HIT_RADIUS = 5; // Torpedo's effective hit radius

            // Enemy Torpedo Parameters (NEW)
            const ENEMY_TORPEDO_INITIAL_SPEED_BONUS = 20;
            const ENEMY_TORPEDO_MAX_ACCELERATION_BONUS = 30;
            const ENEMY_TORPEDO_TURN_RATE_MULTIPLIER = 1.5; // Increased by 50% for faster turning
            const ENEMY_TORPEDO_LIFETIME_MS = 10000; // Shorter lifetime
            const ENEMY_TORPEDO_PROXIMITY_ACCEL_DISTANCE = 150;
            const ENEMY_TORPEDO_PROXIMITY_ACCEL_SPEED = 100;
            const ENEMY_TORPEDO_DAMAGE = 40; // Player takes 40 damage (changed from 20)

            // Missile Parameters (NEW)
            const MISSILE_TARGET_RANGE = 750; // Max distance from player for missile target
            const MISSILE_START_RADIUS = 2; // Initial radius of missile dot
            const MISSILE_END_RADIUS = 5; // Final radius after growth phase
            const MISSILE_GROWTH_DURATION_MS = 2000; // 2 seconds for growth
            const MISSILE_INITIAL_SPEED = 0; // Missiles start stationary during growth
            const MISSILE_ACCEL_START_SPEED_THRESHOLD = 2; // Speed threshold before tail extends and rapid acceleration starts
            const MISSILE_MAX_SPEED = 250; // Max speed of missile
            const MISSILE_RAPID_ACCEL_RATE = 500; // How fast missile accelerates to max speed (m/s^2)
            const MISSILE_TAIL_WIDTH = 5; // Width of the missile's rectangle tail
            const MISSILE_TAIL_LENGTH = 15; // Length of the missile's rectangle tail
            // Missile spawn point. Submarine's local Y-axis where the missile launches from.
            // Between propeller (PROPELLER_OFFSET_Y = 28) and sail (COCKPIT_OFFSET_Y = -11.2)
            const MISSILE_LAUNCH_LOCAL_Y_OFFSET = (PROPELLER_OFFSET_Y + COCKPIT_OFFSET_Y) / 2;

            // Missile Firing Conditions
            const MISSILE_MAX_DEPTH_FOR_FIRE = 50; // Max depth to fire missile (<= 50m)
            const MISSILE_MAX_SPEED_FOR_FIRE = 10; // Max speed to fire missile (< 10m/s)
            const MISSILE_LAUNCH_COOLDOWN_MS = 500; // 0.5 seconds cooldown between launches

            // Explosion Parameters
            const EXPLOSION_DURATION_MS = 500; // Duration of explosion animation
            const EXPLOSION_MAX_RADIUS = 50; // Max radius of explosion visual

            // Submarine state
            let submarine = {
                worldX: 0,           // Submarine's position in the vast world coordinates
                worldY: 0,           // Submarine's position in the vast world coordinates
                speed: 0,           // Current actual forward/backward speed (units/s)
                acceleration: 0,    // Current actual acceleration (units/s^2) - this is smoothed
                targetAcceleration: 0, // Desired acceleration commanded by user
                accelerationDisplayValue: 0, // Value shown on UI (actual speed change)
                heading: 0,         // Current heading (0-359 degrees)
                turnRate: 0,        // Current actual turning speed (degrees/s)
                targetTurnRate: 0,  // Desired turning speed (degrees/s, set by user input)
                depth: 0,           // Current depth (0 to MAX_DEPTH)
                verticalSpeed: 0,   // Current vertical speed (positive for surfacing, negative for diving)
                targetVerticalSpeed: 0, // Desired vertical speed commanded by user
                pitch: 0,           // (not controlled in this build)
                targetPitch: 0,
                periscopeDeployed: false, // Periscope state: true if deployed, false if retracted
                isPeriscopeAnimating: false, // True if periscope is currently animating
                periscopeAnimationStartTime: 0, // Timestamp when current periscope animation started
                lastPeriscopeActionTime: 0, // Timestamp when last successful periscope action initiated
                targetPeriscopeState: undefined, // undefined, true (deploy), or false (retract)
                periscopeAlpha: 0, // New: Alpha value for drawing periscope visual
                isTouchingIsland: false, // New flag: true if currently touching an island
                isMapModeActive: false, // New flag for map view/pause mode
                currentViewZoomFactor: 1, // Default zoom level for normal view (1:1 scale)
                isBrakingWithX: false, // New flag to track if 'X' initiated braking
                worldMouseX: 0, // Track mouse X in world coordinates for periscope line (normal view)
                worldMouseY: 0,  // Track mouse Y in world coordinates for periscope line (normal view)
                targetedMasterId: null, // New: Stores the masterId of the currently targeted ship
                propellerRotationAngle: 0, // New: Current rotation angle of the propeller in radians
                maxHealth: 100, // Submarine max health
                currentHealth: 100, // Submarine current health
                missileTargets: [] // NEW: Array to store multiple missile targets {worldX, worldY, id}
            };

            // Sonar cooldown state
            let lastSonarPingTime = 0; // Timestamp of the last sonar ping
            let lastDetectionSoundTime = 0; // New: Timestamp of the last time a detection sound was played
            const DETECTION_SOUND_COOLDOWN = 0.1; // 100ms cooldown for detection sound

            // Missile launch cooldown state
            let lastMissileLaunchTime = 0; // NEW: Timestamp of last missile launch

            // Submarine collision properties (Updated to approximate an oval with three circles)
            const SUBMARINE_HITBOX_CIRCLE_RADIUS = (SUBMARINE_WIDTH / 2) + 3; // Radius for each of the three collision circles
            // Offset for the front and back circles, calculated to align with the length
            const SUBMARINE_HITBOX_OFFSET_Y = (SUBMARINE_HEIGHT / 2) + 3 - SUBMARINE_HITBOX_CIRCLE_RADIUS;

            // Array to hold island data
            let islands = [];

            // Array to hold active sonar pings
            let sonarPings = [];

            // Array to store revealed areas {x, y, radius, type, isPersistent, endTime}
            let revealedAreas = [];

            // Array to hold patrol ship data
            let patrolShips = [];
            let masterShipCounter = 0; // For unique Master #X IDs for targeting UI

            // Global mapping from hotkey index (0-8) to assignedMasterId
            let hotkeyToMasterIdMap = [];

            // Array to hold active torpedoes
            let torpedoes = []; // Array for torpedoes
            let torpedoCounter = 0; // For unique torpedo IDs

            // Array to hold active missiles
            let missiles = []; // NEW: Array for missiles
            let missileCounter = 0; // NEW: For unique missile IDs

            // Array to hold active explosions
            let explosions = []; // NEW: Array for explosions

            // Game loop variables
            let lastTimestamp = 0;
            let animationFrameId = null;
            let isGameOver = false; // New flag to track game over state
            let showHitboxes = false; // New flag for hitbox visualization

            // State to track pressed keys for continuous actions
            const keysPressed = {}; // Stores boolean for each key. True if currently down.

            // UI elements references
            let currentTurnRateDisplay, radialDirectionDisplay, currentSpeedDisplay, accelerationDisplay;
            let currentDepthDisplay, verticalSpeedDisplay;
            let gameOverScreen, gameOverReasonDisplay, tryAgainButton; // Game Over UI elements
            let sonarPingHotkey, periscopeHotkey; // Reference to the sonar ping and periscope hotkey spans
            let targetingDisplay; // Reference to the new targeting UI element
            let weaponsAndEquipmentDisplay; // Reference to the new weapons display element
            let playerHealthDisplay; // Reference to the new player health display element

            // Weapons and Equipment state
            const WEAPON_LIST = ['Torpedoes', 'Missiles']; // Modified as per user request
            let currentWeaponIndex = 0; // Default selection: Torpedoes

            // Tone.js Synths for ping sounds
            let detectionPingSynth; // Only the detection sound synth is global
            let explosionSynth; // NEW: Synth for explosion sound
            let hasAudioContextStarted = false; // New flag to track audio context state

            // Global constant for zoom out limit (vertical world units visible)
            const MAX_VIEW_HEIGHT_ZOOM_OUT_UNITS = 1500;
            let MIN_ZOOM_FACTOR_CALCULATED = 1; // Will be calculated dynamically based on canvas height

            // Constant for the visual radius of the compass ring (in canvas pixels before zoom/translation)
            const COMPASS_VISUAL_RADIUS_PX = (SUBMARINE_HEIGHT + 14) / 2;

            // --- Helper Functions ---

            /**
             * Converts degrees to radians.
             * @param {number} degrees - Angle in degrees.
             * @returns {number} Angle in radians.
             */
            function degreesToRadians(degrees) {
                return degrees * Math.PI / 180;
            }

            /**
             * Converts radians to degrees.
             * @param {number} radians - Angle in radians.
             * @returns {number} Angle in degrees.
             */
            function radiansToDegrees(radians) {
                return radians * 180 / Math.PI;
            }

            /**
             * Normalizes an angle to be between 0 and 2*PI radians.
             * @param {number} angleRad - Angle in radians.
             * @returns {number} Normalized angle in radians.
             */
            function normalizeAngle(angleRad) {
                return (angleRad % (2 * Math.PI) + (2 * Math.PI)) % (2 * Math.PI);
            }

            /**
             * Normalizes an angle to be between 0 and 360 degrees.
             * @param {number} angleDeg - Angle in degrees.
             * @returns {number} Normalized angle in degrees.
             */
            function normalizeDegreeAngle(angleDeg) {
                return (angleDeg % 360 + 360) % 360;
            }


            /**
             * Checks if a target angle falls within a given angle range, handling angle wrapping.
             * All angles should be in radians.
             * @param {number} targetRad - The angle to check.
             * @param {number} startRad - The start of the angle range.
             * @param {number} endRad - The end of the angle range.
             * @returns {boolean} True if targetRad is within [startRad, endRad], false otherwise.
             */
            function isAngleBetween(targetRad, startRad, endRad) {
                targetRad = normalizeAngle(targetRad);
                startRad = normalizeAngle(startRad);
                endRad = normalizeAngle(endRad);

                if (startRad <= endRad) {
                    return targetRad >= startRad && targetRad <= endRad;
                } else { // Range wraps around 0 (e.g., [330deg, 30deg])
                    return targetRad >= startRad || targetRad <= endRad;
                }
            }


            /**
             * Initializes Tone.js synths. This only sets up the global detection synth.
             * Individual pings will create their own synths and gain nodes.
             */
            function initializeAudioSynths() {
                detectionPingSynth = new Tone.MembraneSynth({
                    pitchDecay: 0.02, // Shorter, sharper sound for detection
                    octaves: 8,
                    envelope: {
                        attack: 0.001,
                        decay: 0.2,
                        sustain: 0.01,
                        release: 0.5
                    }
                }).toDestination();
                console.log("Detection synth initialized.");

                // Initialize explosion synth (NoiseSynth for a quick, percussive blast)
                explosionSynth = new Tone.NoiseSynth({
                    noise: {
                        type: 'brown' // Brown noise for a low-frequency rumble
                    },
                    envelope: {
                        attack: 0.005, // Small attack
                        decay: 0.5,    // Longer decay for the rumble
                        sustain: 0.0,
                        release: 0.5
                    }
                }).chain(new Tone.Filter(1000, "lowpass").toDestination()); // Add a lowpass filter for boominess
                console.log("Explosion synth initialized.");
            }

            /**
             * Plays the detection sonar ping sound (when red ping crosses sub).
             */
            function playDetectionSound() {
                // Only play if enough time has passed since the last detection sound
                if (detectionPingSynth && Tone.context.currentTime >= lastDetectionSoundTime + DETECTION_SOUND_COOLDOWN) {
                    detectionPingSynth.triggerAttackRelease("A4", "16n");
                    lastDetectionSoundTime = Tone.context.currentTime; // Update the last play time
                    console.log("Playing detection sound!");
                }
            }

            /**
             * Plays an explosion sound.
             */
            function playExplosionSound() {
                if (explosionSynth) {
                    explosionSynth.triggerAttackRelease("16n");
                    console.log("Playing explosion sound!");
                }
            }

            /**
             * Checks for collision between a circle and a line segment.
             * Used for circle-polygon collision detection.
             * @param {object} circle - {x, y, radius}
             * @param {object} p1 - {x, y} start point of segment
             * @param {object} p2 - {x, y} end point of segment
             * @returns {boolean} True if collides, false otherwise.
             */
            function circleLineSegmentCollision(circle, p1, p2) {
                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const lenSq = dx * dx + dy * dy;
                let t = 0;

                if (lenSq !== 0) {
                    t = ((circle.x - p1.x) * dx + (circle.y - p1.y) * dy) / lenSq;
                    t = Math.max(0, Math.min(1, t)); // Clamp t to [0, 1]
                }

                const closestX = p1.x + t * dx;
                const closestY = p1.y + t * dy;

                const distSq = (circle.x - closestX) * (circle.x - closestX) +
                               (circle.y - closestY) * (circle.y - closestY);

                return distSq < (circle.radius * circle.radius);
            }

            /**
             * Checks for collision between a circle and a polygon.
             * @param {object} circle - {x, y, radius}
             * @param {Array<object>} polygonPoints - Array of {x, y} points for the polygon.
             * @returns {boolean} True if collides, false otherwise.
             */
            function circlePolygonCollision(circle, polygonPoints) {
                // Check if any line segment of the polygon intersects the circle
                for (let i = 0; i < polygonPoints.length; i++) {
                    const p1 = polygonPoints[i];
                    const p2 = polygonPoints[(i + 1) % polygonPoints.length]; // Connect last point to first

                    if (circleLineSegmentCollision(circle, p1, p2)) {
                        return true;
                    }
                }

                // Additionally, check if the circle's center is inside the polygon
                // This is crucial if the circle starts entirely inside the polygon, or moves fully inside
                // without hitting an edge first (e.g., if the step size is large).
                let inside = false;
                for (let i = 0, j = polygonPoints.length - 1; i < polygonPoints.length; j = i++) {
                    const xi = polygonPoints[i].x, yi = polygonPoints[i].y;
                    const xj = polygonPoints[j].x, yj = polygonPoints[j].y;

                    const intersect = ((yi > circle.y) !== (yj > circle.y)) &&
                                      (circle.x < (xj - xi) * (circle.y - yi) / (yj - yi) + xi);
                    if (intersect) inside = !inside;
                }
                return inside;
            }

            /**
             * Generates a single random polygonal island.
             * Ensures the island is not too close to the submarine's starting position or map edges.
             * @param {number} worldWidth - The width of the game world.
             * @param {number} worldHeight - The height of the game world.
             * @param {number} submarineStartX - Submarine's initial X world coordinate.
             * @param {number} submarineStartY - Submarine's initial Y world coordinate.
             * @param {number} safeZoneRadius - Radius around submarine start where islands should not generate.
             * @returns {object} An object containing island points and color.
             */
            function generateRandomPolygonalIsland(worldWidth, worldHeight, submarineStartX, submarineStartY, safeZoneRadius) {
                const minVertices = 5;
                const maxVertices = 10;
                const minRadius = 50;
                const maxRadius = 150; // Max size for islands
                const EDGE_BUFFER = 300; // New: Minimum distance from map edges

                let center;
                let attempts = 0;
                const maxAttempts = 100;

                do {
                    // Generate center within the buffered area of the map
                    center = {
                        x: EDGE_BUFFER + Math.random() * (worldWidth - 2 * EDGE_BUFFER),
                        y: EDGE_BUFFER + Math.random() * (worldHeight - 2 * EDGE_BUFFER)
                    };
                    attempts++;

                    const distFromSubStart = Math.sqrt(
                        (center.x - submarineStartX) * (center.x - submarineStartX) +
                        (center.y - submarineStartY) * (center.y - submarineStartY)
                    );

                    // Ensure island is outside the safe zone plus its own maximum radius
                    if (distFromSubStart > (safeZoneRadius + maxRadius)) {
                        break; // Island is far enough, exit loop
                    }
                } while (attempts < maxAttempts);

                // If after many attempts, we still can't place it safely, place it anyway (fallback)
                if (attempts >= maxAttempts) {
                    console.warn("Could not place island far from submarine start after many attempts. Placing anyway.");
                }

                const numVertices = Math.floor(Math.random() * (maxVertices - minVertices + 1)) + minVertices;
                const points = [];

                // Generate points around the center to form an irregular polygon
                for (let i = 0; i < numVertices; i++) {
                    const angle = (i / numVertices) * Math.PI * 2;
                    // Add some randomness to the radius to make shapes irregular
                    const radius = minRadius + Math.random() * (maxRadius - minRadius);
                    points.push({
                        x: center.x + radius * Math.cos(angle),
                        y: center.y + radius * Math.sin(angle)
                    });
                }
                return { points: points, color: ISLAND_COLOR_BASE, hasHeadquarters: false }; // Add hasHeadquarters flag
            }

            /**
             * Generates an array of random islands for the map.
             */
            function generateIslands() {
                islands = [];
                const subStartX = WORLD_WIDTH / 2;
                const subStartY = WORLD_HEIGHT / 2;
                const SAFE_ZONE_RADIUS = 200; // Define a safe zone around submarine start

                for (let i = 0; i < NUM_ISLANDS; i++) {
                    islands.push(generateRandomPolygonalIsland(WORLD_WIDTH, WORLD_HEIGHT, subStartX, subStartY, SAFE_ZONE_RADIUS));
                }

                // Assign Headquarters to up to MAX_HEADQUARTERS random islands
                const availableIslands = [...islands]; // Shallow copy
                for (let i = 0; i < MAX_HEADQUARTERS; i++) {
                    if (availableIslands.length === 0) break; // No more islands to place HQs

                    const randomIndex = Math.floor(Math.random() * availableIslands.length);
                    const selectedIsland = availableIslands[randomIndex];
                    selectedIsland.hasHeadquarters = true;

                    // Remove selected island from available list to prevent duplicates
                    availableIslands.splice(randomIndex, 1);
                }
            }

            /**
             * Wraps a value around a given limit. Useful for continuous world maps.
             * @param {number} value - The value to wrap.
             * @param {number} limit - The upper limit (e.g., WORLD_WIDTH).
             * @returns {number} The wrapped value.
             */
            function wrap(value, limit) {
                return (value % limit + limit) % limit;
            }

            /**
             * Interpolates between two RGB colors.
             * @param {Array<number>} color1 - [R, G, B] array for the starting color.
             * @param {Array<number>} color2 - [R, G, B] array for the ending color.
             * @param {number} factor - Interpolation factor (0 to 1).
             * @returns {string} RGB string for the interpolated color.
             */
            function interpolateColor(color1, color2, factor) {
                const result = color1.map((c, i) => Math.round(c + factor * (color2[i] - c)));
                return `rgb(${result[0]}, ${result[1]}, ${result[2]})`;
            }

            /**
             * Sets the game to a "Game Over" state.
             * @param {string} reason - The reason for the game over.
             */
            function gameOver(reason) {
                if (isGameOver) return; // Prevent multiple game over triggers
                isGameOver = true;
                cancelAnimationFrame(animationFrameId); // Stop the main game loop

                // Halt all submarine movement and turning
                submarine.speed = 0;
                submarine.acceleration = 0;
                submarine.targetAcceleration = 0; // Reset target acceleration
                submarine.accelerationDisplayValue = 0; // Reset display
                submarine.heading = 0;
                submarine.turnRate = 0;
                submarine.targetTurnRate = 0;

                submarine.lastPeriscopeActionTime = 0; // Reset periscope cooldown
                submarine.targetPeriscopeState = undefined; // Reset periscope target state
                submarine.periscopeAlpha = 0; // Reset periscope visual alpha

                submarine.targetedMasterId = null; // Reset targeted ship
                submarine.propellerRotationAngle = 0; // Reset propeller rotation angle
                submarine.currentHealth = submarine.maxHealth; // Reset player health
                submarine.missileTargets = []; // NEW: Clear missile targets

                // Dispose of all active ping synths/gain nodes
                sonarPings.forEach(ping => {
                    if (ping.synth) ping.synth.dispose();
                    if (ping.gainNode) ping.gainNode.dispose();
                });
                sonarPings = []; // Clear any active pings

                // Clear all patrol ships
                patrolShips = [];
                
                // Clear all torpedoes
                torpedoes = [];

                // Clear all missiles
                missiles = []; // NEW: Clear any active missiles

                // Clear all explosions
                explosions = [];

                // Display Game Over screen

            }

            /**
             * Creates a new patrol ship object.
             * @param {object} island - The island object this ship will orbit.
             * @returns {object} A new patrol ship object.
             */
            function createPatrolShip(island) {
                const patrolShip = {
                    worldX: 0,
                    worldY: 0,
                    speed: PATROL_SHIP_MIN_SPEED,
                    targetSpeed: PATROL_SHIP_MIN_SPEED,
                    acceleration: 0,
                    heading: 0, // Initial heading, will be calculated by orbit
                    radius: PATROL_SHIP_RADIUS,
                    island: island, // Store reference to the island it patrols
                    orbitRadius: 0, // Calculated later
                    orbitDirection: Math.random() < 0.5 ? 1 : -1, // 1 for clockwise, -1 for counter-clockwise
                    orbitAngle: Math.random() * Math.PI * 2, // Random starting angle around island
                    nextSpeedChangeTime: performance.now() + Math.random() * (PATROL_SHIP_SPEED_CHANGE_INTERVAL_MAX_MS - PATROL_SHIP_SPEED_CHANGE_INTERVAL_MIN_MS) + PATROL_SHIP_SPEED_CHANGE_INTERVAL_MIN_MS,
                    color: 'rgb(50, 50, 50)', // Changed to dark grey as requested
                    isRevealedBySonar: false,
                    revealedSonarEndTime: 0,
                    assignedMasterId: null, // Will be assigned on first detection
                    isMasterIdAssigned: false, // Flag to track if masterId has been assigned
                    isPeriscopeVisible: false, // New property for periscope visibility
                    isDetected: false, // New: Tracks if this ship has ever been detected
                    maxHealth: PATROL_SHIP_MAX_HEALTH, // Patrol ship max health
                    currentHealth: PATROL_SHIP_MAX_HEALTH, // Patrol ship current health
                    // New properties for patrol boat threat capabilities
                    isDetectingPlayer: false, // True when in the 2-second lock-on phase
                    detectionStartTime: 0,
                    hasFiredTorpedoThisDetection: false, // Flag to prevent multiple fires from single detection cycle
                    lastFireTime: 0, // Cooldown for torpedo firing
                    torpedoCooldownMs: PATROL_SHIP_TORPEDO_COOLDOWN_MS,
                    postFirePatrolEndTime: 0, // New: Time until patrol resumes normal detection after firing
                    lockOnProgress: 0, // 0 to 1, for visual indicator of lock-on
                    // New properties for fixed heading during lock-on
                    lockedOnTargetX: 0, // X-coordinate of player when lock-on started
                    lockedOnTargetY: 0, // Y-coordinate of player when lock-on started
                    fireBearing: 0 // Heading at which torpedo will be fired (snapped at detection)
                };

                // Calculate a safe orbit radius: island max extent + ship radius + buffer
                const islandCentroid = getPolygonCentroid(island.points);
                let maxDistFromCentroid = 0;
                for (const p of island.points) {
                    const dist = Math.sqrt((p.x - islandCentroid.x)**2 + (p.y - islandCentroid.y)**2);
                    if (dist > maxDistFromCentroid) {
                        maxDistFromCentroid = dist;
                    }
                }
                patrolShip.orbitRadius = maxDistFromCentroid + PATROL_SHIP_RADIUS + PATROL_SHIP_ORBIT_BUFFER;

                // Set initial position based on orbit
                patrolShip.worldX = islandCentroid.x + patrolShip.orbitRadius * Math.cos(patrolShip.orbitAngle);
                patrolShip.worldY = islandCentroid.y + patrolShip.orbitRadius * Math.sin(patrolShip.orbitAngle);

                // --- Calculate initial heading correctly based on orbital tangent ---
                let velocityAngleRad;
                if (patrolShip.orbitDirection === 1) { // Clockwise orbit
                    // For clockwise, the velocity vector at (cos(angle), sin(angle)) is (-sin(angle), cos(angle))
                    velocityAngleRad = Math.atan2(-Math.sin(patrolShip.orbitAngle), Math.cos(patrolShip.orbitAngle));
                } else { // Counter-clockwise orbit
                    // For counter-clockwise, the velocity vector at (cos(angle), sin(angle)) is (sin(angle), -cos(angle))
                    velocityAngleRad = Math.atan2(Math.sin(patrolShip.orbitAngle), -Math.cos(patrolShip.orbitAngle));
                }
                // Convert Cartesian angle (0 right, counter-clockwise) to Compass angle (0 up, clockwise)
                patrolShip.heading = normalizeDegreeAngle(90 - radiansToDegrees(velocityAngleRad));
                // --- End initial heading calculation ---

                return patrolShip;
            }

            /**

            function resetGame() {

                lastSonarPingTime = 0;

                lastMissileLaunchTime = 0;

                currentWeaponIndex = 0;

                // Clear pressed keys state
                for (const key in keysPressed) {
                    if (keysPressed.hasOwnProperty(key)) {
                        keysPressed[key] = false;
                    }
                }
                // Dispose of all active ping synths/gain nodes from previous game
                sonarPings.forEach(ping => {
                    if (ping.synth) ping.synth.dispose();
                    if (ping.gainNode) ping.gainNode.dispose();
                });
                sonarPings = []; // Clear any active pings

                revealedAreas = []; // Clear revealed areas on game reset
                hotkeyToMasterIdMap = []; // Clear hotkey mapping on game reset
                
                torpedoes = []; // Clear all torpedoes on game reset
                missiles = []; // NEW: Clear all missiles on game reset
                explosions = []; // Clear all explosions on game reset
                torpedoCounter = 0; // Reset torpedo counter
                missileCounter = 0; // NEW: Reset missile counter

                generateIslands(); // Regenerate islands for a fresh map

                // Spawn patrol ships after islands are generated
                patrolShips = [];
                masterShipCounter = 0; // Reset counter for new game to start from Master #1

                for (let i = 0; i < PATROL_SHIP_COUNT; i++) {
                    let newShip = null;
                    let spawnAttempts = 0;
                    const MAX_SPAWN_ATTEMPTS = 100; // Increased attempts

                    while (spawnAttempts < MAX_SPAWN_ATTEMPTS) {
                        spawnAttempts++;
                        // Always pick a random island for target island
                        const targetIslandIndex = Math.floor(Math.random() * islands.length);
                        const targetIsland = islands[targetIslandIndex];

                        newShip = createPatrolShip(targetIsland); // Create ship (its position is based on targetIsland)

                        let collidesAtSpawn = false;
                        for (const island of islands) { // Check against ALL islands for initial collision
                            if (circlePolygonCollision({ x: newShip.worldX, y: newShip.worldY, radius: newShip.radius }, island.points)) {
                                collidesAtSpawn = true;
                                break;
                            }
                        }

                        if (!collidesAtSpawn) {
                            patrolShips.push(newShip);
                            break; // Successfully spawned without initial collision
                        } else {
                            // console.log(`Attempt ${spawnAttempts}: Patrol ship tried to spawn on an island, retrying...`);
                        }
                    }

                    if (spawnAttempts >= MAX_SPAWN_ATTEMPTS) {
                        console.warn(`Failed to spawn a patrol ship without initial collision after ${MAX_SPAWN_ATTEMPTS} attempts. Spawning anyway (might be on an island).`);
                        patrolShips.push(newShip); // Fallback: push the last attempted ship, even if it collides
                    }
                }

                isGameOver = false; // Reset game over flag
                lastTimestamp = 0; // Reset timestamp for smooth start
                animationFrameId = requestAnimationFrame(gameLoop); // Restart game loop
            }

            /**
             * Calculates the centroid (average point) of a polygon.
             * Used for echo ping origin.
             * @param {Array<object>} points - Array of {x, y} points for the polygon.
             * @returns {object} The centroid {x, y}.
             */
            function getPolygonCentroid(points) {
                let centerX = 0;
                let centerY = 0;
                for (const p of points) {
                    centerX += p.x;
                    centerY += p.y;
                }
                return { x: centerX / points.length, y: centerY / points.length };
            }

            /**
             * Draws a single sonar ping on the canvas.
             * @param {object} ping - The ping object with x, y, radius, color properties.
             * @param {number} zoomFactor - The current zoom factor for the canvas.
             */
            function drawPing(ping, zoomFactor = 1) {
                let alpha = 1;
                // Calculate alpha for fading effect. Torpedo pings fade out over a shorter range.
                const fadeStartOffset = (ping.type === 'torpedo-ping') ? (ping.maxRadius * 0.5) : (ping.maxRadius * 0.95); // Start fading 50% before max for torpedo, or 5% before for submarine
                if (ping.radius > fadeStartOffset) {
                    const fadeRange = ping.maxRadius - fadeStartOffset;
                    const distanceIntoFade = ping.radius - fadeStartOffset;
                    alpha = 1 - (distanceIntoFade / fadeRange);
                    alpha = Math.max(0, Math.min(1, alpha)); // Clamp alpha between 0 and 1
                }

                // Calculate line width for shrinking effect
                const baseThickness = (ping.type === 'torpedo-ping') ? 2 : SONAR_PING_THICKNESS_START; // Torpedo pings thinner
                const widthRange = baseThickness - SONAR_PING_THICKNESS_END;
                const normalizedRadius = ping.radius / ping.maxRadius;
                let currentLineWidth = baseThickness - (normalizedRadius * widthRange);
                currentLineWidth = Math.max(SONAR_PING_THICKNESS_END, currentLineWidth); // Ensure it doesn't go below min width

                // Construct RGBA color string
                let r, g, b;
                if (ping.color === 'yellow') {
                    r = 255; g = 255; b = 0; // Yellow
                } else { // red
                    r = 255; g = 0; b = 0; // Red
                }
                ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
                ctx.lineWidth = currentLineWidth / zoomFactor; // Adjust thickness with zoom

                ctx.beginPath();
                ctx.arc(ping.x, ping.y, ping.radius, 0, Math.PI * 2);
                ctx.stroke();
            }

            /**
             * Helper for line-line intersection, adapted for segments. Returns intersection point if it exists on both segments.
             * Returns null if no intersection or not on segments.
             * @param {object} lineSegP1 - Start point of the first line segment {x, y}.
             * @param {object} lineSegP2 - End point of the first line segment {x, y}.
             * @param {object} lineSegQ1 - Start point of the second line segment {x, y}.
             * @param {object} lineSegQ2 - End point of the second line segment {x, y}.
             * @returns {object|null} Intersection point {x, y} or null.
             */
            function getLineLineIntersection(lineSegP1, lineSegP2, lineSegQ1, lineSegQ2) {
                const p = lineSegP1;
                const r = { x: lineSegP2.x - lineSegP1.x, y: lineSegP2.y - lineSegP1.y };
                const q = lineSegQ1;
                const s = { x: lineSegQ2.x - lineSegQ1.x, y: lineSegQ2.y - lineSegQ1.y };

                const denominator = r.x * s.y - r.y * s.x;

                if (denominator === 0) {
                    return null; // Parallel or collinear
                }

                const t = ((q.x - p.x) * s.y - (q.y - p.y) * s.x) / denominator;
                const u = ((q.x - p.x) * r.y - (q.y - p.y) * r.x) / denominator;

                if (t >= 0 && t <= 1 && u >= 0 && u <= 1) {
                    return {
                        x: p.x + t * r.x,
                        y: p.y + t * r.y
                    };
                }
                return null; // No intersection on segments
            }

            /**
             * Checks if a line segment intersects a polygon, and returns the distance from lineP1 to the closest intersection point.
             * Returns Infinity if no intersection.
             * @param {object} lineP1 - Start point of the line segment {x, y}.
             * @param {object} lineP2 - End point of the line segment {x, y}.
             * @param {Array<object>} polygonPoints - Array of {x, y} points for the polygon.
             * @returns {number} Distance to closest intersection, or Infinity.
             */
            function lineSegmentIntersectsPolygon(lineP1, lineP2, polygonPoints) {
                let closestIntersectionDistSq = Infinity;

                for (let i = 0; i < polygonPoints.length; i++) {
                    const polySegQ1 = polygonPoints[i];
                    const polySegQ2 = polygonPoints[(i + 1) % polygonPoints.length];

                    const intersectionPoint = getLineLineIntersection(lineP1, lineP2, polySegQ1, polySegQ2);
                    if (intersectionPoint) {
                        const distSq = (intersectionPoint.x - lineP1.x)**2 + (intersectionPoint.y - lineP1.y)**2;
                        if (distSq < closestIntersectionDistSq) {
                            closestIntersectionDistSq = distSq;
                        }
                    }
                }
                return Math.sqrt(closestIntersectionDistSq);
            }

            /**
             * Checks if a line segment intersects a circle, and returns the distance from lineP1 to the closest intersection point.
             * Returns Infinity if no intersection.
             * @param {object} lineP1 - Start point of the line segment {x, y}.
             * @param {object} lineP2 - End point of the line segment {x, y}.
             * @param {object} circleCenter - Center of the circle {x, y}.
             * @param {number} circleRadius - Radius of the circle.
             * @returns {number} Distance to closest intersection, or Infinity.
             */
            function lineSegmentIntersectsCircle(lineP1, lineP2, circleCenter, circleRadius) {
                const f = { x: lineP1.x - circleCenter.x, y: lineP1.y - circleCenter.y };
                const d = { x: lineP2.x - lineP1.x, y: lineP2.y - lineP1.y };

                const a = d.x * d.x + d.y * d.y;
                const b = 2 * (f.x * d.x + f.y * d.y);
                const c = f.x * f.x + f.y * f.y - circleRadius * circleRadius;

                const discriminant = b * b - 4 * a * c;

                if (discriminant < 0) {
                    return Infinity; // No real roots, no intersection
                }

                const sqrtDisc = Math.sqrt(discriminant);
                let t1 = (-b - sqrtDisc) / (2 * a);
                let t2 = (-b + sqrtDisc) / (2 * a);

                let closestT = Infinity;
                if (t1 >= 0 && t1 <= 1) closestT = Math.min(closestT, t1);
                if (t2 >= 0 && t2 <= 1) closestT = Math.min(closestT, t2);

                if (closestT !== Infinity) {
                    // Point on line segment closest to P1 that intersects circle
                    const intersectionPoint = {
                        x: lineP1.x + closestT * d.x,
                        y: lineP1.y + closestT * d.y
                    };
                    return Math.sqrt((intersectionPoint.x - lineP1.x)**2 + (intersectionPoint.y - lineP1.y)**2);
                }

                // Check if segment endpoints are inside the circle (though this case should be covered by t values)
                const distP1ToCenterSq = (lineP1.x - circleCenter.x)**2 + (lineP1.y - circleCenter.y)**2;
                const distP2ToCenterSq = (lineP2.x - circleCenter.x)**2 + (lineP2.y - circleCenter.y)**2;

                if (distP1ToCenterSq < circleRadius * circleRadius) {
                    return 0; // P1 is inside the circle
                }
                if (distP2ToCenterSq < circleRadius * circleRadius) {
                    // P2 is inside, P1 is outside. Find point of entry
                    // This is essentially covered by t values, but explicit check
                    if (closestT === Infinity) { // This means no segment intersection from outside to inside,
                                                // which implies one point is inside. Let's return distance to P2.
                        return Math.sqrt((lineP2.x - lineP1.x)**2 + (lineP2.y - lineP1.y)**2);
                    }
                }

                return Infinity; // No intersection found on the segment
            }


            /**
             * Checks if line of sight is clear between origin and target, avoiding other objects.
             * Returns true if blocked, false if clear.
             * @param {number} originX - X coordinate of the ray origin.
             * @param {number} originY - Y coordinate of the ray origin.
             * @param {number} targetX - X coordinate of the target.
             * @param {number} targetY - Y coordinate of the target.
             * @param {object|null} excludeObject - The object to exclude from blocking checks (e.g., the target itself, or the observer).
             * @param {Array<object>} allIslands - Array of all island objects.
             * @param {Array<object>} allPatrolShips - Array of all patrol ship objects.
             * @param {boolean} [checkShips=true] - Whether to consider other patrol ships as blocking objects.
             * @returns {boolean} True if LoS is blocked, false otherwise.
             */
            function isLineOfSightBlocked(originX, originY, targetX, targetY, excludeObject, allIslands, allPatrolShips, checkShips = true) {
                const rayP1 = { x: originX, y: originY };
                const rayP2 = { x: targetX, y: targetY };
                const targetDistSq = (targetX - originX)**2 + (targetY - originY)**2;

                // Check islands for blocking
                for (const blockerIsland of allIslands) {
                    // Skip if the blocker is the target island itself (object reference comparison)
                    if (blockerIsland === excludeObject) continue;

                    const intersectionDist = lineSegmentIntersectsPolygon(rayP1, rayP2, blockerIsland.points);
                    if (intersectionDist !== Infinity) { // If there's an intersection
                        const blockerDistSq = intersectionDist * intersectionDist;
                        // If blocker is closer than target (or very close)
                        // Add a small epsilon to avoid floating point issues where blockerDistSq might be slightly greater due to precision
                        if (blockerDistSq < targetDistSq - 0.1) {
                            return true; // LoS is blocked by an island
                        }
                    }
                }

                // Check other patrol ships for blocking ONLY if checkShips is true
                if (checkShips) {
                    for (const blockerShip of allPatrolShips) {
                        // Skip if the blocker is the target ship itself (object reference comparison)
                        if (blockerShip === excludeObject) continue;

                        const intersectionDist = lineSegmentIntersectsCircle(rayP1, rayP2, {x: blockerShip.worldX, y: blockerShip.worldY}, blockerShip.radius);
                        if (intersectionDist !== Infinity) { // If there's an intersection
                            const blockerDistSq = intersectionDist * intersectionDist;
                            // If blocker is closer than target (or very close)
                            // Add a small epsilon to account for floating point
                            if (blockerDistSq < targetDistSq - 0.1) {
                                return true; // LoS is blocked by a ship
                            }
                        }
                    }
                }

                return false; // LoS is clear
            }

            /**
             * Smoothly turns a current heading towards a target heading.
             * @param {number} currentHeading - The current heading in degrees (0-359).
             * @param {number} targetHeading - The target heading in degrees (0-0).
             * @param {number} maxTurnRate - Maximum turn rate in degrees per second.
             * @param {number} deltaTime - Time elapsed in seconds.
             * @returns {number} The new current heading.
             */
            function turnTowards(currentHeading, targetHeading, maxTurnRate, deltaTime) {
                // Normalize headings to 0-360
                currentHeading = normalizeDegreeAngle(currentHeading);
                targetHeading = normalizeDegreeAngle(targetHeading);

                let angleDiff = targetHeading - currentHeading;

                // Normalize angleDiff to be between -180 and 180 degrees
                if (angleDiff > 180) {
                    angleDiff -= 360;
                } else if (angleDiff < -180) {
                    angleDiff += 360;
                }

                const maxDeltaAngle = maxTurnRate * deltaTime;

                if (Math.abs(angleDiff) <= maxDeltaAngle) {
                    return targetHeading; // Close enough, snap to target
                } else if (angleDiff > 0) {
                    return currentHeading + maxDeltaAngle; // Turn clockwise
                } else {
                    return currentHeading - maxDeltaAngle; // Turn counter-clockwise
                }
            }

            /**
             * Checks if a patrol ship is within the current visible non-map view window.
             * @param {object} ship - The patrol ship object.
             * @returns {boolean} True if the ship is visible in the current zoom window, false otherwise.
             */
            function isShipInCurrentView(ship) {
                // If map mode is active, this function is for normal view, so it should return false.
                if (submarine.isMapModeActive) return false;

                const viewHalfWidth = (canvas.width / 2) / submarine.currentViewZoomFactor;
                const viewHalfHeight = (canvas.height / 2) / submarine.currentViewZoomFactor;

                const viewWorldLeft = submarine.worldX - viewHalfWidth;
                const viewWorldRight = submarine.worldX + viewHalfWidth;
                const viewWorldTop = submarine.worldY - viewHalfHeight;
                const viewWorldBottom = submarine.worldY + viewHalfHeight;

                // Simple AABB check (Axis-Aligned Bounding Box)
                const shipLeft = ship.worldX - ship.radius;
                const shipRight = ship.worldX + ship.radius;
                const shipTop = ship.worldY - ship.radius;
                const shipBottom = ship.worldY + ship.radius;

                return shipRight > viewWorldLeft && shipLeft < viewWorldRight &&
                       shipBottom > viewWorldTop && shipTop < viewWorldBottom;
            }

            /**
             * Determines if a patrol ship is currently actively revealed to the submarine.
             * This consolidates all reveal conditions (sonar, periscope, surface visual).
             * @param {object} ship - The patrol ship object to check.
             * @param {object} submarine - The submarine object.
             * @param {Array<object>} islands - Array of all island objects.
             * @param {Array<object>} patrolShips - Array of all patrol ship objects (for LoS checks).
             * @returns {boolean} True if the ship is actively revealed, false otherwise.
             */
            function isShipActivelyRevealed(ship, submarine, islands, patrolShips) {
                const currentTime = performance.now();
                const isAtSurface = submarine.depth <= FADE_START_DEPTH;

                // Condition 1: Revealed by Submarine's Sonar Ping (temporary)
                if (ship.isRevealedBySonar && currentTime < ship.revealedSonarEndTime) {
                    return true;
                }
                // Condition 2: Revealed by Submarine's Periscope (as long as periscope is active and in FOV/LoS)
                if (submarine.periscopeDeployed && !submarine.isPeriscopeAnimating &&
                    (submarine.depth >= MIN_PERISCOPE_DEPTH && submarine.depth <= MAX_PERISCOPE_DEPTH) &&
                    (Math.abs(submarine.speed) < MAX_PERISCOPE_SPEED)) {

                    const subHeadingRad = degreesToRadians(submarine.heading);
                    const periscopeWorldPointX = submarine.worldX - COCKPIT_OFFSET_Y * Math.sin(subHeadingRad);
                    const periscopeWorldPointY = submarine.worldY + COCKPIT_OFFSET_Y * Math.cos(subHeadingRad);

                    const dxWorld = submarine.worldMouseX - periscopeWorldPointX;
                    const dyWorld = submarine.worldMouseY - periscopeWorldPointY;

                    const periscopeToMouseWorldAngle = Math.atan2(dyWorld, dxWorld);

                    const fovStartAngle = periscopeToMouseWorldAngle - degreesToRadians(PERISCOPE_FOV_ANGLE_DEG);
                    const fovEndAngle = periscopeToMouseWorldAngle + degreesToRadians(PERISCOPE_FOV_ANGLE_DEG);

                    const distToShipCenter = Math.sqrt(
                        (ship.worldX - periscopeWorldPointX)**2 +
                        (ship.worldY - periscopeWorldPointY)**2
                    );

                    if (distToShipCenter <= PERISCOPE_SURFACE_VIEW_RANGE) {
                        const angleToShip = Math.atan2(
                            ship.worldY - periscopeWorldPointY,
                            ship.worldX - periscopeWorldPointX
                        );
                        if (isAngleBetween(angleToShip, fovStartAngle, fovEndAngle)) {
                            // Check for line of sight blockage before considering visible (ships ARE blockers for periscope)
                            if (!isLineOfSightBlocked(periscopeWorldPointX, periscopeWorldPointY, ship.worldX, ship.worldY, ship, islands, patrolShips, true)) {
                                return true;
                            }
                        }
                    }
                }
                // Condition 3: Revealed by direct visual line of sight at surface (persistent as long as at surface)
                // Only if submarine is at or near the surface AND not in map mode
                if (isAtSurface && !submarine.isMapModeActive) {
                    const dx = ship.worldX - submarine.worldX;
                    const dy = ship.worldY - submarine.worldY;
                    const distToShip = Math.sqrt(dx * dx + dy * dy);
                    // Check if within detection range AND actually visible in the current screen view
                    if (distToShip <= SURFACE_DETECTION_RANGE && isShipInCurrentView(ship)) {
                        // Check for line of sight blockage by islands or other ships (ships ARE blockers for surface vision)
                        if (!isLineOfSightBlocked(submarine.worldX, submarine.worldY, ship.worldX, ship.worldY, ship, islands, patrolShips, true)) {
                            return true;
                        }
                    }
                }
                // Condition 4: Revealed by torpedo's own ping (This happens by setting isRevealedBySonar on the ship
                // which then triggers Condition 1 for a short duration).

                return false;
            }

            /**
             * Determines if a patrol ship can see the player submarine for threat purposes.
             * This version only checks depth and proximity as requested by the user.
             * @param {object} patrolShip - The patrol ship doing the detecting.
             * @param {object} submarine - The player submarine.
             * @returns {boolean} True if the patrol ship can see the submarine and conditions are met, false otherwise.
             */
            function canPatrolShipSeeSubmarine(patrolShip, submarine) {
                // Submarine must be on the surface (depth <= FADE_START_DEPTH, which is 2m)
                if (submarine.depth > FADE_START_DEPTH) {
                    return false;
                }

                // Check distance (within PATROL_SHIP_DETECTION_RANGE, which is 400 units)
                const dx = submarine.worldX - patrolShip.worldX;
                const dy = submarine.worldY - patrolShip.worldY; // Corrected: target is submarine's Y, not patrolShip's
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance > PATROL_SHIP_DETECTION_RANGE) {
                    return false;
                }

                // Line of sight check is intentionally ignored as per user request for patrol boat attack detection.

                return true; // Conditions met: at surface and within range
            }

            /**
             * Fires an enemy torpedo from the given patrol ship.
             * @param {object} patrolShip - The patrol ship firing the torpedo.
             * @param {number} currentTime - The current game time.
             */
            function fireEnemyTorpedo(patrolShip, currentTime) {
                const islandCentroid = getPolygonCentroid(patrolShip.island.points);
                const distToHQIsland = Math.sqrt(
                    (patrolShip.worldX - islandCentroid.x)**2 +
                    (patrolShip.worldY - islandCentroid.y)**2
                );

                let torpedoSpeedBoost = ENEMY_TORPEDO_MAX_ACCELERATION_BONUS;
                if (patrolShip.island.hasHeadquarters && distToHQIsland <= HQ_BOOST_RANGE) {
                    torpedoSpeedBoost *= 2; // Double the boost if near HQ
                    console.log(`HQ boost applied to torpedo from Master #${patrolShip.assignedMasterId}!`);
                }

                const torpedoLaunchOffsetFromCenter = patrolShip.radius + 5; // A small offset from the ship's front
                // Torpedo launches at the patrol boat's 'fireBearing' (locked heading at detection)
                const launchRadians = degreesToRadians(patrolShip.fireBearing - 90); 
                const torpedoSpawnX = patrolShip.worldX + torpedoLaunchOffsetFromCenter * Math.cos(launchRadians);
                const torpedoSpawnY = patrolShip.worldY + torpedoLaunchOffsetFromCenter * Math.sin(launchRadians);

                const enemyTorpedo = {
                    id: ++torpedoCounter, // Unique ID for this torpedo
                    worldX: torpedoSpawnX, // Spawn from the front of the ship
                    worldY: torpedoSpawnY, // Spawn from the front of the ship
                    speed: patrolShip.speed + ENEMY_TORPEDO_INITIAL_SPEED_BONUS,
                    initialSpeed: patrolShip.speed + ENEMY_TORPEDO_INITIAL_SPEED_BONUS,
                    maxAccelerationBonus: torpedoSpeedBoost, // Store the potentially boosted value
                    heading: patrolShip.fireBearing, // Torpedo launched along the locked fire bearing
                    launchTime: currentTime,
                    masterIdToTrack: null, // Enemy torpedoes don't use masterIdToTrack to find ships
                    targetSubmarine: true, // Flag to indicate it targets the submarine
                    lastKnownTargetWorldX: submarine.worldX, // Enemy torpedoes always know sub's location
                    lastKnownTargetWorldY: submarine.worldY,
                    lastPingTime: currentTime, // Torpedo starts pinging immediately
                    type: 'enemy-torpedo' // Differentiate from player torpedoes
                };
                torpedoes.push(enemyTorpedo);
            }

            /**
             * Updates the game state based on elapsed time.
             * @param {number} deltaTime - Time elapsed since the last update in milliseconds.
             */
            function update(deltaTime) {
                if (isGameOver) return; // Do not update if game is over

                const deltaTimeInSeconds = deltaTime / 1000;
                const currentTime = performance.now(); // Get current time for periscope logic

                // Declare periscope conditions here, so they are in scope for both checks
                const isDepthValidForPeriscope = submarine.depth >= MIN_PERISCOPE_DEPTH && submarine.depth <= MAX_PERISCOPE_DEPTH;
                const isSpeedValidForPeriscope = Math.abs(submarine.speed) < MAX_PERISCOPE_SPEED;


                // --- Update Submarine Acceleration (smoothed) ---
                const currentAccel = submarine.acceleration;
                let targetAccel = submarine.targetAcceleration; // Use a mutable variable for targetAccel in this function

                // Special handling for 'X' braking: override targetAccel and set acceleration immediately
                if (submarine.isBrakingWithX) {
                    // Set acceleration directly to MAX_BRAKING_ACCELERATION_FROM_FORWARD_MOTION;
                    submarine.acceleration = MAX_BRAKING_ACCELERATION_FROM_FORWARD_MOTION;
                    targetAccel = MAX_BRAKING_ACCELERATION_FROM_FORWARD_MOTION; // Also ensure target matches
                } else {
                    // Normal acceleration smoothing
                    const accelDiff = targetAccel - currentAccel;
                    const maxAccelChangePerFrame = ACCELERATION_SMOOTHING_RATE * deltaTimeInSeconds;

                    if (accelDiff > 0) {
                        submarine.acceleration = Math.min(targetAccel, currentAccel + maxAccelChangePerFrame);
                    } else if (accelDiff < 0) {
                        submarine.acceleration = Math.max(targetAccel, currentAccel - maxAccelChangePerFrame);
                    }

                    // Snap to target acceleration if very close to prevent oscillation or slow creep
                    if (Math.abs(submarine.acceleration - targetAccel) < 0.1) {
