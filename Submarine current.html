                        submarine.acceleration = targetAccel;
                    }
                }


                // --- Update Submarine Speed ---
                const oldSpeed = submarine.speed; // Store old speed for acceleration display calculation
                submarine.speed += submarine.acceleration * deltaTimeInSeconds;

                // Clamp actual speed to overall physical limits
                submarine.speed = Math.max(MAX_BACKWARD_SPEED, Math.min(MAX_FORWARD_SPEED, submarine.speed));

                // Set acceleration to 0 if max/min speed reached to prevent overshooting
                const speedEpsilon = 0.1; // Tolerance for floating point comparison
                if (Math.abs(submarine.speed - MAX_FORWARD_SPEED) < speedEpsilon && submarine.acceleration > 0 ||
                    Math.abs(submarine.speed - MAX_BACKWARD_SPEED) < speedEpsilon && submarine.acceleration < 0) {
                    submarine.acceleration = 0;
                    submarine.targetAcceleration = 0; // Also zero target acceleration
                }

                // Logic for 'X' braking: check if speed has crossed zero to stop braking
                if (submarine.isBrakingWithX) {
                    // If speed is already at or below zero, stop braking and zero speed/acceleration
                    if (submarine.speed <= 0) {
                        submarine.speed = 0;
                        submarine.acceleration = 0;
                        submarine.targetAcceleration = 0;
                        submarine.isBrakingWithX = false; // Turn off braking mode
                    }
                }

                // Update propeller rotation angle
                submarine.propellerRotationAngle = (submarine.propellerRotationAngle +
                                                    (submarine.speed * PROPELLER_ROTATION_SPEED_FACTOR * deltaTimeInSeconds)) % (2 * Math.PI);


                // --- Update Submarine Position and handle collision with three circles ---
                const distanceMoved = submarine.speed * deltaTimeInSeconds; // Use the smoothed speed
                const radians_for_movement = (submarine.heading - 90) * Math.PI / 180; // For movement calculation
                const radians_for_hitbox = submarine.heading * Math.PI / 180; // For hitbox local-to-world transformation

                let nextWorldX = submarine.worldX + (distanceMoved * Math.cos(radians_for_movement));
                let nextWorldY = submarine.worldY + (distanceMoved * Math.sin(radians_for_movement));

                // Calculate positions of the three collision circles based on submarine's heading
                const collisionCircles = [];
                const localOffsetsY = [-SUBMARINE_HITBOX_OFFSET_Y, 0, SUBMARINE_HITBOX_OFFSET_Y]; // Front, Center, Aft offsets

                for (const offset_y of localOffsetsY) {
                    // Correct transformation for local Y-offsets (along sub's length)
                    const rotated_x = (offset_y * Math.sin(radians_for_hitbox)); // X component of local Y offset
                    const rotated_y = -(offset_y * Math.cos(radians_for_hitbox)); // Y component of local Y offset

                    collisionCircles.push({
                        x: nextWorldX + rotated_x,
                        y: nextWorldY + rotated_y,
                        radius: SUBMARINE_HITBOX_CIRCLE_RADIUS
                    });
                }

                let collisionDetectedInThisFrame = false;
                for (const island of islands) {
                    for (const circle of collisionCircles) {
                        if (circlePolygonCollision(circle, island.points)) {
                            collisionDetectedInThisFrame = true;
                            break; // Found collision with this island, no need to check other circles for this island
                        }
                    }
                    if (collisionDetectedInThisFrame) {
                        break; // Found collision with an island, no need to check other islands
                    }
                }

                submarine.isTouchingIsland = collisionDetectedInThisFrame; // Update collision flag for input handling

                if (collisionDetectedInThisFrame) {
                    if (Math.abs(oldSpeed) > 10) {
                        // High-speed crash: Game Over
                        gameOver("You crashed into the island at full speed!");
                        return; // Stop update loop
                    } else {
                        // Low-speed collision (scrape along / halt)
                        // If trying to move FORWARD into collision, halt
                        // If reversing, allow reverse.
                        if (distanceMoved > 0) { // If calculated movement was forward
                            submarine.speed = 0; // Prevent forward movement
                            submarine.acceleration = 0;
                            submarine.targetAcceleration = 0;
                        }
                    }
                }
                // Apply position update after collision handling
                submarine.worldX = nextWorldX;
                submarine.worldY = nextWorldY;

                // Wrap world coordinates
                submarine.worldX = wrap(submarine.worldX, WORLD_WIDTH);
                submarine.worldY = wrap(submarine.worldY, WORLD_HEIGHT);


                // --- Update Submarine Heading (Turn Rate) ---
                // Turn rate is now directly set by targetTurnRate from keydown/keyup
                submarine.turnRate = submarine.targetTurnRate;

                // Apply turn rate to heading
                submarine.heading = (submarine.heading + submarine.turnRate * deltaTimeInSeconds + 360) % 360;

                // --- Update Submarine Depth and Vertical Speed ---
                let currentVerticalSpeed = submarine.verticalSpeed;
                let targetVerticalSpeed = submarine.targetVerticalSpeed;

                // Apply speed-based modifier to the effective target vertical speed
                let effectiveTargetDiveSpeed = BASE_DIVE_SPEED;
                let effectiveTargetSurfaceSpeed = BASE_SURFACE_SPEED;

                if (Math.abs(submarine.speed) < SPEED_THRESHOLD_FOR_REDUCED_VERTICAL_MANEUVERABILITY) {
                    effectiveTargetDiveSpeed /= 2;
                    effectiveTargetSurfaceSpeed /= 2;
                }

                // Clamp the targetVerticalSpeed by the effective limits
                targetVerticalSpeed = Math.max(effectiveTargetDiveSpeed, Math.min(effectiveTargetSurfaceSpeed, targetVerticalSpeed));


                // Smoothly change current vertical speed towards the (clamped) target
                const verticalSpeedDiff = targetVerticalSpeed - currentVerticalSpeed;
                const maxVerticalSpeedChangePerFrame = VERTICAL_SPEED_SMOOTHING_RATE * deltaTimeInSeconds;

                if (verticalSpeedDiff > 0) {
                    submarine.verticalSpeed = Math.min(targetVerticalSpeed, currentVerticalSpeed + maxVerticalSpeedChangePerFrame);
                } else if (verticalSpeedDiff < 0) {
                    submarine.verticalSpeed = Math.max(targetVerticalSpeed, currentVerticalSpeed - maxVerticalSpeedChangePerFrame);
                }

                // Snap to target if very close to prevent oscillation
                if (Math.abs(submarine.verticalSpeed - targetVerticalSpeed) < 0.1) {
                    submarine.verticalSpeed = targetVerticalSpeed;
                }

                // Depth update based on current (smoothed) vertical speed
                submarine.depth -= submarine.verticalSpeed * deltaTimeInSeconds;

                // Clamp depth between 0 and MAX_DEPTH and stop vertical movement if boundaries are hit
                if (submarine.depth < 0) {
                    submarine.depth = 0;
                    if (submarine.verticalSpeed > 0) submarine.verticalSpeed = 0;
                    if (submarine.targetVerticalSpeed > 0) submarine.targetVerticalSpeed = 0; // Also zero target if hitting boundary
                } else if (submarine.depth > MAX_DEPTH) {
                    submarine.depth = MAX_DEPTH;
                    if (submarine.verticalSpeed < 0) submarine.verticalSpeed = 0;
                    if (submarine.targetVerticalSpeed < 0) submarine.targetVerticalSpeed = 0; // Also zero target if hitting boundary
                }

                // --- Periscope animation and state update ---
                if (submarine.isPeriscopeAnimating) {
                    const elapsedTime = currentTime - submarine.periscopeAnimationStartTime;
                    let animationProgress = Math.min(1, elapsedTime / PERISCOPE_ANIMATION_DURATION_MS);

                    if (submarine.targetPeriscopeState === true) { // Deploying
                        submarine.periscopeAlpha = animationProgress;
                    }
                    else if (submarine.targetPeriscopeState === false) { // Retracting
                        submarine.periscopeAlpha = 1 - animationProgress;
                    }

                    if (elapsedTime >= PERISCOPE_ANIMATION_DURATION_MS) {
                        submarine.isPeriscopeAnimating = false;
                        if (submarine.targetPeriscopeState !== undefined) {
                            submarine.periscopeDeployed = submarine.targetPeriscopeState;
                            submarine.periscopeAlpha = submarine.periscopeDeployed ? 1 : 0; // Final alpha state
                            submarine.targetPeriscopeState = undefined; // Clear target state
                        }
                    }
                } else {
                    // If not animating, ensure alpha matches deployed state
                    submarine.periscopeAlpha = submarine.periscopeDeployed ? 1 : 0;
                }

                // --- Automatic Periscope Retraction Logic ---
                if (submarine.periscopeDeployed && (!isDepthValidForPeriscope || !isSpeedValidForPeriscope)) {
                    // If deployed and conditions are violated, automatically retract
                    const timeSinceLastAction = currentTime - submarine.lastPeriscopeActionTime;
                    // Only trigger retraction if not already animating or on cooldown from a recent user action
                    if (!submarine.isPeriscopeAnimating && timeSinceLastAction >= PERISCOPE_COOLDOWN_MS) {
                        submarine.isPeriscopeAnimating = true;
                        submarine.periscopeAnimationStartTime = currentTime;
                        submarine.targetPeriscopeState = false; // Force retraction
                        submarine.lastPeriscopeActionTime = currentTime; // Start cooldown for auto-retract
                        console.log("Periscope automatically retracting due to changed conditions.");
                    }
                }

                // --- Periscope Island Revelation Logic ---
                // This logic affects 'revealedAreas' and contributes to isShipActivelyRevealed
                if (submarine.periscopeDeployed && !submarine.isPeriscopeAnimating && isDepthValidForPeriscope && isSpeedValidForPeriscope) {
                    const subHeadingRad = degreesToRadians(submarine.heading);
                    // Calculate periscope's world point correctly
                    const periscopeWorldPointX = submarine.worldX - COCKPIT_OFFSET_Y * Math.sin(subHeadingRad);
                    const periscopeWorldPointY = submarine.worldY + COCKPIT_OFFSET_Y * Math.cos(subHeadingRad);

                    const dxWorld = submarine.worldMouseX - periscopeWorldPointX;
                    const dyWorld = submarine.worldMouseY - periscopeWorldPointY;

                    const periscopeToMouseWorldAngle = Math.atan2(dyWorld, dxWorld);

                    const fovAngleRad = degreesToRadians(PERISCOPE_FOV_ANGLE_DEG);

                    const fovStartAngle = periscopeToMouseWorldAngle - fovAngleRad;
                    const fovEndAngle = periscopeToMouseWorldAngle + fovAngleRad;

                    for (const island of islands) {
                        const islandCentroid = getPolygonCentroid(island.points);
                        const distToIsland = Math.sqrt(
                            (islandCentroid.x - periscopeWorldPointX) ** 2 +
                            (islandCentroid.y - periscopeWorldPointY) ** 2
                        );

                        if (distToIsland <= PERISCOPE_SURFACE_VIEW_RANGE) {
                            const angleToIsland = Math.atan2(
                                islandCentroid.y - periscopeWorldPointY,
                                islandCentroid.x - periscopeWorldPointX
                            );

                            if (isAngleBetween(angleToIsland, fovStartAngle, fovEndAngle)) {
                                // Check if this island is already persistently revealed by periscope
                                let isAlreadyPersistent = revealedAreas.some(ra =>
                                    ra.isPersistent && // Check for any persistent reveal
                                    Math.abs(ra.x - islandCentroid.x) < 1 &&
                                    Math.abs(ra.y - islandCentroid.y) < 1
                                );

                                if (!isAlreadyPersistent) {
                                    // Ensure LoS is clear to reveal island (ships ARE blockers for periscope)
                                    if (!isLineOfSightBlocked(periscopeWorldPointX, periscopeWorldPointY, islandCentroid.x, islandCentroid.y, island, islands, patrolShips, true)) {
                                        revealedAreas.push({
                                            x: islandCentroid.x,
                                            y: islandCentroid.y,
                                            radius: REVEAL_AREA_RADIUS,
                                            type: 'periscope',
                                            isPersistent: true // Periscope reveal for islands is persistent
                                        });
                                        console.log("Island revealed by periscope!");
                                    }
                                }
                            }
                        }
                    }
                }

                // Remove expired revealed areas (only non-persistent ones)
                const revealedAreasToRemove = [];
                for (let i = 0; i < revealedAreas.length; i++) {
                    const area = revealedAreas[i];
                    // Only remove if NOT persistent and has an endTime that has passed
                    if (!area.isPersistent && area.endTime && currentTime > area.endTime) {
                        revealedAreasToRemove.push(i);
                    }
                }
                // Remove from back to front to avoid index issues
                for (let i = revealedAreasToRemove.length - 1; i >= 0; i--) {
                    revealedAreas.splice(revealedAreasToRemove[i], 1);
                }


                // --- Update and manage sonar pings ---
                const pingsToRemove = [];
                for (let i = 0; i < sonarPings.length; i++) {
                    const ping = sonarPings[i];
                    // Store previous radius before updating
                    ping.prevRadius = ping.radius;
                    ping.radius += ping.speed * deltaTimeInSeconds;


                    // --- Dynamic Volume Control for Player Ping Sounds (Yellow Pings) ---
                    // Only apply volume fading for yellow pings, not red (echo) pings
                    if (ping.color === 'yellow' && ping.type === 'ping') { // Only for main submarine pings
                        let volumeAlpha = 1;
                        if (ping.radius > SONAR_PING_FADE_START_RADIUS) {
                            const fadeRange = SONAR_PING_MAX_RADIUS - SONAR_PING_FADE_START_RADIUS;
                            const distanceIntoFade = ping.radius - SONAR_PING_FADE_START_RADIUS;
                            volumeAlpha = 1 - (distanceIntoFade / fadeRange);
                            volumeAlpha = Math.max(0, Math.min(1, volumeAlpha));
                        }
                        if (ping.gainNode) {
                            // Smoothly ramp gain to match visual fade
                            ping.gainNode.gain.linearRampToValueAtTime(volumeAlpha, Tone.context.currentTime + deltaTimeInSeconds);
                        }
                    }
                    // --- End Dynamic Volume Control ---


                    // Check for detection sound trigger for red pings only
                    if (ping.color === 'red' && !ping.detectionSoundPlayed) {
                        const distanceToSub = Math.sqrt(
                            (ping.x - submarine.worldX) * (ping.x - submarine.worldX) +
                            (ping.y - submarine.worldY) * (ping.y - submarine.worldY)
                        );
                        // Trigger sound when red ping's outer edge crosses submarine's center point
                        const prevPingRadius = ping.radius - (ping.speed * deltaTimeInSeconds);
                        if (distanceToSub <= ping.radius && distanceToSub > prevPingRadius) {
                            playDetectionSound(); // Play the separate detection sound with cooldown logic
                            ping.detectionSoundPlayed = true; // Mark sound as played for this ping
                        }
                    }


                    if (ping.radius >= ping.maxRadius) {
                        pingsToRemove.push(i);
                    }

                    // Check for echoes only if it's a yellow ping and hasn't echoed for all islands yet
                    if (ping.color === 'yellow' || ping.type === 'torpedo-ping') { // Torpedo pings can also generate echoes
                        // Check for echoes off Islands
                        for (const island of islands) {
                            if (!ping.echoedIslands.has(island)) { // Only check for new echoes for this island
                                let echoOriginPoint = null;
                                let minDistance = Infinity;
                                let closestIntersection = null;

                                // Find the closest point of intersection on any segment of the island polygon
                                for (let k = 0; k < island.points.length; k++) {
                                    const p1 = island.points[k];
                                    const p2 = island.points[(k + 1) % island.points.length];

                                    // Vector from ping origin to segment start
                                    const A_to_P1_x = p1.x - ping.x;
                                    const A_to_P1_y = p1.y - ping.y;

                                    // Vector of the segment itself
                                    const Segment_x = p2.x - p1.x;
                                    const Segment_y = p2.y - p1.y;

                                    const a = Segment_x * Segment_x + Segment_y * Segment_y;
                                    const b = 2 * (A_to_P1_x * Segment_x + A_to_P1_y * Segment_y);
                                    const c = A_to_P1_x * A_to_P1_x + A_to_P1_y * A_to_P1_y - ping.radius * ping.radius;

                                    const discriminant = b * b - 4 * a * c;

                                    if (discriminant >= 0) { // Potential intersection
                                        const sqrtDisc = Math.sqrt(discriminant);
                                        const t1 = (-b - sqrtDisc) / (2 * a);
                                        const t2 = (-b + sqrtDisc) / (2 * a);

                                        // Check if intersection points are on the segment and just crossed by the ping
                                        for (const t of [t1, t2]) {
                                            if (t >= 0 && t <= 1) { // Point is on the segment
                                                const intersectionX = p1.x + t * Segment_x;
                                                const intersectionY = p1.y + t * Segment_y;

                                                const dist = Math.sqrt(
                                                    (ping.x - intersectionX) * (ping.x - intersectionX) +
                                                    (ping.y - intersectionY) * (ping.y - intersectionY)
                                                );

                                                // Check if current radius just crossed this point
                                                if (ping.radius >= dist && ping.prevRadius < dist) {
                                                    if (dist < minDistance) {
                                                        minDistance = dist;
                                                        closestIntersection = { x: intersectionX, y: intersectionY };
                                                    }
                                                }
                                            }
                                        }
                                    }
                                }

                                if (closestIntersection) {
                                    // Perform Line of Sight check before echoing island (ships DO NOT block pings)
                                    // For sonar pings, `checkShips` is `false` meaning only islands block line of sight.
                                    if (!isLineOfSightBlocked(ping.x, ping.y, closestIntersection.x, closestIntersection.y, island, islands, patrolShips, false)) {
                                        const newEchoPing = {
                                            x: closestIntersection.x,
                                            y: closestIntersection.y,
                                            color: 'red',
                                            radius: 0,
                                            prevRadius: 0, // Initialize prevRadius for new echo pings
                                            // Echo pings from torpedo pings should use the torpedo's ping radius
                                            maxRadius: (ping.type === 'torpedo-ping' ? TORPEDO_PING_RADIUS : SONAR_PING_MAX_RADIUS),
                                            speed: SONAR_PING_SPEED,
                                            echoedIslands: new Set(),
                                            echoedShips: new Set(),
                                            detectionSoundPlayed: false,
                                            type: 'ping-echo' // Unique type for echo pings, not 'ping'
                                        };
                                        sonarPings.push(newEchoPing);
                                        ping.echoedIslands.add(island); // Mark this island as echoed for this yellow ping

                                        // Add the revealed area to the global array (persistent for islands)
                                        let isAlreadyPersistent = revealedAreas.some(ra =>
                                            ra.isPersistent && // Check for any persistent reveal
                                            Math.abs(ra.x - closestIntersection.x) < 1 &&
                                            Math.abs(ra.y - closestIntersection.y) < 1
                                        );

                                        if (!isAlreadyPersistent) {
                                            revealedAreas.push({
                                                x: closestIntersection.x,
                                                y: closestIntersection.y,
                                                radius: REVEAL_AREA_RADIUS,
                                                type: 'ping',
                                                isPersistent: true // Sonar reveal for islands is persistent
                                            });
                                        }
                                    }
                                }
                            }
                        }

                        // Check collision with patrol ships for echoes
                        for (const pShip of patrolShips) {
                            if (!ping.echoedShips.has(pShip)) { // Only echo once per ship per ping
                                const distToShipCenter = Math.sqrt(
                                    (ping.x - pShip.worldX)**2 +
                                    (ping.y - pShip.worldY)**2
                                );
                                // Calculate the distance to the edge of the patrol ship from the ping's origin
                                const pingHitThreshold = Math.max(0, distToShipCenter - pShip.radius);

                                // Check if ping's outer edge is crossing the ship's outer edge
                                if (ping.radius >= pingHitThreshold && ping.prevRadius < pingHitThreshold) {
                                    // Perform Line of Sight check before revealing ship (ships DO NOT block pings)
                                    // For sonar pings, `checkShips` is `false` meaning only islands block line of sight.
                                    if (!isLineOfSightBlocked(ping.x, ping.y, pShip.worldX, pShip.worldY, pShip, islands, patrolShips, false)) {
                                        let shouldRevealShip = false;
                                        if (ping.type === 'torpedo-ping') {
                                            // Torpedo pings reveal any ship if the torpedo is currently searching (originatorMasterId === null)
                                            // OR they reveal their specific target if it exists
                                            if (ping.originatorMasterId === null || ping.originatorMasterId === pShip.assignedMasterId) {
                                                shouldRevealShip = true;
                                                // If this torpedo had no target and just found one, assign it now.
                                                const torpedoThatPinged = torpedoes.find(t => t.id === ping.originatorTorpedoId); // Use new unique ID
                                                if (torpedoThatPinged && torpedoThatPinged.masterIdToTrack === null) {
                                                    torpedoThatPinged.masterIdToTrack = pShip.assignedMasterId;
                                                    torpedoThatPinged.lastKnownTargetWorldX = pShip.worldX;
                                                    torpedoThatPinged.lastKnownTargetWorldY = pShip.worldY;
                                                    console.log(`Untargeted Torpedo (ID: ${torpedoThatPinged.id}) acquired target Master #${pShip.assignedMasterId}!`);
                                                }
                                            }
                                        } else if (ping.type === 'ping') {
                                            // Submarine pings reveal all ships
                                            shouldRevealShip = true;
                                        }

                                        if (shouldRevealShip) {
                                            pShip.isRevealedBySonar = true;
                                            pShip.revealedSonarEndTime = currentTime + REVEAL_DURATION_MS; // Ships are temporary

                                            // Assign Master ID on first detection
                                            if (!pShip.isMasterIdAssigned) {
                                                masterShipCounter++;
                                                pShip.assignedMasterId = masterShipCounter;
                                                pShip.isMasterIdAssigned = true;
                                            }
                                            pShip.isDetected = true; // Mark as detected upon sonar reveal
                                            console.log(`Master #${pShip.assignedMasterId || 'N/A'} revealed by sonar.`);

                                            const newEchoPing = {
                                                x: pShip.worldX, // Echo originates from ship's center for simplicity
                                                y: pShip.worldY,
                                                color: 'red',
                                                radius: 0,
                                                prevRadius: 0,
                                                // Echo pings from torpedo pings should use the torpedo's ping radius
                                                maxRadius: (ping.type === 'torpedo-ping' ? TORPEDO_PING_RADIUS : SONAR_PING_MAX_RADIUS),
                                                speed: SONAR_PING_SPEED,
                                                echoedIslands: new Set(),
                                                echoedShips: new Set(),
                                                detectionSoundPlayed: false,
                                                type: 'ping-ship-echo'
                                            };
                                            sonarPings.push(newEchoPing);
                                            ping.echoedShips.add(pShip); // Mark this ship as echoed for this yellow ping
                                        }
                                    }
                                }
                            }
                        }
                    }
                }

                // Remove pings that have expired (from back to front to avoid index issues)
                for (let i = pingsToRemove.length - 1; i >= 0; i--) {
                    const ping = sonarPings[pingsToRemove[i]];
                    // Dispose audio resources ONLY if they exist (i.e., for yellow pings)
                    if (ping.synth) ping.synth.dispose();
                    if (ping.gainNode) ping.gainNode.dispose();
                    sonarPings.splice(pingsToRemove[i], 1);
                }

                // --- Update Patrol Ships ---
                for (let i = 0; i < patrolShips.length; i++) {
                    const ship = patrolShips[i];
                    // Reset periscope visibility at the beginning of each frame's update for this ship
                    ship.isPeriscopeVisible = false; // Assume not visible until proven otherwise this frame

                    const isPlayerCurrentlyVisibleToShip = canPatrolShipSeeSubmarine(ship, submarine);
                    
                    // Check if post-fire patrol duration is over. If so, reset fire-related flags.
                    if (ship.hasFiredTorpedoThisDetection && currentTime >= ship.postFirePatrolEndTime) {
                        ship.hasFiredTorpedoThisDetection = false;
                        // console.log(`Master #${ship.assignedMasterId} finished post-fire patrol at ${currentTime.toFixed(0)}ms.`);
                    }

                    // Determine if the ship should enter or remain in the 'detecting' state
                    // It can only detect if player is visible AND it hasn't just fired
                    const shouldBeDetecting = isPlayerCurrentlyVisibleToShip && !ship.hasFiredTorpedoThisDetection;

                    if (shouldBeDetecting) {
                        if (!ship.isDetectingPlayer) { // Transition from not detecting to detecting
                            ship.isDetectingPlayer = true;
                            ship.detectionStartTime = currentTime; // Start new lock-on timer
                            console.log(`Master #${ship.assignedMasterId} started new detection cycle at ${currentTime.toFixed(0)}ms.`);

                            // Calculate target bearing ONLY at the moment of initial detection
                            const dx = submarine.worldX - ship.worldX;
                            const dy = submarine.worldY - ship.worldY;
                            const targetBearingDeg = normalizeDegreeAngle(radiansToDegrees(Math.atan2(dy, dx)) + 90);
                            ship.fireBearing = targetBearingDeg; // Store this fixed bearing for firing
                            ship.heading = targetBearingDeg; // SNAP the ship's visual heading immediately to this angle
                            ship.lockedOnTargetX = submarine.worldX; // Store player's position at detection
                            ship.lockedOnTargetY = submarine.worldY;
                            console.log(`Master #${ship.assignedMasterId} locked heading to ${targetBearingDeg.toFixed(1)}° at detection. Target Pos: (${ship.lockedOnTargetX.toFixed(0)}, ${ship.lockedOnTargetY.toFixed(0)})`);
                        }

                        // During the detection/lock-on phase, the ship maintains its fixed 'fireBearing' as its heading.
                        ship.heading = ship.fireBearing; // Ensure heading remains snapped

                        // Pause movement (set target speed to 0, actual speed will smooth towards it)
                        ship.targetSpeed = 0;

                        // Calculate lock-on progress for visual indicator
                        ship.lockOnProgress = Math.min(1, (currentTime - ship.detectionStartTime) / PATROL_SHIP_FIRE_DELAY_MS);

                        // Check if enough time has passed to fire AND cooldown from last torpedo is over
                        if (ship.lockOnProgress >= 1 && currentTime - ship.lastFireTime >= ship.torpedoCooldownMs) {
                            fireEnemyTorpedo(ship, currentTime); // Use helper function
                            ship.hasFiredTorpedoThisDetection = true; // Mark as fired for this cycle
                            ship.lastFireTime = currentTime; // Reset torpedo cooldown
                            ship.postFirePatrolEndTime = currentTime + PATROL_SHIP_POST_FIRE_PATROL_DURATION_MS; // Start post-fire patrol
                            ship.isDetectingPlayer = false; // Exit detection state immediately after firing
                            ship.lockOnProgress = 0; // Reset progress
                            console.log(`Master #${ship.assignedMasterId} fired. Entering post-fire patrol until ${ship.postFirePatrolEndTime.toFixed(0)}ms.`);
                        }
                    } else { // Not detecting player OR in post-fire patrol cooldown
                        if (ship.isDetectingPlayer) { // If it *was* detecting but now isn't (lost visibility, or just fired)
                            console.log(`Master #${ship.assignedMasterId} stopped detecting player (lost LoS or just fired).`);
                            ship.isDetectingPlayer = false; // Stop detection
                            ship.detectionStartTime = 0; // Reset timer
                            ship.lockOnProgress = 0; // Reset progress
                        }
                        // Patrol speed logic:
                        // This applies if `!shouldBeDetecting`, which means either player is not visible,
                        // OR `hasFiredTorpedoThisDetection` is true (meaning it's in its post-fire cooldown period).
                        if (currentTime >= ship.nextSpeedChangeTime && currentTime >= ship.postFirePatrolEndTime) { // Only change speed AND if not in post-fire patrol
                            ship.targetSpeed = Math.random() * (PATROL_SHIP_MAX_SPEED - PATROL_SHIP_MIN_SPEED) + PATROL_SHIP_MIN_SPEED;
                            ship.nextSpeedChangeTime = currentTime + Math.random() * (PATROL_SHIP_SPEED_CHANGE_INTERVAL_MAX_MS - PATROL_SHIP_SPEED_CHANGE_INTERVAL_MIN_MS) + PATROL_SHIP_SPEED_CHANGE_INTERVAL_MIN_MS;
                        } else if (currentTime < ship.postFirePatrolEndTime) {
                            // If still in post-fire patrol, revert to min patrol speed.
                            ship.targetSpeed = PATROL_SHIP_MIN_SPEED;
                        }
                    }

                    // Apply speed changes (this applies to both detecting (targetSpeed 0) and patrolling (targetSpeed > 0))
                    const speedDiff = ship.targetSpeed - ship.speed;
                    const maxAccelChange = PATROL_SHIP_ACCEL_LIMIT * deltaTimeInSeconds;

                    if (speedDiff > 0) {
                        ship.acceleration = Math.min(speedDiff / deltaTimeInSeconds, maxAccelChange);
                    } else if (speedDiff < 0) {
                        ship.acceleration = Math.max(speedDiff / deltaTimeInSeconds, -maxAccelChange);
                    } else {
                        ship.acceleration = 0;
                    }

                    ship.speed += ship.acceleration * deltaTimeInSeconds;
                    ship.speed = Math.max(PATROL_SHIP_MIN_SPEED, Math.min(PATROL_SHIP_MAX_SPEED, ship.speed)); // Clamp actual speed

                    // Pathing Update (circular orbit) - This block should run *only* if NOT actively detecting player.
                    // The `isDetectingPlayer` flag is now correctly toggled to false immediately after firing,
                    // and remains false during the `postFirePatrolEndTime` cooldown, allowing patrol.
                    if (!ship.isDetectingPlayer) {
                        const islandCentroid = getPolygonCentroid(ship.island.points);
                        // Angular speed in radians per second
                        const angularSpeedRad = ship.speed / ship.orbitRadius;
                        const nextOrbitAngle = ship.orbitAngle + angularSpeedRad * ship.orbitDirection * deltaTimeInSeconds;

                        const predictedWorldX = islandCentroid.x + ship.orbitRadius * Math.cos(nextOrbitAngle);
                        const predictedWorldY = islandCentroid.y + ship.orbitRadius * Math.sin(nextOrbitAngle);

                        let willCollideWithAnyIsland = false;
                        for (const island of islands) {
                            if (circlePolygonCollision({ x: predictedWorldX, y: predictedWorldY, radius: ship.radius }, island.points)) {
                                willCollideWithAnyIsland = true;
                                break;
                            }
                        }

                        if (willCollideWithAnyIsland) {
                            // Collision detected, stop movement and reverse orbit direction
                            ship.speed = 0;
                            ship.targetSpeed = PATROL_SHIP_MIN_SPEED; // Reset target speed to min
                            ship.acceleration = 0;
                            ship.orbitDirection *= -1; // Flip orbit direction
                            // Do not update worldX, worldY for this frame if collision
                        } else {
                            // No collision, proceed with movement
                            ship.orbitAngle = nextOrbitAngle;
                            ship.orbitAngle = normalizeAngle(ship.orbitAngle);

                            ship.worldX = predictedWorldX;
                            ship.worldY = predictedWorldY;

                            // Wrap world coordinates
                            ship.worldX = wrap(ship.worldX, WORLD_WIDTH);
                            ship.worldY = wrap(ship.worldY, WORLD_HEIGHT);

                            // --- Update heading correctly based on orbital tangent ---
                            let velocityAngleRad;
                            if (ship.orbitDirection === 1) { // Clockwise orbit
                                // Velocity vector at (cos(angle), sin(angle)) is (-sin(angle), cos(angle))
                                velocityAngleRad = Math.atan2(-Math.sin(ship.orbitAngle), Math.cos(ship.orbitAngle));
                            } else { // Counter-clockwise orbit
                                // Velocity vector at (cos(angle), sin(angle)) is (sin(angle), -cos(angle))
                                velocityAngleRad = Math.atan2(Math.sin(ship.orbitAngle), -Math.cos(ship.orbitAngle));
                            }
                            // Convert Cartesian angle (0 right, counter-clockwise) to Compass angle (0 up, clockwise)
                            ship.heading = normalizeDegreeAngle(90 - radiansToDegrees(velocityAngleRad));
                            // --- End heading calculation ---
                        }
                    }

                    // Update sonar revelation status (temporary for ships)
                    if (ship.isRevealedBySonar && currentTime > ship.revealedSonarEndTime) {
                        ship.isRevealedBySonar = false;
                    }
                }

                // --- Periscope Visibility Check for Patrol Ships (after initial reset of isPeriscopeVisible) ---
                if (submarine.periscopeDeployed && !submarine.isPeriscopeAnimating && isDepthValidForPeriscope && isSpeedValidForPeriscope) {
                    const subHeadingRad = degreesToRadians(submarine.heading);
                    const periscopeWorldPointX = submarine.worldX - COCKPIT_OFFSET_Y * Math.sin(subHeadingRad);
                    const periscopeWorldPointY = submarine.worldY + COCKPIT_OFFSET_Y * Math.cos(subHeadingRad);

                    const dxWorld = submarine.worldMouseX - periscopeWorldPointX;
                    const dyWorld = submarine.worldMouseY - periscopeWorldPointY;

                    const periscopeToMouseWorldAngle = Math.atan2(dyWorld, dxWorld);

                    const fovAngleRad = degreesToRadians(PERISCOPE_FOV_ANGLE_DEG);

                    const fovStartAngle = periscopeToMouseWorldAngle - fovAngleRad;
                    const fovEndAngle = periscopeToMouseWorldAngle + fovAngleRad;

                    for (const pShip of patrolShips) {
                        const distToShipCenter = Math.sqrt(
                            (pShip.worldX - periscopeWorldPointX)**2 +
                            (pShip.worldY - periscopeWorldPointY)**2
                        );

                        if (distToShipCenter <= PERISCOPE_SURFACE_VIEW_RANGE) {
                            const angleToShip = Math.atan2(
                                pShip.worldY - periscopeWorldPointY,
                                pShip.worldX - periscopeWorldPointX
                            );

                            if (isAngleBetween(angleToShip, fovStartAngle, fovEndAngle)) {
                                if (!isLineOfSightBlocked(periscopeWorldPointX, periscopeWorldPointY, pShip.worldX, pShip.worldY, pShip, islands, patrolShips, true)) {
                                    pShip.isPeriscopeVisible = true;
                                    // Assign Master ID on first detection via periscope
                                    if (!pShip.isMasterIdAssigned) {
                                        masterShipCounter++;
                                        pShip.assignedMasterId = masterShipCounter;
                                        pShip.isMasterIdAssigned = true;
                                    }
                                    pShip.isDetected = true; // Mark as detected upon periscope visibility
                                }
                            }
                        }
                    }
                }

                // --- Surface Visibility Check for Patrol Ships (Updates isDetected) ---
                const isAtSurface = submarine.depth <= FADE_START_DEPTH;
                if (isAtSurface && !submarine.isMapModeActive) { // Only check if near surface and not in map mode
                    for (const pShip of patrolShips) {
                        // Calculate distance to the ship from the submarine's current position
                        const dx = pShip.worldX - submarine.worldX;
                        const dy = pShip.worldY - submarine.worldY;
                        const distToShip = Math.sqrt(dx * dx + dy * dy);

                        // Only consider detection if within SURFACE_DETECTION_RANGE and visible on screen
                        if (distToShip <= SURFACE_DETECTION_RANGE && isShipInCurrentView(pShip)) {
                            // Check for Line of Sight block by islands (ships ARE blockers for surface vision)
                            if (!isLineOfSightBlocked(submarine.worldX, submarine.worldY, pShip.worldX, pShip.worldY, pShip, islands, patrolShips, true)) {
                                // Assign Master ID on first detection via direct surface view
                                if (!pShip.isMasterIdAssigned) {
                                    masterShipCounter++;
                                    pShip.assignedMasterId = masterShipCounter;
                                    pShip.isMasterIdAssigned = true;
                                }
                                pShip.isDetected = true; // Mark as detected upon surface view
                            }
                        }
                    }
                }

                // --- Update Torpedoes (NEW) ---
                const torpedoesToRemove = [];
                for (let i = 0; i < torpedoes.length; i++) {
                    const torpedo = torpedoes[i];
                    const elapsedTorpedoTime = currentTime - torpedo.launchTime;

                    // Remove torpedo if it has exceeded its lifetime
                    if ((torpedo.type === 'player-torpedo' && elapsedTorpedoTime > TORPEDO_LIFETIME_MS) ||
                        (torpedo.type === 'enemy-torpedo' && elapsedTorpedoTime > ENEMY_TORPEDO_LIFETIME_MS)) {
                        torpedoesToRemove.push(i);
                        continue; // Skip further processing for this torpedo
                    }

                    // Determine current target for homing logic
                    let currentTargetX = null;
                    let currentTargetY = null;
                    let homingSpeedBoost = 0;
                    let homingTurnRate = 0;

                    if (torpedo.type === 'enemy-torpedo') {
                        // Enemy torpedoes always target the submarine
                        currentTargetX = submarine.worldX;
                        currentTargetY = submarine.worldY;
                        homingSpeedBoost = torpedo.maxAccelerationBonus; // Use the stored (potentially boosted) value
                        homingTurnRate = REGULAR_TURN_RATE_MAGNITUDE * ENEMY_TORPEDO_TURN_RATE_MULTIPLIER;
                    } else if (torpedo.type === 'player-torpedo') {
                        // Player torpedoes home on a specific patrol ship
                        const targetShip = (torpedo.masterIdToTrack !== null) ? patrolShips.find(ship => ship.assignedMasterId === torpedo.masterIdToTrack) : null;
                        if (targetShip) {
                            currentTargetX = targetShip.worldX;
                            currentTargetY = targetShip.worldY;
                            // Update last known position for player torpedoes
                            torpedo.lastKnownTargetWorldX = targetShip.worldX;
                            torpedo.lastKnownTargetWorldY = targetShip.worldY;
                        } else if (torpedo.lastKnownTargetWorldX !== null) {
                            // If target ship no longer exists, but we have a last known position, continue towards it.
                            currentTargetX = torpedo.lastKnownTargetWorldX;
                            currentTargetY = torpedo.lastKnownTargetWorldY;
                        }
                        homingSpeedBoost = TORPEDO_MAX_ACCELERATION_BONUS;
                        homingTurnRate = REGULAR_TURN_RATE_MAGNITUDE * TORPEDO_TURN_RATE_MULTIPLIER;
                    }

                    // Torpedo pinging logic: ALWAYS ping if enough time has passed
                    if (currentTime - torpedo.lastPingTime >= TORPEDO_PING_INTERVAL_MS) {
                        const torpedoHeadingRad = degreesToRadians(torpedo.heading - 90);
                        const pingOriginX = torpedo.worldX + (10 * Math.cos(torpedoHeadingRad));
                        const pingOriginY = torpedo.worldY + (10 * Math.sin(torpedoHeadingRad));

                        const newTorpedoPing = {
                            x: pingOriginX,
                            y: pingOriginY,
                            color: 'yellow',
                            radius: 0,
                            prevRadius: 0,
                            maxRadius: TORPEDO_PING_RADIUS,
                            speed: SONAR_PING_SPEED * 0.75,
                            echoedIslands: new Set(),
                            echoedShips: new Set(),
                            detectionSoundPlayed: false,
                            type: 'torpedo-ping',
                            originatorMasterId: torpedo.masterIdToTrack,
                            originatorTorpedoId: torpedo.id // This ties the ping back to the specific torpedo
                        };
                        sonarPings.push(newTorpedoPing);
                        torpedo.lastPingTime = currentTime;
                    }

                    // Torpedo heading update:
                    if (currentTargetX !== null) {
                        const dx = currentTargetX - torpedo.worldX;
                        const dy = currentTargetY - torpedo.worldY;
                        const targetBearingDeg = normalizeDegreeAngle(radiansToDegrees(Math.atan2(dy, dx)) + 90);
                        torpedo.heading = turnTowards(torpedo.heading, targetBearingDeg, homingTurnRate, deltaTimeInSeconds);
                    }

                    // Acceleration logic for torpedo:
                    let distToTargetForAccel = Infinity;
                    if (currentTargetX !== null) {
                        distToTargetForAccel = Math.sqrt(
                            (currentTargetX - torpedo.worldX)**2 +
                            (currentTargetY - torpedo.worldY)**2
                        );
                    }

                    if (distToTargetForAccel <= TORPEDO_PROXIMITY_ACCEL_DISTANCE) {
                        torpedo.speed = Math.min(torpedo.initialSpeed + homingSpeedBoost, torpedo.speed + (homingSpeedBoost * 5 * deltaTimeInSeconds));
                    } else {
                        torpedo.speed = Math.min(torpedo.initialSpeed + homingSpeedBoost, torpedo.speed + (homingSpeedBoost * deltaTimeInSeconds));
                    }

                    // Update torpedo position
                    const moveDistance = torpedo.speed * deltaTimeInSeconds;
                    const moveRadians = degreesToRadians(torpedo.heading - 90);
                    torpedo.worldX += moveDistance * Math.cos(moveRadians);
                    torpedo.worldY += moveDistance * Math.sin(moveRadians);

                    // Wrap torpedo world coordinates
                    torpedo.worldX = wrap(torpedo.worldX, WORLD_WIDTH);
                    torpedo.worldY = wrap(torpedo.worldY, WORLD_HEIGHT);

                    // Check for torpedo collision with patrol ships (only for player torpedoes)
                    if (torpedo.type === 'player-torpedo') {
                        for (let j = 0; j < patrolShips.length; j++) {
                            const pShip = patrolShips[j];
                            const distSq = (torpedo.worldX - pShip.worldX)**2 + (torpedo.worldY - pShip.worldY)**2;
                            const combinedRadiusSq = (pShip.radius + TORPEDO_HIT_RADIUS)**2;
                            if (distSq < combinedRadiusSq) {
                                console.log(`Torpedo (ID: ${torpedo.id}) hit Master #${pShip.assignedMasterId}!`);
                                torpedoesToRemove.push(i); // Mark torpedo for removal

                                pShip.currentHealth -= TORPEDO_DAMAGE; // Apply damage

                                if (pShip.currentHealth <= 0) {
                                    // Ship is defeated
                                    console.log(`Master #${pShip.assignedMasterId} defeated!`);

                                    // Trigger explosion effect
                                    explosions.push({
                                        x: pShip.worldX,
                                        y: pShip.worldY,
                                        startTime: currentTime,
                                        duration: EXPLOSION_DURATION_MS
                                    });
                                    playExplosionSound();

                                    // Remove the hit ship
                                    patrolShips.splice(j, 1);
                                    // If the hit ship was targeted, clear the target
                                    if (submarine.targetedMasterId === pShip.assignedMasterId) {
                                        submarine.targetedMasterId = null;
                                    }
                                    updateUI(); // Update UI to reflect ship removal

                                    // Spawn a new patrol ship
                                    if (patrolShips.length < PATROL_SHIP_COUNT) {
                                        const SPAWN_MIN_DISTANCE = 750;
                                        const suitableIslands = islands.filter(island => {
                                            const centroid = getPolygonCentroid(island.points);
                                            const dist = Math.sqrt(
                                                (centroid.x - submarine.worldX)**2 +
                                                (centroid.y - submarine.worldY)**2
                                            );
                                            return dist > SPAWN_MIN_DISTANCE;
                                        });

                                        if (suitableIslands.length > 0) {
                                            const randomIndex = Math.floor(Math.random() * suitableIslands.length);
                                            const spawnIsland = suitableIslands[randomIndex];
                                            
                                            let newShip = null;
                                            let spawnAttempts = 0;
                                            const MAX_SPAWN_ATTEMPTS = 100;

                                            while (spawnAttempts < MAX_SPAWN_ATTEMPTS) {
                                                spawnAttempts++;
                                                newShip = createPatrolShip(spawnIsland);

                                                let collidesAtSpawn = false;
                                                for (const island of islands) {
                                                    if (circlePolygonCollision({ x: newShip.worldX, y: newShip.worldY, radius: newShip.radius }, island.points)) {
                                                        collidesAtSpawn = true;
                                                        break;
                                                    }
                                                }

                                                if (!collidesAtSpawn) {
                                                    patrolShips.push(newShip);
                                                    console.log(`Spawned new Master #${newShip.assignedMasterId} at a safe distance.`);
                                                    break;
                                                } else {
                                                    // console.log(`Respawn attempt ${spawnAttempts}: New ship tried to spawn on an island, retrying...`);
                                                }
                                            }
                                            if (spawnAttempts >= MAX_SPAWN_ATTEMPTS) {
                                                console.warn(`Failed to spawn a new patrol ship without initial collision after ${MAX_SPAWN_ATTEMPTS} attempts. Spawning anyway (might be on an island).`);
                                                patrolShips.push(newShip);
                                            }
                                        } else {
                                            console.log("No suitable islands found to spawn a new enemy ship further than 750m from player.");
                                        }
                                    }
                                }
                                break; // Torpedo exploded, stop checking other ships for this torpedo
                            }
                        }
                    }

                    // Check for torpedo collision with islands
                    for (const island of islands) {
                        const torpedoCircle = { x: torpedo.worldX, y: torpedo.worldY, radius: TORPEDO_HIT_RADIUS };
                        if (circlePolygonCollision(torpedoCircle, island.points)) {
                            console.log(`Torpedo (ID: ${torpedo.id}) hit an island!`);
                            torpedoesToRemove.push(i); // Mark torpedo for removal

                            // Trigger explosion effect at island impact point
                            explosions.push({
                                x: torpedo.worldX,
                                y: torpedo.worldY,
                                startTime: currentTime,
                                duration: EXPLOSION_DURATION_MS
                            });
                            playExplosionSound();
                            break; // Torpedo exploded, stop checking other islands for this torpedo
                        }
                    }

                    // Check for enemy torpedo collision with submarine
                    if (torpedo.type === 'enemy-torpedo') {
                        const subCollisionCircles = [];
                        const radians_for_hitbox = submarine.heading * Math.PI / 180;
                        const localOffsetsY = [-SUBMARINE_HITBOX_OFFSET_Y, 0, SUBMARINE_HITBOX_OFFSET_Y];

                        for (const offset_y of localOffsetsY) {
                            const rotated_x = (offset_y * Math.sin(radians_for_hitbox));
                            const rotated_y = -(offset_y * Math.cos(radians_for_hitbox));
                            subCollisionCircles.push({
                                x: submarine.worldX + rotated_x,
                                y: submarine.worldY + rotated_y,
                                radius: SUBMARINE_HITBOX_CIRCLE_RADIUS
                            });
                        }

                        let hitSub = false;
                        for (const subCircle of subCollisionCircles) {
                            const distSq = (torpedo.worldX - subCircle.x)**2 + (torpedo.worldY - subCircle.y)**2;
                            const combinedRadiusSq = (subCircle.radius + TORPEDO_HIT_RADIUS)**2;
                            if (distSq < combinedRadiusSq) {
                                hitSub = true;
                                break;
                            }
                        }

                        if (hitSub) {
                            console.log(`Enemy torpedo (ID: ${torpedo.id}) hit the submarine!`);
                            torpedoesToRemove.push(i);

                            // Apply damage to submarine
                            submarine.currentHealth -= ENEMY_TORPEDO_DAMAGE;
                            updateUI(); // Update health display immediately
                            flashElementRed('playerHealthDisplay'); // Flash health display

                            // Trigger explosion effect
                            explosions.push({
                                x: torpedo.worldX,
                                y: torpedo.worldY,
                                startTime: currentTime,
                                duration: EXPLOSION_DURATION_MS
                            });
                            playExplosionSound();

                            if (submarine.currentHealth <= 0) {
                                gameOver("Your submarine was destroyed by an enemy torpedo!");
                            }
                        }
                    }
                }

                // Remove torpedoes that have expired or hit targets (from back to front)
                for (let i = torpedoesToRemove.length - 1; i >= 0; i--) {
                    torpedoes.splice(torpedoesToRemove[i], 1);
                }

                // --- Update Missiles (NEW) ---
                const missilesToRemove = [];
                for (let i = 0; i < missiles.length; i++) {
                    const missile = missiles[i];
                    const elapsedMissileTime = currentTime - missile.launchTime;

                    // Phase 1: Growth
                    if (elapsedMissileTime < MISSILE_GROWTH_DURATION_MS) {
                        const progress = elapsedMissileTime / MISSILE_GROWTH_DURATION_MS;
                        missile.currentRadius = MISSILE_START_RADIUS + (MISSILE_END_RADIUS - MISSILE_START_RADIUS) * progress;
                        missile.speed = MISSILE_INITIAL_SPEED; // Stays 0 during growth
                    }
                    // Phase 2: Acceleration and Movement
                    else {
                        // Ensure initial speed after growth phase
                        if (missile.speed === MISSILE_INITIAL_SPEED) {
                            missile.speed = MISSILE_ACCEL_START_SPEED_THRESHOLD;
                        }

                        // Check if tail should extend (speed above threshold)
                        if (missile.speed > MISSILE_ACCEL_START_SPEED_THRESHOLD && !missile.hasExtendedTail) {
                            missile.hasExtendedTail = true;
                            console.log(`Missile (ID: ${missile.id}) extended tail and started rapid acceleration!`);
                        }

                        // Rapidly accelerate towards max speed
                        missile.speed = Math.min(MISSILE_MAX_SPEED, missile.speed + MISSILE_RAPID_ACCEL_RATE * deltaTimeInSeconds);

                        // Update position towards target (missile heading is set at launch)
                        const moveDistance = missile.speed * deltaTimeInSeconds;
                        const moveRadians = degreesToRadians(missile.heading - 90); // Missile heading is already set towards target

                        missile.worldX += moveDistance * Math.cos(moveRadians);
                        missile.worldY += moveDistance * Math.sin(moveRadians);

                        // Check if missile has reached its target (within a small threshold)
                        const dx = missile.targetX - missile.worldX;
                        const dy = missile.targetY - missile.worldY;
                        const distToTargetSq = dx * dx + dy * dy;
                        const thresholdSq = (missile.speed * deltaTimeInSeconds)**2; // If distance is less than distance traveled in this frame, it has likely passed

                        if (distToTargetSq < thresholdSq) {
                            missilesToRemove.push(i);
                            console.log(`Missile (ID: ${missile.id}) reached target.`);
                            // Remove the corresponding target box from the array based on its unique ID
                            const targetIndex = submarine.missileTargets.findIndex(target => target.id === missile.assignedTargetId);
                            if (targetIndex !== -1) {
                                submarine.missileTargets.splice(targetIndex, 1);
                                console.log(`Missile target (ID: ${missile.assignedTargetId}) removed as missile impacted.`);
                            }
                            // In the future, this would be where explosion/damage occurs
                        }
                    }
                }

                // Remove missiles that have reached target or expired
                for (let i = missilesToRemove.length - 1; i >= 0; i--) {
                    missiles.splice(missilesToRemove[i], 1);
                }

                // --- Update Explosions (NEW) ---
                const explosionsToRemove = [];
                for (let i = 0; i < explosions.length; i++) {
                    const explosion = explosions[i];
                    const elapsedTime = currentTime - explosion.startTime;

                    if (elapsedTime > explosion.duration) {
                        explosionsToRemove.push(i);
                    }
                }

                for (let i = explosionsToRemove.length - 1; i >= 0; i--) {
                    explosions.splice(explosionsToRemove[i], 1);
                }
            }


            // --- Drawing Helper Functions ---

            /**
             * Draws white revealed areas over islands.
             * @param {number} currentDrawingZoomFactor - Current zoom for line widths.
             */
            function drawRevealedAreas(currentDrawingZoomFactor) {
                // Revealed areas are only relevant in normal view when submerged, or in map view.
                // In surface view, islands are visible by default (full color, no white overlay).
                // If map mode, always draw revealed areas.
                // If not map mode, only draw if submerged.
                if (submarine.isMapModeActive || submarine.depth > FADE_START_DEPTH) {
                    for (const revealed of revealedAreas) {
                        ctx.save();
                        ctx.beginPath();
                        ctx.arc(revealed.x, revealed.y, revealed.radius, 0, Math.PI * 2);
                        ctx.clip(); // Clip to the revealed circle
                        ctx.fillStyle = 'white';
                        // Redraw all islands inside the clip with white color
                        for (let i = 0; i < islands.length; i++) {
                            const island = islands[i];
                            ctx.beginPath();
                            for (let j = 0; j < island.points.length; j++) {
                                const p = island.points[j];
                                if (j === 0) ctx.moveTo(p.x, p.y);
                                else ctx.lineTo(p.x, p.y);
                            }
                            ctx.closePath();
                            ctx.fill();
                        }
                        ctx.restore(); // Restore to remove the clip
                    }
                }
            }

            /**
             * Draws the grid lines.
             * @param {number} currentDrawingZoomFactor - Current zoom for line widths.
             */
            function drawGrid(currentDrawingZoomFactor) {
                const gridDrawStartX = Math.floor((submarine.worldX - canvas.width / (2 * currentDrawingZoomFactor)) / GRID_SIZE) * GRID_SIZE;
                const gridDrawEndX = Math.ceil((submarine.worldX + canvas.width / (2 * currentDrawingZoomFactor)) / GRID_SIZE) * GRID_SIZE;
                const gridDrawStartY = Math.floor((submarine.worldY - canvas.height / (2 * currentDrawingZoomFactor)) / GRID_SIZE) * GRID_SIZE;
                const gridDrawEndY = Math.ceil((submarine.worldY + canvas.height / (2 * currentDrawingZoomFactor)) / GRID_SIZE) * GRID_SIZE;

                ctx.strokeStyle = '#21262d';
                ctx.lineWidth = 0.5 / currentDrawingZoomFactor;

                for (let xWorld = gridDrawStartX; xWorld <= gridDrawEndX; xWorld += GRID_SIZE) {
                    const wrappedX = wrap(xWorld, WORLD_WIDTH);
                    ctx.beginPath();
                    ctx.moveTo(wrappedX, 0);
                    ctx.lineTo(wrappedX, WORLD_HEIGHT); 
                    ctx.stroke();
                }
                for (let yWorld = gridDrawStartY; yWorld <= gridDrawEndY; yWorld += GRID_SIZE) {
                    const wrappedY = wrap(yWorld, WORLD_HEIGHT);
                    ctx.beginPath();
                    ctx.moveTo(0, wrappedY);
                    ctx.lineTo(WORLD_WIDTH, wrappedY);
                    ctx.stroke();
                }
            }

            /**
             * Draws debug hitboxes for submarine and islands.
             * @param {number} currentDrawingZoomFactor - Current zoom for line widths.
             */
            function drawHitboxes(currentDrawingZoomFactor) {
                ctx.strokeStyle = 'rgba(255, 165, 0, 0.9)'; // Orange for the oval approximation hitboxes
                ctx.lineWidth = 1 / currentDrawingZoomFactor;

                // Draw the three collision circles for the submarine
                const localOffsetsY = [-SUBMARINE_HITBOX_OFFSET_Y, 0, SUBMARINE_HITBOX_OFFSET_Y];
                const radians = degreesToRadians(submarine.heading);

                for (const offset_y of localOffsetsY) {
                    const rotated_x = (offset_y * Math.sin(radians));
                    const rotated_y = -(offset_y * Math.cos(radians));
                    const circleWorldX = submarine.worldX + rotated_x;
                    const circleWorldY = submarine.worldY + rotated_y;
                    ctx.beginPath();
                    ctx.arc(circleWorldX, circleWorldY, SUBMARINE_HITBOX_CIRCLE_RADIUS, 0, Math.PI * 2);
                    ctx.stroke();
                }
                // Draw island hitboxes (polygons)
                ctx.strokeStyle = 'rgba(255, 255, 0, 0.7)'; // Yellow for island hitboxes
                for (let i = 0; i < islands.length; i++) {
                    const island = islands[i];
                    ctx.beginPath();
                    for (let j = 0; j < island.points.length; j++) {
                        const p = island.points[j];
                        if (j === 0) {
                            ctx.moveTo(p.x, p.y);
                        } else {
                            ctx.lineTo(p.x, p.y);
                        }
                    }
                    ctx.closePath();
                    ctx.stroke();
                }

                // Draw patrol ship hitboxes (circles)
                ctx.strokeStyle = 'rgba(0, 255, 255, 0.7)'; // Cyan for patrol ship hitboxes
                for (const ship of patrolShips) {
                    ctx.beginPath();
                    ctx.arc(ship.worldX, ship.worldY, ship.radius, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }

            /**
             * Draws active sonar pings.
             * @param {number} currentDrawingZoomFactor - Current zoom for line widths.
             */
            function drawSonarPings(currentDrawingZoomFactor) {
                for (const ping of sonarPings) {
                    drawPing(ping, currentDrawingZoomFactor);
                }
            }

            /**
             * Draws a patrol ship on the canvas.
             * @param {object} ship - The patrol ship object.
             * @param {number} zoomFactor - The current zoom factor for the canvas.
             * @param {number} displayAlpha - The alpha value to use for drawing the ship (0-1).
             */
            function drawPatrolShip(ship, zoomFactor, displayAlpha) {
                ctx.save();
                // Apply a global rotation and translation
                ctx.translate(ship.worldX, ship.worldY);

                let rotationAngle = degreesToRadians(ship.heading);
                // Add 90 degrees only if NOT in detection/lock-on mode (i.e., patrolling)
                if (!ship.isDetectingPlayer) {
                    rotationAngle += degreesToRadians(90); // Rotate 90 degrees clockwise from its calculated heading
                }
                ctx.rotate(rotationAngle);


                // Draw body (circle) with dark grey fill
                ctx.fillStyle = `rgba(50, 50, 50, ${displayAlpha})`; // Use displayAlpha
                ctx.beginPath();
                ctx.arc(0, 0, ship.radius, 0, Math.PI * 2);
                ctx.fill();

                // Draw outline
                ctx.strokeStyle = `rgba(0,0,0,${displayAlpha * 0.5})`; // Outline fades with ship
                ctx.lineWidth = 1 / zoomFactor;
                ctx.stroke();

                // Draw a small indicator for forward direction (triangle) with red fill
                ctx.fillStyle = `rgba(255, 0, 0, ${displayAlpha * 0.8})`; // Red as requested, fades with ship
                ctx.beginPath();
                ctx.moveTo(0, -ship.radius); // Top center (points "forward" along local Y-axis)
                ctx.lineTo(-ship.radius * 0.6, ship.radius * 0.6); // Bottom left
                ctx.lineTo(ship.radius * 0.6, ship.radius * 0.6); // Bottom right
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            }

            /**
             * Draws the periscope's field of view lines in yellow.
             * @param {number} currentDrawingZoomFactor - Current zoom for line widths.
             */
            function drawPeriscopeLines(currentDrawingZoomFactor) {
                ctx.save();
                // Translate to the submarine's world position, then rotate by its heading
                ctx.translate(submarine.worldX, submarine.worldY);
                ctx.rotate(degreesToRadians(submarine.heading));

                ctx.strokeStyle = 'yellow';
                ctx.lineWidth = 1 / currentDrawingZoomFactor; // Thin lines
                ctx.globalAlpha = 0.7; // Slightly transparent

                // Periscope is located at COCKPIT_OFFSET_Y relative to submarine center, along the negative Y axis
                // when submarine heading is 0.
                const periscopeLocalY = COCKPIT_OFFSET_Y;

                // Angle from submarine's forward (local -Y axis) to the mouse.
                // Mouse coordinates are in world space, relative to submarine's center in current drawing context.
                // Need to convert worldMouseX/Y (relative to submarine.worldX/Y) to local coordinates.
                // Remember that the current transform has already moved (submarine.worldX, submarine.worldY) to (0,0).
                // So, we just need to rotate the worldMouseX/Y relative to (0,0) by -submarine.heading.
                const relativeMouseX = submarine.worldMouseX - submarine.worldX;
                const relativeMouseY = submarine.worldMouseY - submarine.worldY;

                const cosHeading = Math.cos(-degreesToRadians(submarine.heading));
                const sinHeading = Math.sin(-degreesToRadians(submarine.heading));

                const localMouseX = relativeMouseX * cosHeading - relativeMouseY * sinHeading;
                const localMouseY = relativeMouseX * sinHeading + relativeMouseY * cosHeading;

                // Angle from periscope (0, periscopeLocalY) to localMouseX, localMouseY
                const periscopeLookAngleRad = Math.atan2(localMouseY - periscopeLocalY, localMouseX);

                const fovAngleRad = degreesToRadians(PERISCOPE_FOV_ANGLE_DEG);

                const line1Angle = periscopeLookAngleRad - fovAngleRad;
                const line2Angle = periscopeLookAngleRad + fovAngleRad;

                // Line starts from periscope location
                ctx.beginPath();
                ctx.moveTo(0, periscopeLocalY);
                ctx.lineTo(0 + PERISCOPE_FOV_LINE_LENGTH * Math.cos(line1Angle), periscopeLocalY + PERISCOPE_FOV_LINE_LENGTH * Math.sin(line1Angle));
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, periscopeLocalY);
                ctx.lineTo(0 + PERISCOPE_FOV_LINE_LENGTH * Math.cos(line2Angle), periscopeLocalY + PERISCOPE_FOV_LINE_LENGTH * Math.sin(line2Angle));
                ctx.stroke();

                ctx.restore();
            }

            /**
             * Draws the static compass ring and markings.
             */
            function drawCompass() {
                // Compass is always drawn at the center of the canvas, regardless of zoom or world position
                ctx.save();
                ctx.translate(canvas.width / 2, canvas.height / 2); // Center of canvas

                const ringRadius = COMPASS_VISUAL_RADIUS_PX;

                // Draw the outer white ring
                ctx.strokeStyle = '#e6edf3'; // Light white
                ctx.lineWidth = 2; // Fixed thickness
                ctx.beginPath();
                ctx.arc(0, 0, ringRadius, 0, Math.PI * 2);
                ctx.stroke();

                // Draw direction markers (N, E, S, W)
                ctx.fillStyle = '#e6edf3';
                ctx.font = '14px "Inter", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                const textOffset = ringRadius + 15; // Distance of text from center

                // N (0 degrees, pointing upwards)
                ctx.fillText('N', 0, -textOffset);
                // E (90 degrees, pointing right)
                ctx.fillText('E', textOffset, 0);
                // S (180 degrees, pointing downwards)
                ctx.fillText('S', 0, textOffset);
                // W (270 degrees, pointing left)
                ctx.fillText('W', -textOffset, 0);

                // Draw smaller tick marks
                ctx.lineWidth = 1;
                for (let i = 0; i < 360; i += 10) { // Every 10 degrees
                    if (i % 90 !== 0) { // Skip N, E, S, W as they have text
                        const angleRad = degreesToRadians(i - 90); // Adjust to start from top (N) and go clockwise
                        const tickLength = (i % 30 === 0) ? 8 : 4; // Longer ticks for every 30 degrees
                        ctx.beginPath();
