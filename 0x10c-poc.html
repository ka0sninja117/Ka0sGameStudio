<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NEXUS // AWAKENING</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #010106;
      color: #00ff88;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }
    #game-wrapper {
      display: flex;
      flex: 1;
      min-height: 0;
    }
    #canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #gameCanvas {
      display: block;
      background: #070710;
    }
    #keyhints {
      position: absolute;
      bottom: 8px;
      left: 8px;
      font-size: 10px;
      color: #003322;
      letter-spacing: 1px;
      pointer-events: none;
    }
    #sidebar {
      width: 260px;
      display: flex;
      flex-direction: column;
      background: #050510;
      border-left: 1px solid #0a1a2a;
      min-height: 0;
    }
    #inventory-panel {
      padding: 12px;
      border-bottom: 1px solid #0a1a2a;
    }
    .panel-title {
      font-size: 10px;
      letter-spacing: 3px;
      color: #004433;
      text-transform: uppercase;
      margin-bottom: 8px;
      border-bottom: 1px solid #002211;
      padding-bottom: 4px;
    }
    .fragment-item {
      display: flex;
      align-items: center;
      padding: 5px 6px;
      margin: 3px 0;
      background: #030312;
      border: 1px solid #080820;
      border-radius: 2px;
      font-size: 11px;
      transition: border-color 0.4s, box-shadow 0.4s;
    }
    .fragment-item.active {
      border-color: #00cc66;
      box-shadow: 0 0 8px rgba(0,200,100,0.2);
    }
    .fragment-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 8px;
      flex-shrink: 0;
    }
    .fragment-label { flex: 1; }
    .fragment-count { font-weight: bold; }
    #scan-log {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      min-height: 0;
      scrollbar-width: thin;
      scrollbar-color: #002211 transparent;
    }
    #scan-log::-webkit-scrollbar { width: 4px; }
    #scan-log::-webkit-scrollbar-thumb { background: #002211; }
    .log-line {
      font-size: 11px;
      line-height: 1.7;
      color: #004422;
    }
    .log-line.system  { color: #003a1f; }
    .log-line.acquire { color: #00cc55; }
    .log-line.error   { color: #aa2200; }
    .log-line.success { color: #00ffaa; }
    #status-bar {
      height: 38px;
      background: #030310;
      border-top: 1px solid #0a1a2a;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 18px;
      font-size: 10px;
      letter-spacing: 1px;
      color: #004433;
      flex-shrink: 0;
    }
    .status-item { display: flex; align-items: center; gap: 6px; }
    .bar-track {
      height: 4px;
      border-radius: 2px;
      background: #001a0d;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.2s, background 0.3s;
    }
    #power-track { width: 70px; }
    #scan-track  { width: 55px; }
    #overlay {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 100;
      pointer-events: none;
      opacity: 1;
      transition: opacity 1.8s ease;
    }
  </style>
</head>
<body>
  <div id="overlay"></div>

  <div id="game-wrapper">
    <div id="canvas-container">
      <canvas id="gameCanvas"></canvas>
      <div id="keyhints">WASD / ARROWS — MOVE &nbsp;|&nbsp; [E] — SCAN TECH &nbsp;|&nbsp; [F] — INTERFACE</div>
    </div>
    <div id="sidebar">
      <div id="inventory-panel">
        <div class="panel-title">// FRAGMENT CACHE</div>
        <div id="inventory-list"></div>
      </div>
      <div id="scan-log">
        <div class="panel-title">// SYSTEM LOG</div>
        <div id="log-entries"></div>
      </div>
    </div>
  </div>

  <div id="status-bar">
    <div class="status-item">
      PWR
      <div class="bar-track" id="power-track">
        <div class="bar-fill" id="power-fill" style="width:100%; background:#00aa44;"></div>
      </div>
      <span id="power-pct">100%</span>
    </div>
    <div class="status-item">
      SCAN
      <div class="bar-track" id="scan-track">
        <div class="bar-fill" id="scan-fill" style="width:100%; background:#0066cc;"></div>
      </div>
    </div>
    <span class="status-item" id="frag-count">FRAGS: 0</span>
    <span class="status-item" id="location">LOC: UNKNOWN</span>
    <span class="status-item" style="margin-left:auto; color:#002211;">NEXUS // AWAKENING &nbsp;v0.1-poc</span>
  </div>

  <script>
    const GAME_VERSION = 'v0.1-poc';

    // ── TILE CONSTANTS ────────────────────────────────────────────────────────
    const TILE = 32;
    const VOID = 0, WALL = 1, FLOOR = 2, DOOR_LOCKED = 3, DOOR_OPEN = 4;

    // ── MAP BUILD ─────────────────────────────────────────────────────────────
    const MAP_COLS = 42;
    const MAP_ROWS = 38;

    const mapData = (function () {
      const m = Array.from({ length: MAP_ROWS }, () => new Array(MAP_COLS).fill(VOID));
      function rect(c0, r0, c1, r1, v) {
        for (let r = r0; r <= r1; r++)
          for (let c = c0; c <= c1; c++) m[r][c] = v;
      }
      function room(c0, r0, c1, r1) {
        rect(c0, r0, c1, r1, WALL);
        rect(c0 + 1, r0 + 1, c1 - 1, r1 - 1, FLOOR);
      }
      // Room 1 — Entry Chamber
      room(1, 1, 23, 19);
      // Corridor
      room(10, 19, 13, 27);
      // Room 2 — Processing Core
      room(4, 27, 28, 37);
      // Open corridor mouths
      m[19][11] = FLOOR; m[19][12] = FLOOR;
      m[27][11] = FLOOR; m[27][12] = FLOOR;
      // Locked bulkhead
      m[23][11] = DOOR_LOCKED;
      m[23][12] = DOOR_LOCKED;
      return m;
    })();

    // ── FRAGMENT DEFS ─────────────────────────────────────────────────────────
    const FRAGMENTS = {
      LOOP_FRAGMENT: { label: 'LOOP FRAGMENT',  color: '#2299ff', dot: '#1166cc' },
      SENSOR_NODE:   { label: 'SENSOR NODE',    color: '#ffaa11', dot: '#cc7700' },
      ACTUATOR_UNIT: { label: 'ACTUATOR UNIT',  color: '#bb44ff', dot: '#8822cc' },
      CORE_SHARD:    { label: 'CORE SHARD',     color: '#ff1177', dot: '#cc0055' },
    };

    // ── TECH OBJECTS ──────────────────────────────────────────────────────────
    class TechObject {
      constructor(col, row, label, drops, shape) {
        this.x = col * TILE + TILE / 2;
        this.y = row * TILE + TILE / 2;
        this.label = label;
        this.drops = drops;   // [{type, count}]
        this.shape = shape;   // 'console'|'scanner'|'drone'|'core'
        this.intact = true;
        this.glowPhase = Math.random() * Math.PI * 2;
        this.scanStartTime = -1;
      }
    }

    const techObjects = [
      // Room 1
      new TechObject(5,  6,  'RUSTED CONSOLE',   [{type:'LOOP_FRAGMENT', count:2}], 'console'),
      new TechObject(18, 13, 'BROKEN SCANNER',   [{type:'SENSOR_NODE',   count:1}], 'scanner'),
      new TechObject(4,  16, 'DEAD TERMINAL',    [{type:'LOOP_FRAGMENT', count:1}], 'console'),
      new TechObject(20, 5,  'FRACTURED RELAY',  [{type:'LOOP_FRAGMENT', count:1},{type:'SENSOR_NODE', count:1}], 'scanner'),
      // Room 2
      new TechObject(8,  31, 'DORMANT DRONE',    [{type:'ACTUATOR_UNIT', count:2}], 'drone'),
      new TechObject(24, 29, 'AUXILIARY NODE',   [{type:'SENSOR_NODE',   count:1},{type:'ACTUATOR_UNIT', count:1}], 'scanner'),
      new TechObject(15, 35, 'CENTRAL CORE',     [{type:'CORE_SHARD',    count:1}], 'core'),
    ];

    // ── INTERACTABLES ─────────────────────────────────────────────────────────
    class Interactable {
      constructor(col, row, label, requires, unlockMsg) {
        this.x = (col + 0.5) * TILE;  // center between two door tiles
        this.y = row * TILE + TILE / 2;
        this.col = col; this.row = row;
        this.label = label;
        this.requires = requires;     // { FRAGMENT_TYPE: count }
        this.unlockMsg = unlockMsg;
        this.locked = true;
        this.unlockFlash = 0;
      }
    }

    const interactables = [
      new Interactable(11, 23, 'SEALED BULKHEAD',
        { SENSOR_NODE: 1, LOOP_FRAGMENT: 2 },
        'BULKHEAD UNSEALED — PASSAGE CLEARED')
    ];

    // ── PLAYER ────────────────────────────────────────────────────────────────
    const player = {
      x: 12 * TILE + TILE / 2,
      y: 10 * TILE + TILE / 2,
      radius: 10,
      speed: 2.4,
      angle: Math.PI / 2,
      inventory: {},
      scanning: false,
      scanCooldownStart: -99999,
      scanCooldownMs: 2200,
    };

    // ── PARTICLE POOL ─────────────────────────────────────────────────────────
    const particles = [];
    function spawnParticles(wx, wy, colorRGB, count) {
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const spd = 0.7 + Math.random() * 1.8;
        particles.push({
          x: wx, y: wy,
          vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
          life: 1.0, decay: 0.011 + Math.random() * 0.012,
          color: colorRGB, size: 1.5 + Math.random() * 2,
        });
      }
    }

    const scanRings = [];

    // ── AREA TRIGGERS ─────────────────────────────────────────────────────────
    const areaTriggers = [
      {
        id: 'room2', triggered: false,
        r0: 28, c0: 5, r1: 36, c1: 27,
        msg: '> DEEPER SECTOR ACCESSED — ANOMALOUS ENERGY SIGNATURES DETECTED', cls: 'success',
      }
    ];

    // ── INPUT ─────────────────────────────────────────────────────────────────
    const keys = {};
    document.addEventListener('keydown', e => {
      if (!booting) {
        if (e.code === 'KeyE') tryScanning();
        if (e.code === 'KeyF') tryInteract();
      }
      keys[e.code] = true;
    });
    document.addEventListener('keyup', e => { keys[e.code] = false; });

    // ── CANVAS SETUP ──────────────────────────────────────────────────────────
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      const cont = document.getElementById('canvas-container');
      canvas.width  = cont.clientWidth;
      canvas.height = cont.clientHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // ── LOGGING ───────────────────────────────────────────────────────────────
    function log(text, cls = '') {
      const el = document.getElementById('log-entries');
      const div = document.createElement('div');
      div.className = 'log-line ' + cls;
      div.textContent = text;
      el.appendChild(div);
      // Keep log from growing too long
      while (el.children.length > 80) el.removeChild(el.firstChild);
      el.scrollTop = el.scrollHeight;
    }

    // ── INVENTORY UI ──────────────────────────────────────────────────────────
    function updateInventoryUI() {
      const list = document.getElementById('inventory-list');
      list.innerHTML = '';
      let total = 0;
      for (const [key, def] of Object.entries(FRAGMENTS)) {
        const count = player.inventory[key] || 0;
        total += count;
        const div = document.createElement('div');
        div.className = 'fragment-item' + (count > 0 ? ' active' : '');
        div.style.opacity = count > 0 ? '1' : '0.28';
        div.innerHTML =
          `<div class="fragment-dot" style="background:${count>0?def.dot:'#111'}"></div>` +
          `<span class="fragment-label" style="color:${count>0?def.color:'#002'}">` +
          `${def.label}</span>` +
          `<span class="fragment-count" style="color:${count>0?def.color:'#001'}">${count}</span>`;
        list.appendChild(div);
      }
      document.getElementById('frag-count').textContent = `FRAGS: ${total}`;
    }
    updateInventoryUI();

    // ── TILE HELPERS ──────────────────────────────────────────────────────────
    function tileAt(wx, wy) {
      const c = Math.floor(wx / TILE);
      const r = Math.floor(wy / TILE);
      if (r < 0 || r >= MAP_ROWS || c < 0 || c >= MAP_COLS) return WALL;
      return mapData[r][c];
    }
    function isSolid(t) { return t === WALL || t === VOID || t === DOOR_LOCKED; }

    function canMoveTo(nx, ny) {
      const r = player.radius - 1;
      return !isSolid(tileAt(nx - r, ny - r)) &&
             !isSolid(tileAt(nx + r, ny - r)) &&
             !isSolid(tileAt(nx - r, ny + r)) &&
             !isSolid(tileAt(nx + r, ny + r)) &&
             !isSolid(tileAt(nx,     ny - r)) &&
             !isSolid(tileAt(nx,     ny + r)) &&
             !isSolid(tileAt(nx - r, ny    )) &&
             !isSolid(tileAt(nx + r, ny    ));
    }

    // ── SCAN MECHANIC ─────────────────────────────────────────────────────────
    const SCAN_RANGE  = 70;
    const SCAN_DUR_MS = 900;

    function tryScanning() {
      if (player.scanning) return;
      const now = performance.now();
      const elapsed = now - player.scanCooldownStart;
      if (elapsed < player.scanCooldownMs) {
        log(`> SCAN: COOLING DOWN (${((player.scanCooldownMs - elapsed) / 1000).toFixed(1)}s)`, 'system');
        return;
      }
      const nearby = techObjects.filter(t =>
        t.intact && Math.hypot(t.x - player.x, t.y - player.y) < SCAN_RANGE
      );
      if (!nearby.length) {
        log('> SCAN: NO TECH DETECTED IN RANGE', 'system');
        return;
      }
      // Target nearest
      const target = nearby.reduce((a, b) =>
        Math.hypot(a.x - player.x, a.y - player.y) <= Math.hypot(b.x - player.x, b.y - player.y) ? a : b
      );
      player.scanning = true;
      player.scanCooldownStart = now;
      target.scanStartTime = now;
      log(`> INITIATING SCAN: ${target.label}...`, 'system');
      scanRings.push({ x: target.x, y: target.y, r: 0, maxR: 48, life: 1, color: '0,220,80' });
      spawnParticles(target.x, target.y, '0,200,80', 12);

      setTimeout(() => {
        if (!target.intact) return;
        target.intact = false;
        target.scanStartTime = -1;
        player.scanning = false;
        const gained = [];
        for (const drop of target.drops) {
          player.inventory[drop.type] = (player.inventory[drop.type] || 0) + drop.count;
          gained.push(`${drop.count}x ${FRAGMENTS[drop.type].label}`);
        }
        log(`> ACQUIRED: ${gained.join(', ')}`, 'acquire');
        updateInventoryUI();
      }, SCAN_DUR_MS);
    }

    // ── INTERACT MECHANIC ─────────────────────────────────────────────────────
    const INTERACT_RANGE = 80;

    function tryInteract() {
      for (const obj of interactables) {
        if (!obj.locked) continue;
        if (Math.hypot(obj.x - player.x, obj.y - player.y) > INTERACT_RANGE) continue;
        const missing = [];
        for (const [key, need] of Object.entries(obj.requires)) {
          const have = player.inventory[key] || 0;
          if (have < need) missing.push(`${need - have}x more ${FRAGMENTS[key].label}`);
        }
        if (missing.length) {
          log(`> ACCESS DENIED — REQUIRE: ${missing.join(', ')}`, 'error');
          obj.unlockFlash = performance.now();
          return;
        }
        obj.locked = false;
        mapData[obj.row][obj.col]     = DOOR_OPEN;
        mapData[obj.row][obj.col + 1] = DOOR_OPEN;
        spawnParticles(obj.x, obj.y, '0,255,160', 18);
        scanRings.push({ x: obj.x, y: obj.y, r: 0, maxR: 90, life: 1, color: '0,255,160' });
        log(`> ${obj.unlockMsg}`, 'success');
        return;
      }
      log('> NOTHING TO INTERFACE WITH NEARBY', 'system');
    }

    // ── BOOT SEQUENCE ─────────────────────────────────────────────────────────
    let booting = true;
    const BOOT_LINES = [
      { t:  200, text: '> NEXUS CYBERNETIC SYSTEMS v7.4.1',   cls: 'system'  },
      { t:  700, text: '> NEURAL BRIDGE: ESTABLISHING...',    cls: 'system'  },
      { t: 1350, text: '> NEURAL BRIDGE: ONLINE',             cls: 'success' },
      { t: 1850, text: '> MOTOR CORTEX: RESTORED',            cls: 'success' },
      { t: 2350, text: '> SCAN ARRAY: ONLINE',                cls: 'success' },
      { t: 2850, text: '> MEMORY CORE: FRAGMENTED',           cls: 'error'   },
      { t: 3350, text: '> LOCATION DATA: CORRUPTED',          cls: 'error'   },
      { t: 3850, text: '> LAST KNOWN MISSION: [REDACTED]',    cls: 'error'   },
      { t: 4400, text: '> ...',                               cls: 'system'  },
      { t: 5100, text: '> AWAKENING.',                        cls: 'success' },
    ];
    BOOT_LINES.forEach(({ t, text, cls }) => setTimeout(() => log(text, cls), t));
    setTimeout(() => {
      booting = false;
      const overlay = document.getElementById('overlay');
      overlay.style.opacity = '0';
      setTimeout(() => { overlay.style.display = 'none'; }, 2000);
    }, 5500);

    // ── DRAW: TILES ───────────────────────────────────────────────────────────
    function drawTiles(camX, camY, now) {
      const c0 = Math.max(0, Math.floor(camX / TILE) - 1);
      const c1 = Math.min(MAP_COLS - 1, Math.ceil((camX + canvas.width)  / TILE) + 1);
      const r0 = Math.max(0, Math.floor(camY / TILE) - 1);
      const r1 = Math.min(MAP_ROWS - 1, Math.ceil((camY + canvas.height) / TILE) + 1);

      for (let r = r0; r <= r1; r++) {
        for (let c = c0; c <= c1; c++) {
          const t = mapData[r][c];
          if (t === VOID) continue;
          const sx = c * TILE - camX;
          const sy = r * TILE - camY;

          if (t === WALL) {
            ctx.fillStyle = '#0d0d20';
            ctx.fillRect(sx, sy, TILE, TILE);
            ctx.strokeStyle = '#141430';
            ctx.lineWidth = 0.4;
            ctx.strokeRect(sx, sy, TILE, TILE);
            // panel detail lines on walls
            if ((c + r) % 4 === 0) {
              ctx.strokeStyle = '#111126';
              ctx.beginPath();
              ctx.moveTo(sx + 4, sy + 4); ctx.lineTo(sx + TILE - 4, sy + 4);
              ctx.stroke();
            }
          } else if (t === FLOOR) {
            ctx.fillStyle = '#0a0a18';
            ctx.fillRect(sx, sy, TILE, TILE);
            ctx.strokeStyle = '#0c0c1c';
            ctx.lineWidth = 0.3;
            ctx.strokeRect(sx, sy, TILE, TILE);
          } else if (t === DOOR_LOCKED) {
            const pulse = 0.5 + 0.5 * Math.sin(now * 0.0025);
            ctx.fillStyle = '#150404';
            ctx.fillRect(sx, sy, TILE, TILE);
            ctx.strokeStyle = `rgba(200,20,0,${0.5 + pulse * 0.4})`;
            ctx.lineWidth = 1.5;
            ctx.strokeRect(sx + 2, sy + 2, TILE - 4, TILE - 4);
            ctx.fillStyle = `rgba(180,10,0,${0.06 + pulse * 0.07})`;
            ctx.fillRect(sx, sy, TILE, TILE);
          } else if (t === DOOR_OPEN) {
            ctx.fillStyle = '#0a0a18';
            ctx.fillRect(sx, sy, TILE, TILE);
            ctx.strokeStyle = 'rgba(0,255,160,0.15)';
            ctx.lineWidth = 0.5;
            ctx.strokeRect(sx, sy, TILE, TILE);
          }
        }
      }
    }

    // ── DRAW: TECH OBJECTS ────────────────────────────────────────────────────
    const SHAPE_COLORS = {
      console: '200,130,20',
      scanner: '220,160,30',
      drone:   '160,40,255',
      core:    '255,20,120',
    };

    function drawTechObject(obj, camX, camY, now) {
      if (!obj.intact) return;
      const sx = obj.x - camX;
      const sy = obj.y - camY;
      const rgb = SHAPE_COLORS[obj.shape] || '200,130,20';
      const pulse = 0.5 + 0.5 * Math.sin(now * 0.0018 + obj.glowPhase);

      // Ambient glow halo
      const g = ctx.createRadialGradient(sx, sy, 0, sx, sy, 26);
      g.addColorStop(0,   `rgba(${rgb},${0.4 + pulse * 0.35})`);
      g.addColorStop(0.5, `rgba(${rgb},${0.1 + pulse * 0.1})`);
      g.addColorStop(1,   `rgba(${rgb},0)`);
      ctx.beginPath(); ctx.arc(sx, sy, 26, 0, Math.PI * 2);
      ctx.fillStyle = g; ctx.fill();

      // Body
      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(now * 0.0004);
      ctx.strokeStyle = `rgba(${rgb},${0.7 + pulse * 0.3})`;
      ctx.lineWidth = 1.5;
      ctx.fillStyle = `rgba(${rgb},0.12)`;

      switch (obj.shape) {
        case 'core': {
          ctx.beginPath();
          for (let i = 0; i < 4; i++) {
            const a = (Math.PI / 2) * i - Math.PI / 4;
            const rr = 9;
            i === 0 ? ctx.moveTo(Math.cos(a)*rr, Math.sin(a)*rr) : ctx.lineTo(Math.cos(a)*rr, Math.sin(a)*rr);
          }
          ctx.closePath(); ctx.fill(); ctx.stroke();
          ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI*2); ctx.stroke();
          break;
        }
        case 'drone': {
          ctx.beginPath();
          for (let i = 0; i < 6; i++) {
            const a = (Math.PI / 3) * i;
            const rr = 9;
            i === 0 ? ctx.moveTo(Math.cos(a)*rr, Math.sin(a)*rr) : ctx.lineTo(Math.cos(a)*rr, Math.sin(a)*rr);
          }
          ctx.closePath(); ctx.fill(); ctx.stroke();
          ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI*2); ctx.stroke();
          break;
        }
        case 'scanner': {
          ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fill(); ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-9, 0); ctx.lineTo(9, 0);
          ctx.moveTo(0, -9); ctx.lineTo(0, 9);
          ctx.stroke();
          break;
        }
        default: { // console
          ctx.fillRect(-9, -6, 18, 13); ctx.strokeRect(-9, -6, 18, 13);
          ctx.lineWidth = 0.8;
          ctx.beginPath();
          ctx.moveTo(-6, -2); ctx.lineTo(4, -2);
          ctx.moveTo(-6,  1); ctx.lineTo(6,  1);
          ctx.moveTo(-6,  4); ctx.lineTo(2,  4);
          ctx.stroke();
          break;
        }
      }
      ctx.restore();

      // Scan dissolve animation
      if (obj.scanStartTime >= 0) {
        const t = Math.min(1, (now - obj.scanStartTime) / SCAN_DUR_MS);
        ctx.beginPath();
        ctx.arc(sx, sy, t * 44, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(0,255,80,${1 - t})`;
        ctx.lineWidth = 1.5; ctx.stroke();
        ctx.strokeStyle = `rgba(0,200,60,${(1 - t) * 0.5})`;
        ctx.beginPath(); ctx.arc(sx, sy, t * 28, 0, Math.PI * 2); ctx.stroke();
      }

      // Proximity prompt
      const dist = Math.hypot(obj.x - player.x, obj.y - player.y);
      if (dist < SCAN_RANGE + 20) {
        const a = Math.max(0, 1 - dist / (SCAN_RANGE + 20));
        ctx.font = '9px Courier New';
        ctx.textAlign = 'center';
        ctx.fillStyle = `rgba(0,200,100,${a})`;
        ctx.fillText(obj.label, sx, sy - 20);
        ctx.fillStyle = `rgba(0,150,80,${a * 0.7})`;
        ctx.fillText('[E] SCAN', sx, sy - 10);
      }
    }

    // ── DRAW: INTERACTABLES ───────────────────────────────────────────────────
    function drawInteractables(camX, camY, now) {
      for (const obj of interactables) {
        if (!obj.locked) continue;
        const dist = Math.hypot(obj.x - player.x, obj.y - player.y);
        if (dist > INTERACT_RANGE + 30) continue;
        const sx = obj.x - camX;
        const sy = obj.y - camY;
        const a  = Math.max(0, 1 - dist / (INTERACT_RANGE + 30));
        // Deny flash
        if (obj.unlockFlash > 0) {
          const ft = (now - obj.unlockFlash) / 600;
          if (ft < 1) {
            ctx.beginPath(); ctx.arc(sx, sy, 20 + ft * 30, 0, Math.PI*2);
            ctx.strokeStyle = `rgba(220,30,0,${(1-ft)*0.6})`; ctx.lineWidth=1.5; ctx.stroke();
          }
        }
        ctx.font = '9px Courier New';
        ctx.textAlign = 'center';
        ctx.fillStyle = `rgba(200,60,30,${a})`;
        ctx.fillText(obj.label, sx, sy - 20);
        ctx.fillStyle = `rgba(150,40,20,${a * 0.7})`;
        ctx.fillText('[F] INTERFACE', sx, sy - 10);
      }
    }

    // ── DRAW: PLAYER ──────────────────────────────────────────────────────────
    function drawPlayer(camX, camY, now) {
      const sx = player.x - camX;
      const sy = player.y - camY;

      // Outer glow
      const glow = ctx.createRadialGradient(sx, sy, 0, sx, sy, 30);
      glow.addColorStop(0,   'rgba(0,180,255,0.16)');
      glow.addColorStop(0.6, 'rgba(0,120,220,0.05)');
      glow.addColorStop(1,   'rgba(0,80,180,0)');
      ctx.beginPath(); ctx.arc(sx, sy, 30, 0, Math.PI*2);
      ctx.fillStyle = glow; ctx.fill();

      // Direction arrow
      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(player.angle);
      ctx.beginPath();
      ctx.moveTo(13, 0);
      ctx.lineTo(7, 4);
      ctx.lineTo(7, -4);
      ctx.closePath();
      ctx.fillStyle = 'rgba(100,230,255,0.85)';
      ctx.fill();
      ctx.restore();

      // Body
      ctx.beginPath(); ctx.arc(sx, sy, player.radius, 0, Math.PI*2);
      const bodyGrad = ctx.createRadialGradient(sx - 3, sy - 3, 0, sx, sy, player.radius);
      bodyGrad.addColorStop(0, '#bbffff');
      bodyGrad.addColorStop(1, '#004488');
      ctx.fillStyle = bodyGrad; ctx.fill();
      ctx.strokeStyle = '#00bbff';
      ctx.lineWidth = 1.5; ctx.stroke();

      // Scan cooldown arc
      const coolPct = Math.min(1, (now - player.scanCooldownStart) / player.scanCooldownMs);
      if (coolPct < 1) {
        ctx.beginPath();
        ctx.arc(sx, sy, player.radius + 4, -Math.PI/2, -Math.PI/2 + Math.PI*2*coolPct);
        ctx.strokeStyle = `rgba(0,160,255,${0.5 + coolPct*0.3})`;
        ctx.lineWidth = 2; ctx.stroke();
      }
    }

    // ── DRAW: SCAN RINGS + PARTICLES ──────────────────────────────────────────
    function drawFX(camX, camY) {
      for (let i = scanRings.length - 1; i >= 0; i--) {
        const ring = scanRings[i];
        ring.r   += 1.8;
        ring.life -= 0.016;
        if (ring.life <= 0) { scanRings.splice(i, 1); continue; }
        ctx.beginPath();
        ctx.arc(ring.x - camX, ring.y - camY, ring.r, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(${ring.color},${ring.life * 0.65})`;
        ctx.lineWidth = 1.2; ctx.stroke();
      }
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.life -= p.decay;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
        ctx.beginPath();
        ctx.arc(p.x - camX, p.y - camY, p.size * p.life, 0, Math.PI*2);
        const alpha = Math.floor(p.life * 255).toString(16).padStart(2, '0');
        ctx.fillStyle = `rgba(${p.color},${p.life})`;
        ctx.fill();
      }
    }

    // ── STATUS BAR UPDATE ─────────────────────────────────────────────────────
    function updateStatusBar(now) {
      const coolPct = Math.min(1, (now - player.scanCooldownStart) / player.scanCooldownMs);
      const scanFill = document.getElementById('scan-fill');
      scanFill.style.width = (coolPct * 100) + '%';
      scanFill.style.background = coolPct >= 1 ? '#0088ff' : '#003366';

      // Location based on player tile
      const pr = Math.floor(player.y / TILE);
      const pc = Math.floor(player.x / TILE);
      const locEl = document.getElementById('location');
      if (pr >= 28 && pc >= 5 && pc <= 27) {
        locEl.textContent = 'LOC: SECTOR B — PROCESSING CORE';
      } else if (pr >= 2 && pr <= 17 && pc >= 2 && pc <= 21) {
        locEl.textContent = 'LOC: SECTOR A — ENTRY CHAMBER';
      } else {
        locEl.textContent = 'LOC: TRANSIT CORRIDOR';
      }
    }

    // ── AREA TRIGGER CHECK ────────────────────────────────────────────────────
    function checkAreaTriggers() {
      const pr = Math.floor(player.y / TILE);
      const pc = Math.floor(player.x / TILE);
      for (const trigger of areaTriggers) {
        if (trigger.triggered) continue;
        if (pr >= trigger.r0 && pr <= trigger.r1 && pc >= trigger.c0 && pc <= trigger.c1) {
          trigger.triggered = true;
          log(trigger.msg, trigger.cls);
        }
      }
    }

    // ── MAIN LOOP ─────────────────────────────────────────────────────────────
    let lastTime = 0;

    function gameLoop(now) {
      requestAnimationFrame(gameLoop);
      if (booting) return;
      lastTime = now;

      // Movement
      let dx = 0, dy = 0;
      if (keys['KeyW'] || keys['ArrowUp'])    dy -= 1;
      if (keys['KeyS'] || keys['ArrowDown'])  dy += 1;
      if (keys['KeyA'] || keys['ArrowLeft'])  dx -= 1;
      if (keys['KeyD'] || keys['ArrowRight']) dx += 1;

      if (dx !== 0 || dy !== 0) {
        const len = Math.hypot(dx, dy);
        dx /= len; dy /= len;
        player.angle = Math.atan2(dy, dx);
        const nx = player.x + dx * player.speed;
        const ny = player.y + dy * player.speed;
        if (canMoveTo(nx, player.y)) player.x = nx;
        if (canMoveTo(player.x, ny)) player.y = ny;
      }

      checkAreaTriggers();

      // Camera
      const camX = player.x - canvas.width  / 2;
      const camY = player.y - canvas.height / 2;

      // Clear
      ctx.fillStyle = '#070710';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // World
      drawTiles(camX, camY, now);
      for (const obj of techObjects)   drawTechObject(obj, camX, camY, now);
      drawInteractables(camX, camY, now);
      drawFX(camX, camY);
      drawPlayer(camX, camY, now);

      // Edge vignette
      const vig = ctx.createRadialGradient(
        canvas.width/2, canvas.height/2, canvas.height*0.3,
        canvas.width/2, canvas.height/2, canvas.height*0.85
      );
      vig.addColorStop(0, 'rgba(0,0,0,0)');
      vig.addColorStop(1, 'rgba(0,0,8,0.5)');
      ctx.fillStyle = vig;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      updateStatusBar(now);
    }

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
