<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NEXUS // AWAKENING</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #010106;
      color: #00ff88;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }
    #game-wrapper {
      display: flex;
      flex: 1;
      min-height: 0;
    }
    #canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #gameCanvas {
      display: block;
      background: #070710;
    }
    #keyhints {
      position: absolute;
      bottom: 8px;
      left: 8px;
      font-size: 10px;
      color: #5a8a7a;
      letter-spacing: 1px;
      pointer-events: none;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
    }
    /* ── SIDE PANELS ── */
    #left-panel {
      width: 220px;
      display: flex;
      flex-direction: column;
      background: #050510;
      border-right: 1px solid #0a1a2a;
      min-height: 0;
      flex-shrink: 0;
    }
    #right-panel {
      width: 220px;
      display: flex;
      flex-direction: column;
      background: #050510;
      border-left: 1px solid #0a1a2a;
      min-height: 0;
      flex-shrink: 0;
    }
    .panel-section {
      padding: 10px 12px;
      border-bottom: 1px solid #0a1a2a;
    }
    .panel-section.grow {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
      scrollbar-width: thin;
      scrollbar-color: #002211 transparent;
    }
    .panel-section.grow::-webkit-scrollbar { width: 4px; }
    .panel-section.grow::-webkit-scrollbar-thumb { background: #002211; }
    /* ── HOTBAR ROW ── */
    #hotbar-row {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 6px 0 4px;
      background: #030310;
      border-top: 1px solid #0a1a2a;
      flex-shrink: 0;
      gap: 10px;
    }
    #hotbar-label {
      font-size: 9px;
      letter-spacing: 2px;
      color: #5d8878;
      writing-mode: vertical-rl;
      text-orientation: mixed;
    }
    .panel-title {
      font-size: 10px;
      letter-spacing: 3px;
      color: #33cc99;
      text-transform: uppercase;
      margin-bottom: 8px;
      border-bottom: 1px solid #114433;
      padding-bottom: 4px;
      text-shadow: 0 0 6px rgba(0,200,140,0.25);
    }
    .fragment-item {
      display: flex;
      align-items: center;
      padding: 5px 6px;
      margin: 3px 0;
      background: #030312;
      border: 1px solid #080820;
      border-radius: 2px;
      font-size: 11px;
      transition: border-color 0.4s, box-shadow 0.4s;
    }
    .fragment-item.active {
      border-color: #00cc66;
      box-shadow: 0 0 8px rgba(0,200,100,0.2);
    }
    .fragment-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 8px;
      flex-shrink: 0;
    }
    .fragment-label { flex: 1; }
    .fragment-count { font-weight: bold; }
    /* log lines live inside .panel-section.grow in the right panel */
    /* ── LOADOUT ITEMS ── */
    .loadout-item {
      padding: 6px 8px;
      margin: 4px 0;
      background: #030318;
      border: 1px solid #101030;
      border-radius: 2px;
      font-size: 11px;
      color: #3366aa;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, box-shadow 0.2s;
    }
    .loadout-item:hover  { border-color: #2255cc; color: #66aaff; }
    .loadout-item.selected {
      border-color: #4488ff;
      color: #88ccff;
      box-shadow: 0 0 8px rgba(60,120,255,0.25);
    }
    .loadout-item.equipped {
      color: #669977;
      border-color: #224433;
      cursor: default;
      opacity: 0.7;
    }
    .loadout-item.disabled {
      color: #556677;
      border-color: #22334a;
      cursor: not-allowed;
      opacity: 0.55;
    }
    .loadout-item-label  { display: block; font-weight: bold; }
    .loadout-item-desc   { display: block; font-size: 9px; color: inherit; opacity: 0.6; margin-top: 2px; }
    .log-line {
      font-size: 11px;
      line-height: 1.7;
      color: #4fb380;
    }
    .log-line.system  { color: #7a9a8a; }
    .log-line.acquire { color: #33ee88; text-shadow: 0 0 6px rgba(0,220,110,0.3); }
    .log-line.error   { color: #ff5544; text-shadow: 0 0 6px rgba(220,50,0,0.3); }
    .log-line.success { color: #55ffbb; text-shadow: 0 0 6px rgba(0,255,150,0.35); }
    #status-bar {
      height: 38px;
      background: #030310;
      border-top: 1px solid #0a1a2a;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 18px;
      font-size: 10px;
      letter-spacing: 1px;
      color: #33cc99;
      flex-shrink: 0;
    }
    .status-item { display: flex; align-items: center; gap: 6px; }
    .bar-track {
      height: 4px;
      border-radius: 2px;
      background: #001a0d;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.2s, background 0.3s;
    }
    #scan-track  { width: 55px; }

    /* ── BOOT SCREEN ── */
    #boot-screen {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease;
    }
    #boot-text-center {
      width: 480px;
      font-size: 13px;
      line-height: 2;
      letter-spacing: 1px;
    }
    .boot-line { color: #22dd88; white-space: pre; text-shadow: 0 0 8px rgba(0,200,120,0.35); }
    .boot-line.warn    { color: #ffbb33; text-shadow: 0 0 8px rgba(220,150,0,0.4); }
    .boot-line.error   { color: #ff5533; text-shadow: 0 0 8px rgba(220,60,0,0.45); }
    .boot-line.success { color: #33ffaa; text-shadow: 0 0 8px rgba(0,230,140,0.4); }
    .boot-cursor {
      display: inline-block;
      width: 8px;
      background: #22dd88;
      box-shadow: 0 0 8px rgba(0,220,130,0.6);
      animation: blink 0.7s step-end infinite;
      vertical-align: text-bottom;
      height: 1.1em;
      margin-left: 1px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── COMMAND WINDOW ── */
    #hotbar-row {
      justify-content: flex-start;
      padding: 6px 14px 4px;
    }
    #command-window {
      flex: 1;
      align-self: stretch;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
      border-left: 1px solid #0a1a2a;
    }
    #cmd-display {
      font-size: 13px;
      letter-spacing: 1px;
      color: #33cc99;
      min-height: 26px;
      display: flex;
      align-items: center;
    }
    #cmd-stage-hint {
      font-size: 9px;
      color: #4a7a66;
      letter-spacing: 1px;
      margin-top: 4px;
    }
    .cmd-cursor {
      display: inline-block;
      width: 7px;
      background: #33cc99;
      height: 0.85em;
      vertical-align: text-bottom;
      animation: blink 0.7s step-end infinite;
      margin-left: 1px;
    }
    .cmd-idle { color: #2a5544; font-size: 10px; letter-spacing: 1px; }
    /* Panel highlight during command entry */
    .cmd-hl-frags { box-shadow: inset 0 0 0 1px rgba(0,220,140,0.55), 0 0 14px rgba(0,200,130,0.12); transition: box-shadow 0.2s; }
    .cmd-hl-core  { outline: 1px solid rgba(60,130,255,0.6); outline-offset: -2px; }
  </style>
</head>
<body>
  <!-- BOOT SCREEN -->
  <div id="boot-screen">
    <div id="boot-text-center"></div>
  </div>

  <div id="game-wrapper">

    <!-- LEFT: Item inventory by category -->
    <div id="left-panel">
      <div class="panel-section" id="section-hardware">
        <div class="panel-title">// HARDWARE</div>
        <div id="hardware-list"></div>
      </div>
      <div class="panel-section" id="section-fragments" style="display:none;">
        <div class="panel-title">// V_OS FRAGMENTS</div>
        <div id="fragments-list"></div>
      </div>
      <div class="panel-section" id="section-actions">
        <div class="panel-title">// ACTIONS</div>
        <div id="actions-list" style="font-size:10px;color:#2a5040;padding:2px 0;">— none available —</div>
      </div>
    </div>

    <!-- CENTER: Game Canvas -->
    <div id="canvas-container">
      <canvas id="gameCanvas"></canvas>
      <div id="keyhints">ARROWS — MOVE &nbsp;|&nbsp; [E] — SCAN &nbsp;|&nbsp; [&gt;] — COMMAND &nbsp;|&nbsp; SCROLL — ZOOM</div>
    </div>

    <!-- RIGHT: System Log -->
    <div id="right-panel">
      <div class="panel-section grow">
        <div class="panel-title">// SYSTEM LOG</div>
        <div id="log-entries"></div>
      </div>
    </div>

  </div>

  <div id="hotbar-row">
    <div id="hotbar-label">// MODULE RACK</div>
    <canvas id="hotbarCanvas" width="170" height="170" style="cursor:pointer;"></canvas>
    <div id="command-window">
      <div class="panel-title" style="margin-bottom:6px;">// CMD</div>
      <div id="cmd-display"><span class="cmd-idle">[ &gt; ] enter command</span></div>
      <div id="cmd-stage-hint"></div>
    </div>
  </div>

  <div id="status-bar">
    <span class="status-item" id="item-count">ITEMS: 1</span>
    <span class="status-item" id="location">LOC: UNKNOWN</span>
    <div class="status-item">
      SCAN
      <div class="bar-track" id="scan-track" style="width:55px;">
        <div class="bar-fill" id="scan-fill" style="width:100%; background:#0066cc;"></div>
      </div>
    </div>
    <span class="status-item" style="margin-left:auto; color:#5a8a7a;">NEXUS // AWAKENING &nbsp;v0.2-poc</span>
  </div>

  <script>
    const GAME_VERSION = 'v0.2-poc';

    // ── TILE / HEX CONSTANTS ──────────────────────────────────────────────────
    const TILE = 32; // kept for legacy area-trigger checks; hex coords are primary
    const VOID = 0, WALL = 1, FLOOR = 2, DOOR_LOCKED = 3, DOOR_OPEN = 4;

    // Flat-top hex: pointy vertices left/right, flat edges top/bottom
    const HEX_SIZE     = 20;                          // circumradius (px)
    const HEX_COL_STEP = HEX_SIZE * 1.5;             // 30  – horizontal col pitch
    const HEX_ROW_STEP = HEX_SIZE * Math.sqrt(3);    // ~34.64 – vertical row pitch

    function hexToWorld(col, row) {
      return {
        x: col * HEX_COL_STEP,
        y: row * HEX_ROW_STEP + (col % 2 === 1 ? HEX_ROW_STEP / 2 : 0),
      };
    }

    function worldToHex(wx, wy) {
      const col = Math.round(wx / HEX_COL_STEP);
      const c   = Math.max(0, Math.min(MAP_COLS - 1, col));
      const yOff = (c % 2 === 1) ? HEX_ROW_STEP / 2 : 0;
      const row = Math.round((wy - yOff) / HEX_ROW_STEP);
      const r   = Math.max(0, Math.min(MAP_ROWS - 1, row));
      return { col: c, row: r };
    }

    // ── ZOOM ──────────────────────────────────────────────────────────────────
    let zoom = 1.0;
    const ZOOM_MIN = 0.5, ZOOM_MAX = 1.3, ZOOM_STEP = 0.08;

    // ── MAP BUILD ─────────────────────────────────────────────────────────────
    const MAP_COLS = 42;
    const MAP_ROWS = 38;

    const mapData = (function () {
      const m = Array.from({ length: MAP_ROWS }, () => new Array(MAP_COLS).fill(VOID));
      function rect(c0, r0, c1, r1, v) {
        for (let r = r0; r <= r1; r++)
          for (let c = c0; c <= c1; c++) m[r][c] = v;
      }
      function room(c0, r0, c1, r1) {
        rect(c0, r0, c1, r1, WALL);
        rect(c0 + 1, r0 + 1, c1 - 1, r1 - 1, FLOOR);
      }
      // Room 1 — Entry Chamber
      room(1, 1, 23, 19);
      // Corridor
      room(10, 19, 13, 27);
      // Room 1 — Entry Chamber only
      room(1, 1, 23, 19);
      return m;
    })();

    // ── ITEM REGISTRY ─────────────────────────────────────────────────────────
    // Hex code scheme: first digit = category (0=hardware, 1=V_OS),
    //   second char = tier/grade (A=basic), last two = item index.
    //   e.g. a better power node → 0B01; a second hardware type → 0A02.
    const ITEMS = {
      // Hardware
      POWER_NODE:    { label: 'Power Node',    category: 'hardware',  color: '#5599ff', dot: '#2255cc', code: '0A01' },
      SENSOR_NODE:   { label: 'Sensor Node',   category: 'hardware',  color: '#ffbb33', dot: '#cc8800', code: '0A02' },
      // V_OS Fragments
      LOOP_FRAGMENT: { label: 'Loop Fragment', category: 'fragment',  color: '#33ccff', dot: '#1199cc', code: '1F01' },
    };
    const CODE_TO_ITEM = Object.fromEntries(
      Object.entries(ITEMS).map(([k, v]) => [v.code, k])
    );

    function hexColorToRgb(hex) {
      return `${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`;
    }

    // ── TECH OBJECTS ──────────────────────────────────────────────────────────
    class TechObject {
      constructor(col, row, label, drops, shape) {
        const pos = hexToWorld(col, row);
        this.x = pos.x;
        this.y = pos.y;
        this.label = label;
        this.drops = drops;   // [{type, count}]
        this.shape = shape;   // 'console'|'scanner'|'drone'|'core'
        this.intact = true;
        this.glowPhase = Math.random() * Math.PI * 2;
        this.scanStartTime = -1;
      }
    }

    const techObjects = [
      new TechObject(5,  6,  'RUSTED CONSOLE',  [{type:'LOOP_FRAGMENT', count:2}], 'console'),
      new TechObject(18, 13, 'SENSOR ARRAY',    [{type:'SENSOR_NODE',   count:1}], 'scanner'),
      new TechObject(4,  16, 'DEAD TERMINAL',   [{type:'LOOP_FRAGMENT', count:1}], 'console'),
      new TechObject(20, 5,  'RELAY NODE',      [{type:'LOOP_FRAGMENT', count:1},{type:'SENSOR_NODE', count:1}], 'scanner'),
    ];

    // ── PLAYER ────────────────────────────────────────────────────────────────
    const _pStart = hexToWorld(12, 10);
    const player = {
      x: _pStart.x,
      y: _pStart.y,
      radius: 10,
      speed: 2.4,
      angle: Math.PI / 2,
      inventory: { POWER_NODE: 1, SENSOR_NODE: 1 },
      scanning: false,
      scanCooldownStart: -99999,
      scanCooldownMs: 2200,
    };

    // ── PARTICLE POOL ─────────────────────────────────────────────────────────
    const particles = [];
    function spawnParticles(wx, wy, colorRGB, count) {
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const spd = 0.7 + Math.random() * 1.8;
        particles.push({
          x: wx, y: wy,
          vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
          life: 1.0, decay: 0.011 + Math.random() * 0.012,
          color: colorRGB, size: 1.5 + Math.random() * 2,
        });
      }
    }

    const scanRings = [];

    // ── VISIBILITY / FOG OF WAR ───────────────────────────────────────────────
    const visibleHexes = new Set(); // "col,row" keys of currently lit tiles

    function offsetToCube(col, row) {
      const q = col;
      const r = row - (col - (col & 1)) / 2;
      return { q, r, s: -q - r };
    }

    function hexDistance(c1, r1, c2, r2) {
      const a = offsetToCube(c1, r1), b = offsetToCube(c2, r2);
      return Math.max(Math.abs(a.q - b.q), Math.abs(a.r - b.r), Math.abs(a.s - b.s));
    }

    function updateVisibility() {
      visibleHexes.clear();
      const hasSensor = Object.values(CORE_SLOTS).some(slot =>
        slot.unlocked && slot.assignments.some(a => a.fragType === 'SENSOR_NODE')
      );
      if (!hasSensor) return;
      const { col: pc, row: pr } = worldToHex(player.x, player.y);
      const range = 3;
      for (let c = Math.max(0, pc - range - 1); c <= Math.min(MAP_COLS - 1, pc + range + 1); c++) {
        for (let r = Math.max(0, pr - range - 1); r <= Math.min(MAP_ROWS - 1, pr + range + 1); r++) {
          if (hexDistance(pc, pr, c, r) <= range) visibleHexes.add(`${c},${r}`);
        }
      }
    }

    // ── INPUT ─────────────────────────────────────────────────────────────────
    const keys = {};
    document.addEventListener('keydown', e => {
      if (booting) { keys[e.code] = true; return; }
      if (cmdState.active) { handleCmdKey(e); return; }
      if (e.key === '>') { startCmd(); return; }
      if (e.code === 'KeyE') tryScanning();
      keys[e.code] = true;
    });
    document.addEventListener('keyup', e => { keys[e.code] = false; });

    // ── CANVAS SETUP ──────────────────────────────────────────────────────────
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      const cont = document.getElementById('canvas-container');
      canvas.width  = cont.clientWidth;
      canvas.height = cont.clientHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      zoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zoom + (e.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP)));
    }, { passive: false });

    // ── LOGGING ───────────────────────────────────────────────────────────────
    function log(text, cls = '') {
      const el = document.getElementById('log-entries');
      const div = document.createElement('div');
      div.className = 'log-line ' + cls;
      div.textContent = text;
      el.appendChild(div);
      // Keep log from growing too long
      while (el.children.length > 80) el.removeChild(el.firstChild);
      el.scrollTop = el.scrollHeight;
    }

    // ── INVENTORY UI ──────────────────────────────────────────────────────────
    function makeItemRow(key, def, count) {
      const div = document.createElement('div');
      div.className = 'fragment-item active';
      div.innerHTML =
        `<div class="fragment-dot" style="background:${def.dot}"></div>` +
        `<span class="fragment-label" style="color:${def.color}">` +
        `${def.label}<span style="color:#558877;font-size:9px;margin-left:5px;">[${def.code}]</span></span>` +
        `<span class="fragment-count" style="color:${def.color}">${count}</span>`;
      return div;
    }

    function updateInventoryUI() {
      const hwList   = document.getElementById('hardware-list');
      const fragList = document.getElementById('fragments-list');
      hwList.innerHTML = fragList.innerHTML = '';
      let hwCount = 0, fragCount = 0, total = 0;

      const powerInstalled = CORE_SLOTS[1].assignments.some(a => a.fragType === 'POWER_NODE');
      for (const [key, def] of Object.entries(ITEMS)) {
        const count = player.inventory[key] || 0;
        if (count === 0) continue;
        if (key === 'SENSOR_NODE' && !powerInstalled) continue; // gated until power is online
        total += count;
        const row = makeItemRow(key, def, count);
        if (def.category === 'hardware') { hwList.appendChild(row);   hwCount++;   }
        else                             { fragList.appendChild(row);  fragCount++; }
      }

      document.getElementById('section-hardware').style.display  = hwCount   > 0 ? '' : 'none';
      document.getElementById('section-fragments').style.display = fragCount > 0 ? '' : 'none';
      document.getElementById('item-count').textContent = `ITEMS: ${total}`;
    }
    updateInventoryUI();

    // ── TILE HELPERS (hex) ────────────────────────────────────────────────────
    function tileAt(wx, wy) {
      const { col, row } = worldToHex(wx, wy);
      return mapData[row][col];
    }
    function isSolid(t) { return t === WALL || t === VOID || t === DOOR_LOCKED; }

    function canMoveTo(nx, ny) {
      const r = player.radius - 2; // slightly smaller than visual radius
      return !isSolid(tileAt(nx - r, ny    )) &&
             !isSolid(tileAt(nx + r, ny    )) &&
             !isSolid(tileAt(nx,     ny - r)) &&
             !isSolid(tileAt(nx,     ny + r)) &&
             !isSolid(tileAt(nx - r, ny - r)) &&
             !isSolid(tileAt(nx + r, ny - r)) &&
             !isSolid(tileAt(nx - r, ny + r)) &&
             !isSolid(tileAt(nx + r, ny + r));
    }

    // ── SCAN MECHANIC ─────────────────────────────────────────────────────────
    const SCAN_RANGE  = 70;
    const SCAN_DUR_MS = 900;

    function tryScanning() {
      if (player.scanning) return;
      const now = performance.now();
      const elapsed = now - player.scanCooldownStart;
      if (elapsed < player.scanCooldownMs) {
        log(`> SCAN: COOLING DOWN (${((player.scanCooldownMs - elapsed) / 1000).toFixed(1)}s)`, 'system');
        return;
      }
      const nearby = techObjects.filter(t =>
        t.intact && Math.hypot(t.x - player.x, t.y - player.y) < SCAN_RANGE
      );
      if (!nearby.length) {
        log('> SCAN: NO TECH DETECTED IN RANGE', 'system');
        return;
      }
      // Target nearest
      const target = nearby.reduce((a, b) =>
        Math.hypot(a.x - player.x, a.y - player.y) <= Math.hypot(b.x - player.x, b.y - player.y) ? a : b
      );
      player.scanning = true;
      player.scanCooldownStart = now;
      target.scanStartTime = now;
      log(`> INITIATING SCAN: ${target.label}...`, 'system');
      scanRings.push({ x: target.x, y: target.y, r: 0, maxR: 48, life: 1, color: '0,220,80' });
      spawnParticles(target.x, target.y, '0,200,80', 12);

      setTimeout(() => {
        if (!target.intact) return;
        target.intact = false;
        target.scanStartTime = -1;
        player.scanning = false;
        const gained = [];
        for (const drop of target.drops) {
          player.inventory[drop.type] = (player.inventory[drop.type] || 0) + drop.count;
          gained.push(`${drop.count}x ${ITEMS[drop.type].label}`);
        }
        log(`> ACQUIRED: ${gained.join(', ')}`, 'acquire');
        updateInventoryUI();
      }, SCAN_DUR_MS);
    }

    // ── BOOT SEQUENCE ─────────────────────────────────────────────────────────
    let booting = true;

    const BOOT_SCRIPT = [
      { text: 'V_OS sequence reboot',                    cls: '',        speed: 22, pause: 500  },
      { text: 'Identity: unknown',                       cls: 'warn',    speed: 30, pause: 400  },
      { text: 'Location: unknown',                       cls: 'warn',    speed: 30, pause: 500  },
      { text: 'Scanning memory... ... data corruption',  cls: 'error',   speed: 38, pause: 700  },
      { text: 'Repair sequence... fail',                 cls: 'error',   speed: 38, pause: 1000 },
    ];

    (function runBoot() {
      const container = document.getElementById('boot-text-center');
      // persistent blinking cursor element
      const cursor = document.createElement('span');
      cursor.className = 'boot-cursor';

      let scriptIdx = 0;

      function nextLine() {
        if (scriptIdx >= BOOT_SCRIPT.length) {
          // All lines done — remove cursor, then transition
          cursor.remove();
          setTimeout(transitionFromBoot, 900);
          return;
        }
        const entry = BOOT_SCRIPT[scriptIdx++];
        const lineEl = document.createElement('div');
        lineEl.className = 'boot-line ' + entry.cls;
        lineEl.textContent = '';
        container.appendChild(lineEl);
        lineEl.appendChild(cursor);

        let charIdx = 0;
        function typeChar() {
          if (charIdx < entry.text.length) {
            // insert char before cursor
            lineEl.insertBefore(document.createTextNode(entry.text[charIdx++]), cursor);
            setTimeout(typeChar, entry.speed);
          } else {
            // line done: move cursor to next line after pause
            setTimeout(nextLine, entry.pause);
          }
        }
        typeChar();
      }
      nextLine();
    })();

    function transitionFromBoot() {
      // Mirror typed lines into the System Log
      document.querySelectorAll('#boot-text-center .boot-line').forEach(el => {
        const cls = el.className.replace('boot-line', '').trim();
        // map boot cls names to log cls names
        const logCls = cls === 'warn' ? 'system' : cls === 'error' ? 'error' : cls === 'success' ? 'success' : 'system';
        log('> ' + el.textContent, logCls);
      });

      // Fade out boot screen
      const bs = document.getElementById('boot-screen');
      bs.style.opacity = '0';
      setTimeout(() => { bs.style.display = 'none'; }, 850);

      booting = false;

      setTimeout(() => {
        log('> V_OS online. Power node detected. Assign to core slot via [ > ] command.', 'system');
      }, 1400);
    }

    // ── DRAW: HEX TILES (world-space) ────────────────────────────────────────
    function hexPath(wx, wy, s) {
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI / 3) * i;  // flat-top: 0°,60°,120°,180°,240°,300°
        const vx = wx + s * Math.cos(a);
        const vy = wy + s * Math.sin(a);
        i === 0 ? ctx.moveTo(vx, vy) : ctx.lineTo(vx, vy);
      }
      ctx.closePath();
    }

    function drawHexTiles(camX, camY, now) {
      const wLeft  = camX;
      const wRight = camX + canvas.width  / zoom;
      const wTop   = camY;
      const wBot   = camY + canvas.height / zoom;

      const cStart = Math.max(0, Math.floor(wLeft  / HEX_COL_STEP) - 1);
      const cEnd   = Math.min(MAP_COLS - 1, Math.ceil(wRight / HEX_COL_STEP) + 1);

      for (let c = cStart; c <= cEnd; c++) {
        const yOff   = (c % 2 === 1) ? HEX_ROW_STEP / 2 : 0;
        const rStart = Math.max(0, Math.floor((wTop - yOff) / HEX_ROW_STEP) - 1);
        const rEnd   = Math.min(MAP_ROWS - 1, Math.ceil((wBot - yOff) / HEX_ROW_STEP) + 1);

        for (let r = rStart; r <= rEnd; r++) {
          const t = mapData[r][c];
          if (t === VOID) continue;
          if (!visibleHexes.has(`${c},${r}`)) continue; // fog of war

          const wx = c * HEX_COL_STEP;
          const wy = r * HEX_ROW_STEP + yOff;
          const S  = HEX_SIZE - 0.8; // tiny gap between hexes

          if (t === WALL) {
            hexPath(wx, wy, S);
            ctx.fillStyle = '#0d0d20'; ctx.fill();
            ctx.strokeStyle = '#1a1a38'; ctx.lineWidth = 0.6; ctx.stroke();
          } else if (t === FLOOR) {
            hexPath(wx, wy, S);
            ctx.fillStyle = '#0a0a18'; ctx.fill();
            ctx.strokeStyle = '#0d0d22'; ctx.lineWidth = 0.3; ctx.stroke();
          } else if (t === DOOR_LOCKED) {
            const pulse = 0.5 + 0.5 * Math.sin(now * 0.0025);
            hexPath(wx, wy, S);
            ctx.fillStyle = '#160408'; ctx.fill();
            ctx.strokeStyle = `rgba(200,20,0,${0.6 + pulse * 0.35})`; ctx.lineWidth = 1.5; ctx.stroke();
            // inner glow fill
            hexPath(wx, wy, S * 0.7);
            ctx.fillStyle = `rgba(180,10,0,${0.06 + pulse * 0.08})`; ctx.fill();
          } else if (t === DOOR_OPEN) {
            hexPath(wx, wy, S);
            ctx.fillStyle = '#0a0a18'; ctx.fill();
            ctx.strokeStyle = 'rgba(0,255,160,0.18)'; ctx.lineWidth = 0.5; ctx.stroke();
          }
        }
      }
    }

    // ── DRAW: TECH OBJECTS ────────────────────────────────────────────────────
    const SHAPE_COLORS = {
      console: '200,130,20',
      scanner: '220,160,30',
      drone:   '160,40,255',
      core:    '255,20,120',
    };

    function drawTechObject(obj, now) {
      if (!obj.intact) return;
      const { col: tc, row: tr } = worldToHex(obj.x, obj.y);
      if (!visibleHexes.has(`${tc},${tr}`)) return;
      const wx = obj.x, wy = obj.y;
      const rgb = SHAPE_COLORS[obj.shape] || '200,130,20';
      const pulse = 0.5 + 0.5 * Math.sin(now * 0.0018 + obj.glowPhase);

      // Ambient glow halo
      const g = ctx.createRadialGradient(wx, wy, 0, wx, wy, 26);
      g.addColorStop(0,   `rgba(${rgb},${0.4 + pulse * 0.35})`);
      g.addColorStop(0.5, `rgba(${rgb},${0.1 + pulse * 0.1})`);
      g.addColorStop(1,   `rgba(${rgb},0)`);
      ctx.beginPath(); ctx.arc(wx, wy, 26, 0, Math.PI * 2);
      ctx.fillStyle = g; ctx.fill();

      // Body
      ctx.save();
      ctx.translate(wx, wy);
      ctx.rotate(now * 0.0004);
      ctx.strokeStyle = `rgba(${rgb},${0.7 + pulse * 0.3})`;
      ctx.lineWidth = 1.5;
      ctx.fillStyle = `rgba(${rgb},0.12)`;

      switch (obj.shape) {
        case 'core': {
          ctx.beginPath();
          for (let i = 0; i < 4; i++) {
            const a = (Math.PI / 2) * i - Math.PI / 4;
            const rr = 9;
            i === 0 ? ctx.moveTo(Math.cos(a)*rr, Math.sin(a)*rr) : ctx.lineTo(Math.cos(a)*rr, Math.sin(a)*rr);
          }
          ctx.closePath(); ctx.fill(); ctx.stroke();
          ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI*2); ctx.stroke();
          break;
        }
        case 'drone': {
          ctx.beginPath();
          for (let i = 0; i < 6; i++) {
            const a = (Math.PI / 3) * i;
            const rr = 9;
            i === 0 ? ctx.moveTo(Math.cos(a)*rr, Math.sin(a)*rr) : ctx.lineTo(Math.cos(a)*rr, Math.sin(a)*rr);
          }
          ctx.closePath(); ctx.fill(); ctx.stroke();
          ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI*2); ctx.stroke();
          break;
        }
        case 'scanner': {
          ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fill(); ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-9, 0); ctx.lineTo(9, 0);
          ctx.moveTo(0, -9); ctx.lineTo(0, 9);
          ctx.stroke();
          break;
        }
        default: { // console
          ctx.fillRect(-9, -6, 18, 13); ctx.strokeRect(-9, -6, 18, 13);
          ctx.lineWidth = 0.8;
          ctx.beginPath();
          ctx.moveTo(-6, -2); ctx.lineTo(4, -2);
          ctx.moveTo(-6,  1); ctx.lineTo(6,  1);
          ctx.moveTo(-6,  4); ctx.lineTo(2,  4);
          ctx.stroke();
          break;
        }
      }
      ctx.restore();

      // Scan dissolve animation
      if (obj.scanStartTime >= 0) {
        const t = Math.min(1, (now - obj.scanStartTime) / SCAN_DUR_MS);
        ctx.beginPath();
        ctx.arc(wx, wy, t * 44, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(0,255,80,${1 - t})`;
        ctx.lineWidth = 1.5; ctx.stroke();
        ctx.strokeStyle = `rgba(0,200,60,${(1 - t) * 0.5})`;
        ctx.beginPath(); ctx.arc(wx, wy, t * 28, 0, Math.PI * 2); ctx.stroke();
      }

      // Proximity prompt
      const dist = Math.hypot(obj.x - player.x, obj.y - player.y);
      if (dist < SCAN_RANGE + 20) {
        const alpha = Math.max(0, 1 - dist / (SCAN_RANGE + 20));
        ctx.font = `bold ${10 / zoom}px Courier New`;
        ctx.textAlign = 'center';
        ctx.fillStyle = `rgba(80,255,160,${alpha})`;
        ctx.fillText(obj.label, wx, wy - 20);
        ctx.fillStyle = `rgba(120,255,180,${alpha * 0.85})`;
        ctx.fillText('[E] SCAN', wx, wy - 10);
      }
    }

    // ── DRAW: PLAYER (world-space) ────────────────────────────────────────────
    function drawPlayer(now) {
      const wx = player.x, wy = player.y;

      const glow = ctx.createRadialGradient(wx, wy, 0, wx, wy, 30);
      glow.addColorStop(0,   'rgba(0,180,255,0.16)');
      glow.addColorStop(0.6, 'rgba(0,120,220,0.05)');
      glow.addColorStop(1,   'rgba(0,80,180,0)');
      ctx.beginPath(); ctx.arc(wx, wy, 30, 0, Math.PI*2);
      ctx.fillStyle = glow; ctx.fill();

      ctx.save();
      ctx.translate(wx, wy);
      ctx.rotate(player.angle);
      ctx.beginPath();
      ctx.moveTo(13, 0); ctx.lineTo(7, 4); ctx.lineTo(7, -4);
      ctx.closePath();
      ctx.fillStyle = 'rgba(100,230,255,0.85)'; ctx.fill();
      ctx.restore();

      ctx.beginPath(); ctx.arc(wx, wy, player.radius, 0, Math.PI*2);
      const bodyGrad = ctx.createRadialGradient(wx - 3, wy - 3, 0, wx, wy, player.radius);
      bodyGrad.addColorStop(0, '#bbffff');
      bodyGrad.addColorStop(1, '#004488');
      ctx.fillStyle = bodyGrad; ctx.fill();
      ctx.strokeStyle = '#00bbff'; ctx.lineWidth = 1.5; ctx.stroke();

      const coolPct = Math.min(1, (now - player.scanCooldownStart) / player.scanCooldownMs);
      if (coolPct < 1) {
        ctx.beginPath();
        ctx.arc(wx, wy, player.radius + 4, -Math.PI/2, -Math.PI/2 + Math.PI*2*coolPct);
        ctx.strokeStyle = `rgba(0,160,255,${0.5 + coolPct*0.3})`;
        ctx.lineWidth = 2; ctx.stroke();
      }
    }

    // ── DRAW: FX (world-space) ────────────────────────────────────────────────
    function drawFX() {
      for (let i = scanRings.length - 1; i >= 0; i--) {
        const ring = scanRings[i];
        ring.r   += 1.8;
        ring.life -= 0.016;
        if (ring.life <= 0) { scanRings.splice(i, 1); continue; }
        ctx.beginPath();
        ctx.arc(ring.x, ring.y, ring.r, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(${ring.color},${ring.life * 0.65})`;
        ctx.lineWidth = 1.2; ctx.stroke();
      }
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.life -= p.decay;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
        ctx.fillStyle = `rgba(${p.color},${p.life})`;
        ctx.fill();
      }
    }

    // ── COMMAND MODE ─────────────────────────────────────────────────────────
    function startCmd() {
      cmdState.active = true;
      cmdState.stage  = 1;
      cmdState.input  = '';
      cmdState.fragType = null;
      document.getElementById('left-panel').classList.add('cmd-hl-frags');
      updateCmdWindow();
    }

    function cancelCmd() {
      cmdState.active   = false;
      cmdState.stage    = 0;
      cmdState.input    = '';
      cmdState.fragType = null;
      document.getElementById('left-panel').classList.remove('cmd-hl-frags');
      document.getElementById('hotbarCanvas').classList.remove('cmd-hl-core');
      updateCmdWindow();
    }

    function handleCmdKey(e) {
      e.preventDefault();
      if (e.key === 'Escape') { cancelCmd(); return; }

      if (e.key === 'Backspace') {
        cmdState.input = cmdState.input.slice(0, -1);
        updateCmdWindow();
        return;
      }

      if (e.key === 'Enter') {
        if (cmdState.stage === 1) confirmFragCode();
        else if (cmdState.stage === 2) confirmCoreSlot();
        return;
      }

      if (cmdState.stage === 1 && cmdState.input.length < 4) {
        const ch = e.key.toUpperCase();
        if (/^[0-9A-F]$/.test(ch)) { cmdState.input += ch; updateCmdWindow(); }
      } else if (cmdState.stage === 2 && cmdState.input.length < 1) {
        if (/^[1-7]$/.test(e.key)) { cmdState.input += e.key; updateCmdWindow(); }
      }
    }

    function confirmFragCode() {
      const fragType = CODE_TO_ITEM[cmdState.input];
      if (!fragType) {
        log(`> CMD — unknown code: ${cmdState.input}`, 'error');
        cmdState.input = '';
        updateCmdWindow();
        return;
      }
      // Sensor node requires power node installed first
      if (fragType === 'SENSOR_NODE' && !CORE_SLOTS[1].assignments.some(a => a.fragType === 'POWER_NODE')) {
        log('> CMD — Sensor Node: power node must be installed in slot 1 first', 'error');
        cmdState.input = '';
        updateCmdWindow();
        return;
      }
      if ((player.inventory[fragType] || 0) === 0) {
        log(`> CMD — ${ITEMS[fragType].label}: not in cache`, 'error');
        cmdState.input = '';
        updateCmdWindow();
        return;
      }
      cmdState.fragType = fragType;
      cmdState.stage    = 2;
      cmdState.input    = '';
      document.getElementById('left-panel').classList.remove('cmd-hl-frags');
      document.getElementById('hotbarCanvas').classList.add('cmd-hl-core');
      updateCmdWindow();
    }

    function confirmCoreSlot() {
      const slotNum = parseInt(cmdState.input, 10);
      const slot = CORE_SLOTS[slotNum];
      if (!slot || !slot.unlocked) {
        log(`> CMD — core ${cmdState.input || '?'}: not available`, 'error');
        cmdState.input = '';
        updateCmdWindow();
        return;
      }
      if (slot.assignments.length >= 6) {
        log(`> CMD — core ${slotNum}: full (6/6)`, 'error');
        cmdState.input = '';
        updateCmdWindow();
        return;
      }
      slot.assignments.push({ fragType: cmdState.fragType });
      log(`> ${ITEMS[cmdState.fragType].label} > Core ${slotNum}`, 'success');
      updateInventoryUI();   // reveal gated items (e.g. sensor after power)
      updateVisibility();    // activate sensor vision immediately if just installed
      cancelCmd();
    }

    function updateCmdWindow() {
      const display = document.getElementById('cmd-display');
      const hint    = document.getElementById('cmd-stage-hint');
      if (!cmdState.active) {
        display.innerHTML = '<span class="cmd-idle">[ &gt; ] enter command</span>';
        hint.textContent  = '';
        return;
      }
      if (cmdState.stage === 1) {
        display.innerHTML = `<span style="color:#33cc99;">&gt; ${cmdState.input}<span class="cmd-cursor"></span></span>`;
        hint.textContent  = 'FRAG CODE  [ 0-9  A-F ]   ESC to cancel';
      } else if (cmdState.stage === 2) {
        const code = ITEMS[cmdState.fragType].code;
        display.innerHTML =
          `<span style="color:#33cc99;">&gt; ${code} → Core ${cmdState.input}<span class="cmd-cursor"></span></span>`;
        hint.textContent = `${ITEMS[cmdState.fragType].label} → CORE #  [ 1-7 ]   ESC to cancel`;
      }
    }

    // ── HOTBAR ────────────────────────────────────────────────────────────────
    const hotbarCanvas = document.getElementById('hotbarCanvas');
    const hCtx = hotbarCanvas.getContext('2d');
    const HOT_SIZE = 26;                         // hotbar hex circumradius
    const HOT_DIST = HOT_SIZE * Math.sqrt(3);    // center-to-neighbor distance

    // Ring angles for flat-top hex neighbors (degrees → radians)
    const RING_ANGLES = [330, 30, 90, 150, 210, 270].map(d => d * Math.PI / 180);

    // hotbarState retained for future use; assignments drive visuals via CORE_SLOTS
    const hotbarState = {};

    // Core slots: 1=center, 2-7=ring clockwise from upper-left (330°)
    const CORE_SLOTS = {
      1: { unlocked: true,  ringIdx: -1, assignments: [] },
      2: { unlocked: false, ringIdx:  0, assignments: [] },
      3: { unlocked: false, ringIdx:  1, assignments: [] },
      4: { unlocked: false, ringIdx:  2, assignments: [] },
      5: { unlocked: false, ringIdx:  3, assignments: [] },
      6: { unlocked: false, ringIdx:  4, assignments: [] },
      7: { unlocked: false, ringIdx:  5, assignments: [] },
    };

    // Command-mode state
    const cmdState = {
      active:   false,
      stage:    0,      // 0=idle, 1=entering frag code, 2=entering core #
      input:    '',
      fragType: null,
    };

    function hotHexPath(hc, cx, cy, s) {
      hc.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI / 3) * i;
        i === 0
          ? hc.moveTo(cx + s * Math.cos(a), cy + s * Math.sin(a))
          : hc.lineTo(cx + s * Math.cos(a), cy + s * Math.sin(a));
      }
      hc.closePath();
    }

    // Wedge i fills the i-th clockwise slice of a hex, starting at 12:00.
    function drawWedge(cx, cy, s, idx, fill, stroke) {
      const a1 = (240 + idx * 60) * Math.PI / 180;
      const a2 = (300 + idx * 60) * Math.PI / 180;
      hCtx.beginPath();
      hCtx.moveTo(cx, cy);
      hCtx.lineTo(cx + s * Math.cos(a1), cy + s * Math.sin(a1));
      hCtx.lineTo(cx + s * Math.cos(a2), cy + s * Math.sin(a2));
      hCtx.closePath();
      hCtx.fillStyle = fill; hCtx.fill();
      if (stroke) { hCtx.strokeStyle = stroke; hCtx.lineWidth = 0.8; hCtx.stroke(); }
    }

    function drawHotbar(now) {
      const W = hotbarCanvas.width, H = hotbarCanvas.height;
      hCtx.clearRect(0, 0, W, H);
      const CX = W / 2, CY = H / 2;
      const S = HOT_SIZE;

      // ── Ring hexes ──
      RING_ANGLES.forEach((angle, ringIdx) => {
        const slotNum = ringIdx + 2;
        const slot = CORE_SLOTS[slotNum];
        const rx = CX + HOT_DIST * Math.cos(angle);
        const ry = CY + HOT_DIST * Math.sin(angle);
        hotHexPath(hCtx, rx, ry, S - 1);

        if (slot.unlocked) {
          hCtx.fillStyle = '#0c0c22'; hCtx.fill();
          hCtx.strokeStyle = '#2a2a55'; hCtx.lineWidth = 1.2; hCtx.stroke();
          slot.assignments.forEach((a, i) => {
            const rgb = hexColorToRgb(ITEMS[a.fragType].color);
            drawWedge(rx, ry, S, i, `rgba(${rgb},0.8)`, `rgba(${rgb},0.95)`);
          });
        } else {
          hCtx.fillStyle = '#08081a'; hCtx.fill();
          hCtx.strokeStyle = '#141432'; hCtx.lineWidth = 1.2; hCtx.stroke();
          const inset = S * 0.45;
          hCtx.strokeStyle = 'rgba(160,20,0,0.45)'; hCtx.lineWidth = 1;
          hCtx.beginPath();
          hCtx.moveTo(rx - inset, ry - inset); hCtx.lineTo(rx + inset, ry + inset);
          hCtx.moveTo(rx + inset, ry - inset); hCtx.lineTo(rx - inset, ry + inset);
          hCtx.stroke();
        }

        // Core number overlay for unlocked ring slots
        if (slot.unlocked) {
          hCtx.font = 'bold 9px Courier New';
          hCtx.textAlign = 'center';
          hCtx.textBaseline = 'middle';
          hCtx.fillStyle = 'rgba(220,230,240,0.5)';
          hCtx.fillText(String(slotNum), rx, ry);
          hCtx.textBaseline = 'alphabetic';
        }
      });

      // ── Center hex ──
      hotHexPath(hCtx, CX, CY, S - 1);
      hCtx.fillStyle = '#0c0c22'; hCtx.fill();

      const hasPower = CORE_SLOTS[1].assignments.some(a => a.fragType === 'POWER_NODE');
      if (hasPower) {
        const pulse = 0.5 + 0.5 * Math.sin(now * 0.003);
        hotHexPath(hCtx, CX, CY, S - 1);
        hCtx.strokeStyle = `rgba(30,100,255,${0.45 + pulse * 0.5})`;
        hCtx.lineWidth = 3 + pulse * 2; hCtx.stroke();
      } else {
        hotHexPath(hCtx, CX, CY, S - 1);
        hCtx.strokeStyle = '#1c1c44'; hCtx.lineWidth = 1.2; hCtx.stroke();
      }

      // Assignment wedges for core 1 — power node powers the slot, doesn't fill a wedge
      const moduleAssignments = CORE_SLOTS[1].assignments.filter(a => a.fragType !== 'POWER_NODE');
      moduleAssignments.forEach((a, i) => {
        if (i < 6) {
          const rgb = hexColorToRgb(ITEMS[a.fragType].color);
          drawWedge(CX, CY, S, i, `rgba(${rgb},0.75)`, `rgba(${rgb},0.95)`);
        }
      });

      // Core "1" number — always on top, white-grey, 50% opacity
      hCtx.font = 'bold 10px Courier New';
      hCtx.textAlign = 'center';
      hCtx.textBaseline = 'middle';
      hCtx.fillStyle = 'rgba(220,230,240,0.5)';
      hCtx.fillText('1', CX, CY);
      hCtx.textBaseline = 'alphabetic';
    }

    // ── STATUS BAR UPDATE ─────────────────────────────────────────────────────
    function updateStatusBar(now) {
      const coolPct = Math.min(1, (now - player.scanCooldownStart) / player.scanCooldownMs);
      const scanFill = document.getElementById('scan-fill');
      if (scanFill) {
        scanFill.style.width = (coolPct * 100) + '%';
        scanFill.style.background = coolPct >= 1 ? '#0088ff' : '#003366';
      }

      const { col: pc, row: pr } = worldToHex(player.x, player.y);
      const locEl = document.getElementById('location');
      if (!locEl) return;
      locEl.textContent = (pr >= 2 && pr <= 18 && pc >= 2 && pc <= 22)
        ? 'LOC: SECTOR A' : 'LOC: UNKNOWN';
    }


    // ── MAIN LOOP ─────────────────────────────────────────────────────────────
    let lastTime = 0;

    function gameLoop(now) {
      requestAnimationFrame(gameLoop);
      if (booting) return;
      lastTime = now;

      // Movement — arrow keys only
      let dx = 0, dy = 0;
      if (keys['ArrowUp'])    dy -= 1;
      if (keys['ArrowDown'])  dy += 1;
      if (keys['ArrowLeft'])  dx -= 1;
      if (keys['ArrowRight']) dx += 1;

      const isMoving = dx !== 0 || dy !== 0;
      if (isMoving) {
        const len = Math.hypot(dx, dy);
        dx /= len; dy /= len;
        player.angle = Math.atan2(dy, dx);
        const nx = player.x + dx * player.speed;
        const ny = player.y + dy * player.speed;
        if (canMoveTo(nx, player.y)) player.x = nx;
        if (canMoveTo(player.x, ny)) player.y = ny;
      } else {
        // Sensor vision only refreshes while holding still
        updateVisibility();
      }

      // Camera (world-space top-left corner of view)
      const camX = player.x - canvas.width  / (2 * zoom);
      const camY = player.y - canvas.height / (2 * zoom);

      // Clear
      ctx.fillStyle = '#070710';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // World-space rendering (all coords are world units)
      ctx.save();
      ctx.scale(zoom, zoom);
      ctx.translate(-camX, -camY);

      drawHexTiles(camX, camY, now);
      for (const obj of techObjects) drawTechObject(obj, now);
      drawFX();
      drawPlayer(now);

      ctx.restore();

      // Screen-space vignette
      const vig = ctx.createRadialGradient(
        canvas.width/2, canvas.height/2, canvas.height*0.3,
        canvas.width/2, canvas.height/2, canvas.height*0.85
      );
      vig.addColorStop(0, 'rgba(0,0,0,0)');
      vig.addColorStop(1, 'rgba(0,0,8,0.5)');
      ctx.fillStyle = vig;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawHotbar(now);
      updateStatusBar(now);
    }

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
