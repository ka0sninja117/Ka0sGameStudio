                    const isInNoiseBurst = lastNoiseBurstTime > 0 && (currentTime - lastNoiseBurstTime) < STEALTH_NOISE_BURST_DURATION;
                    const isAbilityMoving = isPerformingMovementAbility && (lastActivatedAbilityRef === 'pounce' || lastActivatedAbilityRef === 'dash');
                    if (isAbilityMoving || isInNoiseBurst) {
                        // Pounce/dash: brief noise burst, very low stealth
                        currentStealthFactor = baseStealthFactor * STEALTH_NOISE_MULT;
                    } else if (isBurrowing) {
                        // Burrowing: hefty flat bonus (stacks with base stealth stat)
                        currentStealthFactor = Math.min(1.0, baseStealthFactor + STEALTH_BURROW_BONUS);
                    } else if (isMoving) {
                        currentStealthFactor = baseStealthFactor * STEALTH_MOVING_MULT;
                    } else {
                        currentStealthFactor = baseStealthFactor * STEALTH_STATIONARY_MULT;
                    }
                    // Foliage bonus: being inside a patch doubles stealth (capped at 1.0)
                    if (isInFoliage) currentStealthFactor = Math.min(1.0, currentStealthFactor * 2);
                }

                // --- Level 2 detection scan (runs every frame, independent of movement) ---
                npcs.forEach(npc => {
                    if (npc.level < 2 || npc.state !== 'patrol') return;
                    // Detect player — detection radius scaled by stealth factor
                    {
                        const effectiveDetectionRadius = npc.detectionRadius * (1 - currentStealthFactor);
                        const pdx = playerX - npc.x, pdy = playerY - npc.y;
                        if (Math.sqrt(pdx * pdx + pdy * pdy) <= effectiveDetectionRadius) {
                            enterChase(npc, 'player');
                            return;
                        }
                    }
                    // Detect equal/lower-level NPCs (skip the player's current combatTarget)
                    for (const other of npcs) {
                        if (other !== npc && other !== combatTarget && other.level <= npc.level) {
                            const odx = other.x - npc.x, ody = other.y - npc.y;
                            if (Math.sqrt(odx * odx + ody * ody) <= npc.detectionRadius) {
                                enterChase(npc, other);
                                return;
                            }
                        }
                    }
                });

                // --- NPC chase / combat AI ---
                npcs.forEach(npc => {
                    if (npc.state !== 'chasing' && npc.state !== 'combat') return;

                    // Lose-interest timeout
                    if (npc.loseInterestAt > 0 && currentTime > npc.loseInterestAt) {
                        returnToPatrol(npc);
                        return;
                    }

                    // Resolve target position
                    let targetX, targetY, targetRadius;
                    if (npc.aggroTarget === 'player') {
                        targetX = playerX; targetY = playerY; targetRadius = playerRadius;
                        // Level 2: lose interest if player escapes detection range (1.5× buffer)
                        if (npc.level >= 2) {
                            const pdx = targetX - npc.x, pdy = targetY - npc.y;
                            if (Math.sqrt(pdx * pdx + pdy * pdy) > npc.detectionRadius * 1.5) {
                                returnToPatrol(npc);
                                return;
                            }
                        }
                    } else if (npc.aggroTarget && npcs.includes(npc.aggroTarget)) {
                        targetX = npc.aggroTarget.x;
                        targetY = npc.aggroTarget.y;
                        targetRadius = npc.aggroTarget.radius;
                    } else {
                        returnToPatrol(npc); // Target gone (dead or removed)
                        return;
                    }

                    const dx = targetX - npc.x, dy = targetY - npc.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const inAttackRange = checkCircleCollision(npc.x, npc.y, npc.radius, targetX, targetY, targetRadius);

                    if (inAttackRange) {
                        npc.state = 'combat';
                        npc.directionAngle = Math.atan2(dy, dx);

                        // NPC-vs-NPC attacks (player-vs-NPC attacks handled by the inCombat loop)
                        if (npc.aggroTarget !== 'player') {
                            if (currentTime - npc.lastAttackTime >= npc.attackCooldown) {
                                const target = npc.aggroTarget;
                                dealDamageNpcToNpc(npc, target);
                                npc.lastAttackTime = currentTime;
                                npc.attackCooldown = 500;
                                npc.isAttacking = true;
                                npc.attackAnimStartTime = currentTime;
                                // Refresh lose-interest timer on successful attack
                                npc.loseInterestAt = currentTime + npc.loseInterestDuration;
                                if (target.loseInterestDuration > 0)
                                    target.loseInterestAt = currentTime + target.loseInterestDuration;

                                // Make the attacked NPC aggro back if it was patrolling
                                if (target.state === 'patrol') {
                                    enterChase(target, npc);
                                }

                                // Handle NPC death from NPC attack
                                if (target.currentHp <= 0) {
                                    npcs = npcs.filter(n => n !== target);
                                    returnToPatrol(npc);
                                    while (npcs.length < MAX_ENEMIES) {
                                        npcs.push(createSingleNPC(getSpawnableNpcLevel()));
                                    }
                                }
                            }
                        }
                    } else {
                        // Chase: move toward target
                        npc.state = 'chasing';
                        const npcSpeed = Math.max(0.1, baseNpcSpeed * (1 + npc.speed / 100));
                        const ratio = npcSpeed / dist;
                        npc.x += dx * ratio;
                        npc.y += dy * ratio;
                        npc.directionAngle = Math.atan2(dy, dx);
                        npc.x = Math.max(npc.size / 2, Math.min(npc.x, worldWidth - npc.size / 2));
                        npc.y = Math.max(npc.size / 2, Math.min(npc.y, worldHeight - npc.size / 2));
                    }
                });

                // NPC automatic combat initiation if player is in range and not already in combat with that NPC.
                // Note: targetedNpc is intentionally NOT set here — the player must choose to counter-attack.
                // This allows the player to run away freely when an NPC initiates contact.
                if (!inCombat && !isBurrowing && !(isPerformingMovementAbility && lastActivatedAbilityRef === 'pounce')) { // Updated from jump
                    for (const npc of npcs) {
                        if (checkCircleCollision(playerX, playerY, playerRadius, npc.x, npc.y, npc.radius)) {
                            inCombat = true;
                            combatTarget = npc;
                            combatTarget.inCombat = true;
                            combatTarget.state = 'combat';
                            combatTarget.aggroTarget = 'player';
                            if (combatTarget.loseInterestDuration === 0) {
                                combatTarget.loseInterestDuration = combatTarget.level >= 2
                                    ? 3000 + Math.random() * 2000
                                    : 1000 + Math.random() * 2000;
                            }
                            combatTarget.loseInterestAt = currentTime + combatTarget.loseInterestDuration;
                            // Pass player's details with isPlayer:true for correct first attacker logic
                            determineFirstAttackerAndSetTimers({ x: playerX, y: playerY, directionAngle: playerDirectionAngle, isPlayer: true }, combatTarget);
                            break; // Only one combat at a time
                        }
                    }
                }


                if (inCombat && combatTarget) {
                    // Check if player moved away from combat target or used a mobility ability
                    // Combat only ends if player explicitly moves away or uses certain abilities (burrow, pounce).
                    const combatShouldContinue = checkCircleCollision(playerX, playerY, playerRadius, combatTarget.x, combatTarget.y, combatTarget.radius) && !isBurrowing && !(isPerformingMovementAbility && lastActivatedAbilityRef === 'pounce'); // Updated from jump

                    if (!combatShouldContinue) {
                        inCombat = false;
                        if (combatTarget) {
                            combatTarget.inCombat = false;
                            // Keep NPC chasing if it still has interest, otherwise return to patrol
                            if (combatTarget.loseInterestAt > 0 && currentTime < combatTarget.loseInterestAt) {
                                combatTarget.state = 'chasing';
                            } else {
                                returnToPatrol(combatTarget);
                            }
                        }
                        combatTarget = null;
                        isMoving = false;
                        showTargetIndicator = false;
                        // targetedNpc is *not* cleared here, as player might still want to target the NPC without being in combat
                    } else {

                    // Player attack logic: Only if targetedNpc is set AND it's the current combatTarget
                    if (targetedNpc && targetedNpc === combatTarget) {
                        if (currentTime - playerLastAttackTime >= playerAttackCooldown) {
                            // Orient player towards target before attacking
                            playerDirectionAngle = Math.atan2(combatTarget.y - playerY, combatTarget.x - playerX);
                            dealDamage({ attack: playerStats.attack, isPlayer: true, x: playerX, y: playerY, radius: playerRadius }, combatTarget, currentTime); // Pass currentTime
                            combatTarget.loseInterestAt = currentTime + combatTarget.loseInterestDuration; // Reset chase timer on hit
                            playerLastAttackTime = currentTime;
                            playerAttackCooldown = combatDelay; // Subsequent attacks every 0.5 seconds
                            playerIsAttacking = true;
                            playerAttackAnimStartTime = currentTime;
                        }
                    }

                    // NPC attack logic (always, if in combat and not prevented by player's dash)
                    if (currentTime - combatTarget.lastAttackTime >= combatTarget.attackCooldown) {
                        if (!(isPerformingMovementAbility && lastActivatedAbilityRef === 'dash')) { // Prevent NPC attack if player just dashed through
                            // Orient NPC towards player before attacking
                            combatTarget.directionAngle = Math.atan2(playerY - combatTarget.y, playerX - combatTarget.x);
                            // This is the NEW, SIMPLIFIED code
                            dealDamage(combatTarget, playerStats, currentTime);
                            combatTarget.loseInterestAt = currentTime + combatTarget.loseInterestDuration; // Reset chase timer on hit
                            combatTarget.isAttacking = true;
                            combatTarget.attackAnimStartTime = currentTime;
                        }
                        combatTarget.lastAttackTime = currentTime;
                        combatTarget.attackCooldown = combatDelay; // Subsequent attacks every 0.5 seconds
                    }


                    if (combatTarget.currentHp <= 0) {
                    
                        // Look up the XP reward based on the defeated NPC's level
                        const xpGained = NPC_XP_REWARDS[combatTarget.level] || 0;
                        playerStats.currentXp += xpGained;
                        updatePlayerLevel(); // This also updates xpToNextLevel
                    
                        // Hunger is now reduced by the amount of XP gained adjusted per the user's level
                        reducePlayerHunger(xpGained);
                        npcKillCount++;

                        deadNpcs.push({
                            level: combatTarget.level,
                            x: combatTarget.x,
                            y: combatTarget.y,
                            maxHp: combatTarget.maxHp,
                            id: combatTarget.id,
                            name: combatTarget.name,
                            emoji: combatTarget.emoji,
                            totalDamageDealtByPlayer: combatTarget.totalDamageReceivedFromPlayer,
                            totalDamageReceivedByPlayer: combatTarget.totalDamageDealtToPlayer
                        });
                        npcs = npcs.filter(n => n !== combatTarget);
                        inCombat = false;
                        combatTarget = null;
                        isMoving = false;
                        showTargetIndicator = false;
                        targetedNpc = null; // Clear target on death

                        while (npcs.length < MAX_ENEMIES) {
                            npcs.push(createSingleNPC(getSpawnableNpcLevel()));
                        }
                    }
                    } // end else (combatShouldContinue)
                }
            }


        // Camera and Zoom (always run, even if game logic is paused for admin/origin panel)
        if (isMapModeActive) { // If in map mode, zoom out
            zoomScale = Math.min(canvas.width / worldWidth, canvas.height / worldHeight);
            cameraX = 0;
            cameraY = 0;
        } else { // Otherwise, zoom in on player
            zoomScale = 1;

            let desiredCameraX = playerX - canvas.width / 2;
            let desiredCameraY = playerY - canvas.height / 2;

            const overpan = 150; // This is the buffer in pixels.

            // These two lines are updated to include the 'overpan' buffer.
            cameraX = Math.max(0 - overpan, Math.min(desiredCameraX, worldWidth - canvas.width + overpan));
            cameraY = Math.max(0 - overpan, Math.min(desiredCameraY, worldHeight - canvas.height + overpan));

            if (canvas.width > worldWidth) {
                cameraX = (worldWidth - canvas.width) / 2;
            }
            if (canvas.height > worldHeight) {
                cameraY = (worldHeight - canvas.height) / 2;
            }
        }

            // Update closest NPC for radial indicator even if game logic is paused by menu
            // Only if inGame state and not map mode
            if (gameState === 'inGame' && !isMapModeActive) {
                let minDistance = Infinity;
                let tempClosestNpcAngle = 0;
                let tempClosestNpcDistance = Infinity;
                let foundClosest = false;
                tremorSenseNpcData = [];

                npcs.forEach(npc => {
                    const dx = npc.x - playerX;
                    const dy = npc.y - playerY;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < minDistance) {
                        minDistance = distance;
                        tempClosestNpcAngle = Math.atan2(dy, dx);
                        tempClosestNpcDistance = distance;
                        foundClosest = true;
                    }

                    const tremorRange = playerAbilities.tremorSense >= 2 ? TREMOR_SENSE_LV2_RANGE : TREMOR_SENSE_LV1_RANGE;
                    if (isTremorSenseActive && distance <= tremorRange) {
                        tremorSenseNpcData.push({ angle: Math.atan2(dy, dx), distance });
                    }
                });

                if (foundClosest) {
                    closestNpcAngle = tempClosestNpcAngle;
                    closestNpcDistance = tempClosestNpcDistance;
                } else {
                    closestNpcDistance = Infinity; // No NPCs visible, hide indicator
                }
            } else {
                closestNpcDistance = Infinity; // Hide indicator if not inGame or in map mode
                tremorSenseNpcData = [];
            }
        }

        const STATIC_RADIAL_INDICATOR_RADIUS = (800 / 3) / 2;

        const HOTBAR_SLOT_SIZE = 45;
        const HOTBAR_SPACING = 3;
        const HOTBAR_TOTAL_WIDTH = (hotbarSlots.length * HOTBAR_SLOT_SIZE) + ((hotbarSlots.length - 1) * HOTBAR_SPACING);
        const HOTBAR_MARGIN_BOTTOM = 5;

        const PLAYER_INFO_PANEL_PADDING = 15;
        const PLAYER_INFO_PANEL_CORNER_RADIUS = 10;
        const PLAYER_INFO_PANEL_BG_COLOR = 'rgba(30, 30, 45, 0.9)';
        const PLAYER_INFO_PANEL_BORDER_COLOR = '#6A0DAD';
        const PLAYER_INFO_BAR_HEIGHT = 12;
        const PLAYER_INFO_BAR_SPACING = 5;
        const PLAYER_INFO_STAT_LINE_HEIGHT = 18;
        const PLAYER_INFO_PLAYER_NAME = "Arachnoid"; // Updated default name

        const NEW_PLAYER_INFO_PANEL_WIDTH = 170 * 0.8; // Shrunk by 10%

        let showHitCircles = false; // New global variable for toggling hitbox visibility

        function drawPanelBar(x, y, width, height, currentValue, maxValue, type, labelText, cornerRadius = 5) {
            const percentage = (currentValue / maxValue) * 100;
            const fillWidth = (currentValue / maxValue) * width;

            // Draw label and raw values (e.g., "Health: 50 / 50")
            ctx.fillStyle = 'white';
            ctx.font = `10px "Inter", sans-serif`;
            ctx.textAlign = 'left';
            ctx.textBaseline = 'bottom'; // Align to bottom of text, effectively placing it above the bar
            let displayCurrent = currentValue.toFixed(0);
            let displayMax = maxValue.toFixed(0);
            if (type === 'xp') {
                if (playerStats.playerLevel >= MAX_PLAYER_LEVEL) {
                    ctx.fillText(`${labelText}: MAX`, x, y - 2);
                    ctx.fillStyle = 'rgba(50, 50, 50, 0.8)';
                    ctx.beginPath();
                    ctx.roundRect(x, y, width, height, cornerRadius);
                    ctx.fill();
                    ctx.fillStyle = '#4A90E2';
                    ctx.beginPath();
                    ctx.roundRect(x, y, width, height, cornerRadius);
                    ctx.fill();
                    return;
                }
                displayMax = playerStats.xpToNextLevel.toFixed(0); // For XP, max is xpToNextLevel
            }
            ctx.fillText(`${labelText}: ${displayCurrent} / ${displayMax}`, x, y - 2); // Position 2px above the bar

            // Draw background bar
            ctx.fillStyle = 'rgba(50, 50, 50, 0.8)';
            ctx.beginPath();
            ctx.roundRect(x, y, width, height, cornerRadius);
            ctx.fill();

            // Determine fill color based on type
            let fillColor; // Declare here so it's scoped correctly
            if (type === 'hp') {
                fillColor = colorNeonGreen; // Always green for HP
            } else if (type === 'hunger') {
                fillColor = colorRed; // Always red for Hunger
            } else if (type === 'xp') {
                fillColor = '#4A90E2'; // Blue for XP bar
            } else {
                fillColor = 'gray'; // Default or error color
            }

            // Draw filled bar
            ctx.fillStyle = fillColor; // Set the determined color
            ctx.beginPath();
            ctx.roundRect(x, y, fillWidth, height, cornerRadius); // Use fillWidth here
            ctx.fill();

            // Flash the hunger bar outline when hunger is full (taking HP damage)
            if (type === 'hunger' && currentValue >= maxValue) {
                const flashAlpha = 0.5 + 0.5 * Math.sin(performance.now() / 150);
                ctx.strokeStyle = `rgba(255, 80, 80, ${flashAlpha})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(x - 1, y - 1, width + 2, height + 2, cornerRadius + 1);
                ctx.stroke();
            }
        }

        function drawHotbar() {
            if (isMapModeActive || gameOver) return; // Hide hotbar in map mode or game over

            const currentHotbarSlotSize = HOTBAR_SLOT_SIZE;
            const actualHotbarWidth = HOTBAR_TOTAL_WIDTH;


            const hotbarX = (canvas.width / 2) - (actualHotbarWidth / 2); // Correctly horizontally centered
            const hotbarY = canvas.height - currentHotbarSlotSize - HOTBAR_MARGIN_BOTTOM;

            hotbarSlots.forEach((slot, index) => {
                const slotX = hotbarX + (index * (currentHotbarSlotSize + HOTBAR_SPACING));
                const slotY = hotbarY;

                ctx.fillStyle = 'rgba(30, 30, 30, 0.9)';
                ctx.fillRect(slotX, slotY, currentHotbarSlotSize, currentHotbarSlotSize);

                if (slot.abilityRef && playerAbilities[slot.abilityRef] > 0) {
                    ctx.strokeStyle = '#6A0DAD';
                } else {
                    ctx.strokeStyle = '#777';
                }
                ctx.lineWidth = 2;
                ctx.strokeRect(slotX, slotY, currentHotbarSlotSize, currentHotbarSlotSize);

                if (!slot.abilityRef || playerAbilities[slot.abilityRef] === 0) {
                    ctx.fillStyle = 'rgba(255, 215, 0, 0.5)';
                } else {
                    ctx.fillStyle = '#FFD700';
                }
                ctx.font = `bold ${currentHotbarSlotSize * 0.4}px "Inter", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.fillText(slot.keybind.toUpperCase(), slotX + currentHotbarSlotSize / 2, slotY + currentHotbarSlotSize * 0.1 + 5);

                if (slot.abilityRef && playerAbilities[slot.abilityRef] > 0) {
                    const abilityLevel = playerAbilities[slot.abilityRef];

                    ctx.fillStyle = 'white';
                    ctx.font = `${currentHotbarSlotSize * 0.2}px "Inter", sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    ctx.fillText(slot.abilityName, slotX + currentHotbarSlotSize / 2, slotY + currentHotbarSlotSize - 5);

                    ctx.fillStyle = abilityLevel >= 2 ? '#00CED1' : '#888888';
                    ctx.font = `bold ${currentHotbarSlotSize * 0.2}px "Inter", sans-serif`;
                    ctx.textAlign = 'left';
                    ctx.textBaseline = 'top';
                    ctx.fillText(`Lv.${abilityLevel}`, slotX + 3, slotY + 3);

                    const cx = slotX + currentHotbarSlotSize / 2;
                    const cy = slotY + currentHotbarSlotSize / 2;
                    const r  = currentHotbarSlotSize / 2;

                    if (slot.abilityRef === 'tremorSense' && isTremorSenseActive) {
                        // Active-duration arc: teal pie counting down the 5s window
                        const elapsed = performance.now() - tremorSenseStartTime;
                        const remaining = Math.max(0, TREMOR_SENSE_MAX_DURATION - elapsed);
                        const activeFraction = remaining / TREMOR_SENSE_MAX_DURATION;
                        const arcAngle = Math.PI * 2 * activeFraction;

                        ctx.fillStyle = 'rgba(0, 200, 200, 0.45)';
                        ctx.beginPath();
                        ctx.moveTo(cx, cy);
                        ctx.arc(cx, cy, r, -Math.PI / 2, -Math.PI / 2 + arcAngle, false);
                        ctx.lineTo(cx, cy);
                        ctx.fill();

                        ctx.fillStyle = 'white';
                        ctx.font = `bold ${currentHotbarSlotSize * 0.35}px Arial`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(Math.ceil(remaining / 1000), cx, cy);
                    } else {
                        const cooldownRemaining = getCooldownRemaining(slot.abilityRef);
                        if (cooldownRemaining > 0) {
                            const cooldownFraction = cooldownRemaining / cooldowns[slot.abilityRef].duration;
                            const arcAngle = Math.PI * 2 * cooldownFraction;

                            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                            ctx.beginPath();
                            ctx.moveTo(cx, cy);
                            ctx.arc(cx, cy, r, -Math.PI / 2, -Math.PI / 2 + arcAngle, false);
                            ctx.lineTo(cx, cy);
                            ctx.fill();

                            ctx.fillStyle = 'white';
                            ctx.font = `bold ${currentHotbarSlotSize * 0.35}px Arial`;
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            ctx.fillText(Math.ceil(cooldownRemaining / 1000), cx, cy);
                        }
                    }
                }
            });
        }

        function drawPlayerInfoPanel() {
            if (isMapModeActive || gameOver) return; // Hide panel in map mode or game over

            const panelX = 2;
            const panelWidth = NEW_PLAYER_INFO_PANEL_WIDTH;

            const levelBoxHeight = 22 * 0.9;
            const lineHeight = 16;
            const textLines = (() => {
                const combinedText = `${playerGeneticOrigin ? playerGeneticOrigin.name : PLAYER_INFO_PLAYER_NAME} ${playerStats.playerEvolutionState}`;
                ctx.font = `bold 14px "Inter", sans-serif`;
                const availableWidthForText = panelWidth - (2 * PLAYER_INFO_PANEL_PADDING) - (30 * 0.9) - 8;
                let words = combinedText.split(' ');
                let lines = [];
                let currentLine = '';
                for (let i = 0; i < words.length; i++) {
                    let testLine = currentLine + words[i] + (i < words.length - 1 ? ' ' : '');
                    if (ctx.measureText(testLine).width < availableWidthForText) {
                        currentLine = testLine;
                    } else {
                        lines.push(currentLine);
                        currentLine = words[i] + (i < words.length - 1 ? ' ' : '');
                    }
                }
                lines.push(currentLine);
                return lines.filter(line => line.trim() !== '');
            })();

            // Calculate content height needed *before* any scaling or positioning
            let requiredContentHeight = 0;
            requiredContentHeight += PLAYER_INFO_PANEL_PADDING; // Top padding
            requiredContentHeight += Math.max(textLines.length * lineHeight, levelBoxHeight); // Player name/level height
            requiredContentHeight += PLAYER_INFO_PANEL_PADDING / 2; // Space before bars
            requiredContentHeight += (PLAYER_INFO_BAR_HEIGHT + PLAYER_INFO_BAR_SPACING + 10) * 3; // 3 bars + labels + spacing
            requiredContentHeight += 2; // Small spacing after XP bar
            requiredContentHeight += 1 + 3; // First Separator
            requiredContentHeight += PLAYER_INFO_STAT_LINE_HEIGHT * 5; // 5 stat lines
            requiredContentHeight += 1 + 3; // Second Separator

            if (playerGeneticOrigin && Object.keys(playerGeneticOrigin.bonusStats).length > 0) {
                requiredContentHeight += Object.keys(playerGeneticOrigin.bonusStats).length * PLAYER_INFO_STAT_LINE_HEIGHT;
            }

            // Calculate the desired bottom edge of the panel (5px from canvas bottom)
            const canvasBottomMargin = 5;
            const desiredPanelBottomY = canvas.height - canvasBottomMargin;

            // Calculate the panel's top position based on its *original* bottom alignment relative to hotbar,
            // then apply the 25px upward shift.
            const hotbarTopY = canvas.height - HOTBAR_SLOT_SIZE - HOTBAR_MARGIN_BOTTOM;
            const originalPanelBottomAlignedY = hotbarTopY - 5; // The bottom it *used* to align with

            // The original panel's top was calculated with a 0.85 scaling factor on its height.
            const originalPanelTopUnshifted = originalPanelBottomAlignedY - (requiredContentHeight * 0.85);

            // Now, apply the 25px upward shift from this original calculated top
            const panelY = originalPanelTopUnshifted - 25;

            // The final height is from the newly calculated `panelY` down to `desiredPanelBottomY`
            let finalPanelHeight = desiredPanelBottomY - panelY;


            // Ensure finalPanelHeight is not negative or zero.
            if (finalPanelHeight <= 0) {
                console.warn("Calculated finalPanelHeight is non-positive. Adjusting to a minimum height.");
                finalPanelHeight = 10; // Fallback minimum height
            }

            // --- Now, draw the panel background and content ---
            ctx.fillStyle = PLAYER_INFO_PANEL_BG_COLOR;
            ctx.strokeStyle = PLAYER_INFO_PANEL_BORDER_COLOR;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(panelX, panelY, panelWidth, finalPanelHeight, PLAYER_INFO_PANEL_CORNER_RADIUS);
            ctx.fill();
            ctx.stroke();

            let currentDrawingY = panelY + PLAYER_INFO_PANEL_PADDING;

            // Player Level Box
            const levelBoxWidth = 30 * 0.9;
            const levelBoxX = panelX + PLAYER_INFO_PANEL_PADDING;
            const levelBoxY = currentDrawingY;

            ctx.strokeStyle = '#9932CC';
            ctx.lineWidth = 2;
            ctx.fillStyle = 'rgba(128, 0, 128, 0.4)';
            ctx.beginPath();
            ctx.roundRect(levelBoxX, levelBoxY, levelBoxWidth, levelBoxHeight, 5);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#FF8C00';
            ctx.font = `bold 16px "Inter", sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(playerStats.playerLevel, levelBoxX + levelBoxWidth / 2, levelBoxY + levelBoxHeight / 2 + 2);

            // Player Name and Evolution State
            ctx.font = `bold 14px "Inter", sans-serif`;
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';

            let firstLineYOffset = 0;
            if (textLines.length > 1) {
                firstLineYOffset = -8;
            }

            textLines.forEach((line, index) => {
                ctx.fillStyle = '#FFD700';
                ctx.fillText(line, levelBoxX + levelBoxWidth + 8, levelBoxY + levelBoxHeight / 2 + 2 + (index * lineHeight) + firstLineYOffset);
            });

            currentDrawingY += Math.max(textLines.length * lineHeight, levelBoxHeight) + 5; // Use calculated height and advance Y


            currentDrawingY += PLAYER_INFO_PANEL_PADDING / 2;

            const barWidth = (panelWidth - (2 * PLAYER_INFO_PANEL_PADDING)) * 0.85;

            // Health Bar
            drawPanelBar(panelX + PLAYER_INFO_PANEL_PADDING, currentDrawingY, barWidth, PLAYER_INFO_BAR_HEIGHT, playerStats.currentHp, playerStats.maxHp, 'hp', 'Health');
            currentDrawingY += PLAYER_INFO_BAR_HEIGHT + PLAYER_INFO_BAR_SPACING + 10;

            // Hunger Bar
            drawPanelBar(panelX + PLAYER_INFO_PANEL_PADDING, currentDrawingY, barWidth, PLAYER_INFO_BAR_HEIGHT, playerStats.currentHunger, playerStats.maxHunger, 'hunger', 'Hunger');
            currentDrawingY += PLAYER_INFO_BAR_HEIGHT + PLAYER_INFO_BAR_SPACING + 10;

            // XP Bar
            drawPanelBar(panelX + PLAYER_INFO_PANEL_PADDING, currentDrawingY, barWidth, PLAYER_INFO_BAR_HEIGHT, playerStats.currentXp, playerStats.xpToNextLevel, 'xp', 'XP');
            currentDrawingY += PLAYER_INFO_BAR_HEIGHT + PLAYER_INFO_BAR_SPACING + 2; // Minimal spacing

            // --- Draw first separator line ---
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(panelX + PLAYER_INFO_PANEL_PADDING / 2, currentDrawingY);
            ctx.lineTo(panelX + panelWidth - PLAYER_INFO_PANEL_PADDING / 2, currentDrawingY);
            ctx.stroke();
            currentDrawingY += 3; // Space after line


            ctx.font = `13px "Inter", sans-serif`;
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';

            // Helper to get stat name from generic key for genetic origin bonus check
            const statKeyMap = {
                'Attack': 'attack',
                'Defense': 'defense',
                'Stamina': 'stamina',
                'Stealth': 'stealth',
                'Speed': 'speed',
                'HP': 'maxHp',
                'XP': 'currentXp'
            };

            function drawStatLine(label, value, isPercentage = false) {
                ctx.fillStyle = 'white'; // Always white for core stats
                ctx.fillText(`${label}: ${value.toFixed(1)}${isPercentage ? '%' : ''}`, panelX + PLAYER_INFO_PANEL_PADDING, currentDrawingY);
                currentDrawingY += PLAYER_INFO_STAT_LINE_HEIGHT;
            }

            drawStatLine('Attack', playerStats.attack);
            drawStatLine('Defense', playerStats.defense, false);
            drawStatLine('Stamina', playerStats.stamina, true);
            drawStatLine('Stealth', playerStats.stealth, true);
            drawStatLine('Speed', playerStats.speed, true);

            // --- Draw second separator line ---
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(panelX + PLAYER_INFO_PANEL_PADDING / 2, currentDrawingY);
            ctx.lineTo(panelX + panelWidth - PLAYER_INFO_PANEL_PADDING / 2, currentDrawingY);
            ctx.stroke();
            currentDrawingY += 3; // Space after line

            // --- NEW GENETIC BONUSES SECTION (Inline with core stats) ---
            if (playerGeneticOrigin && Object.keys(playerGeneticOrigin.bonusStats).length > 0) {
                // No "Genetic Bonuses:" title anymore
                const bonusDisplayMap = {
                    attack: 'Attack',
                    defense: 'Defense',
                    stamina: 'Stamina',
                    stealth: 'Stealth',
                    speed: 'Speed',
                    maxHp: 'Health', // Changed from HP to Health for display consistency
                    currentXp: 'XP' // Changed from XP Gains to XP
                };

                for (const statKey in playerGeneticOrigin.bonusStats) {
                    const bonusValue = playerGeneticOrigin.bonusStats[statKey];
                    const displayName = bonusDisplayMap[statKey] || statKey;
                    const percentage = (Math.abs(bonusValue) * 100).toFixed(0);
                    const arrow = bonusValue >= 0 ? '🔼' : '🔽';
                    const sign = bonusValue >= 0 ? '+' : ''; // Only show + for positive, - handled by value itself
                    const color = '#b39ddb'; // Light purple for the entire bonus line

                    ctx.fillStyle = color;
                    ctx.font = `13px "Inter", sans-serif`;
                    ctx.fillText(`${arrow} ${displayName} ${sign}${percentage}%`, panelX + PLAYER_INFO_PANEL_PADDING, currentDrawingY);
                    currentDrawingY += PLAYER_INFO_STAT_LINE_HEIGHT;
                }
            }
        }

        function updatePlayerLevel() {
            // Determine the next XP threshold based on the current player level
            let currentLevelThreshold = XP_THRESHOLDS[playerStats.playerLevel - 1]; // XP needed to *reach* current level
            let nextLevelThreshold = Infinity;

            if (playerStats.playerLevel < MAX_PLAYER_LEVEL) {
                nextLevelThreshold = XP_THRESHOLDS[playerStats.playerLevel];
            } else {
                nextLevelThreshold = Infinity; // Max level reached
            }

            playerStats.xpToNextLevel = nextLevelThreshold;

            // Adjust level if XP goes beyond or below thresholds
            while (playerStats.currentXp >= playerStats.xpToNextLevel && playerStats.playerLevel < MAX_PLAYER_LEVEL) {
                    playerStats.playerLevel++;
                    updatePlayerStatsForLevel();
                    updatePlayerSize();
                    playerStats.playerEvolutionState = LEVEL_DESCRIPTIONS[playerStats.playerLevel - 1];
                    playerStats.xpToNextLevel = XP_THRESHOLDS[playerStats.playerLevel];
                }

            while (playerStats.playerLevel > 1 && playerStats.currentXp < XP_THRESHOLDS[playerStats.playerLevel - 1]) {
                playerStats.playerLevel--;
                playerStats.playerEvolutionState = LEVEL_DESCRIPTIONS[playerStats.playerLevel - 1];
                playerStats.xpToNextLevel = XP_THRESHOLDS[playerStats.playerLevel]; // Update XP to next level for new lower level
            }

            // Ensure xpToNextLevel is updated even if level doesn't change,
            // e.g., if XP is modified in admin panel but within current level's bounds.
            if (playerStats.playerLevel < MAX_PLAYER_LEVEL) {
                 playerStats.xpToNextLevel = XP_THRESHOLDS[playerStats.playerLevel];
            } else {
                 playerStats.xpToNextLevel = Infinity;
            }
        }


        function drawDashLines(x, y, travelAngle, size, intensity) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(travelAngle + Math.PI);

            for (let i = 0; i < 5; i++) {
                const lineLength = size * (0.1 + Math.random() * 0.3) * intensity * 2;
                const offset = size * (0.5 + i * 0.1);
                const alpha = 0.8 * (1 - i / 5) * intensity;

                ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.lineWidth = Math.max(1, 2 * intensity);
                ctx.beginPath();
                ctx.moveTo(offset, 0);
                ctx.lineTo(offset + lineLength, 0);
                ctx.stroke();
            }
            ctx.restore();
        }

        function drawStatusBarMessage() {
            // Prioritize swapMessage if it's active
            let messageToDisplay = null;
            let borderColor = null;

            if (swapMessage) {
                messageToDisplay = swapMessage;
                borderColor = '#FFD700'; // Gold border for swap mode/messages
            } else if (targetedNpc) {
                messageToDisplay = targetedNpc.name;
            
                // Check if the targeted NPC is an elite with a genetic origin
                if (targetedNpc.geneticOrigin) {
                    borderColor = '#FF0000'; // Use vibrant red for elite targets
                } else {
                    borderColor = '#FF8C00'; // Use standard orange for normal targets
                }
            }

            if (!messageToDisplay || gameState !== 'inGame') return; // Only draw if message exists and game is active

            const bubbleWidth = messageToDisplay.length * 9 + 50; // Dynamic width based on text length
            const bubbleHeight = 40; // Fixed height for messages
            const bubbleX = (canvas.width / 2) - (bubbleWidth / 2);
            const bubbleY = 10; // Top center

            // Draw bubble background
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.strokeStyle = borderColor;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(bubbleX, bubbleY, bubbleWidth, bubbleHeight, 5);
            ctx.fill();
            ctx.stroke();

            // Draw message text
            ctx.fillStyle = 'white';
            ctx.font = 'bold 16px "Inter", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(messageToDisplay, bubbleX + bubbleWidth / 2, bubbleY + bubbleHeight / 2);
        }
        function drawTargetedNpcIndicator() {
            // 1. Exit if there is no target, if we are in map mode, or if the game is over.
            if (!targetedNpc || isMapModeActive || gameOver) {
                return;
            }

            // 2. Calculate the NPC's position on the canvas, accounting for camera and zoom.
            const canvasX = (targetedNpc.x - cameraX) * zoomScale;
            const canvasY = (targetedNpc.y - cameraY) * zoomScale;
            
            // 3. Define the circle's radius (slightly larger than the NPC's radius).
            const indicatorRadius = targetedNpc.radius * 1.5;

            // 4. Save the current drawing context to not affect other elements.
            ctx.save();
            
            // 5. Draw the red circle.
            ctx.strokeStyle = 'red'; // Set the circle color to red.
            ctx.lineWidth = 2;       // Set the line thickness.
            ctx.beginPath();
            ctx.arc(canvasX, canvasY, indicatorRadius * zoomScale, 0, Math.PI * 2);
            ctx.stroke();
            
            // 6. Restore the context to its original state.
            ctx.restore();
        }

        function draw() {
            const currentTime = performance.now(); // Get current time once per draw call

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Background fill for the entire canvas area
            ctx.fillStyle = '#333';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.setTransform(1, 0, 0, 1, 0, 0); // Reset for UI elements

            // Only draw game elements if inGame or pausedMap or gameOver
            if (gameState === 'inGame' || gameState === 'pausedMap' || gameState === 'gameOver') {
                ctx.save();
                ctx.translate(-cameraX * zoomScale, -cameraY * zoomScale);
                ctx.scale(zoomScale, zoomScale);

                renderForestBackground();

                // Draw player
                ctx.save();
                let playerDrawX = playerX;
                let playerDrawY = playerY;

                if (playerIsAttacking) {
                    const animProgress = (currentTime - playerAttackAnimStartTime) / ATTACK_ANIM_DURATION;
                    let lurchOffset = 0;
                    if (animProgress < 0.5) {
                        lurchOffset = lerp(0, ATTACK_LURCH_DISTANCE, animProgress * 2);
                    } else {
                        lurchOffset = lerp(ATTACK_LURCH_DISTANCE, 0, (animProgress - 0.5) * 2);
                    }
                    playerDrawX += Math.cos(playerDirectionAngle) * lurchOffset;
                    playerDrawY += Math.sin(playerDirectionAngle) * lurchOffset;
                }

                ctx.translate(playerDrawX, playerDrawY);
                ctx.scale(playerVisualScale, playerVisualScale);
                ctx.globalAlpha = isBurrowing ? (playerAbilities.burrow >= 2 ? BURROW_LV2_ALPHA : 0.4) : (isInFoliage ? 0.5 : 1);
                ctx.rotate(playerDirectionAngle - Math.PI / 2 + (playerGeneticOrigin ? playerGeneticOrigin.rotation : 0));

                const emojiFontSize = playerSize * 1.5;
                ctx.font = `${emojiFontSize}px serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = 'white';
                const emojiVisualOffsetY = playerSize * 0.2;
                ctx.fillText(playerGeneticOrigin ? playerGeneticOrigin.emoji : '🦂', 0, emojiVisualOffsetY);

                // Draw player hitcircle (wireframe)
                if (showHitCircles) {
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = Math.max(1, 1 / zoomScale); // Adjust line width for zoom
                    ctx.beginPath();
                    ctx.arc(0, 0, playerRadius * playerVisualScale, 0, Math.PI * 2);
                    ctx.stroke();
                }

                if (isPerformingMovementAbility && lastActivatedAbilityRef === 'dash') {
                    const elapsedTime = currentTime - movementAbilityStartTime;
                    const progress = Math.min(1, elapsedTime / currentMovementAbilityDuration);
                    const intensity = Math.sin(progress * Math.PI);
                    ctx.restore(); // Restore to apply dash lines relative to player's actual position
                    drawDashLines(playerX, playerY, playerDirectionAngle, playerSize, intensity);
                    // Save and translate again for player icon drawing
                    ctx.save();
                    ctx.translate(playerDrawX, playerDrawY); // Use playerDrawX/Y for consistency
                    ctx.scale(playerVisualScale, playerVisualScale);
                    ctx.globalAlpha = isBurrowing ? (playerAbilities.burrow >= 2 ? BURROW_LV2_ALPHA : 0.4) : (isInFoliage ? 0.5 : 1);
                    ctx.rotate(playerDirectionAngle - Math.PI / 2 + (playerGeneticOrigin ? playerGeneticOrigin.rotation : 0));
                }
                ctx.restore();

                // Draw the single red X target indicator
                if (showTargetIndicator && !isMapModeActive) { // Only show target in normal play, not map mode
                    ctx.globalAlpha = 1;
                    const indicatorSize = 10;
                    ctx.strokeStyle = 'red';
                    ctx.lineWidth = Math.max(1, 3 / zoomScale);
                    ctx.beginPath();
                    ctx.moveTo(targetX - indicatorSize / 2, targetY - indicatorSize / 2);
                    ctx.lineTo(targetX + indicatorSize / 2, targetY + indicatorSize / 2);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(targetX + indicatorSize / 2, targetY - indicatorSize / 2);
                    ctx.lineTo(targetX - indicatorSize / 2, targetY + indicatorSize / 2);
                    ctx.stroke();
                }

                // Removed the separate showPounceLandingIndicator drawing block.

                // Foliage overlay layer — drawn above the player, below NPCs.
                // Creates the "hiding under canopy" effect: player is sandwiched under the foliage.
                ctx.globalAlpha = 1;
                foliagePatches.forEach(p => {
                    ctx.fillStyle = 'rgba(42, 105, 50, 0.52)';
                    ctx.fillRect(p.x, p.y, p.w, p.h);
                });

                // Draw NPCs and their hitcircles
                npcs.forEach(npc => {
                    ctx.save();
                    let npcDrawX = npc.x;
                    let npcDrawY = npc.y;

                    if (npc.isAttacking) {
                        const animProgress = (currentTime - npc.attackAnimStartTime) / ATTACK_ANIM_DURATION;
                        let lurchOffset = 0;
                        if (animProgress < 0.5) {
                            lurchOffset = lerp(0, ATTACK_LURCH_DISTANCE, animProgress * 2);
                        } else {
                            lurchOffset = lerp(ATTACK_LURCH_DISTANCE, 0, (animProgress - 0.5) * 2);
                        }
                        npcDrawX += Math.cos(npc.directionAngle) * lurchOffset;
                        npcDrawY += Math.sin(npc.directionAngle) * lurchOffset;
                    }

                    ctx.translate(npcDrawX, npcDrawY);
                    ctx.rotate(npc.directionAngle + npc.rotation);

                    const npcEmojiFontSize = npc.size * 1.5;
                    ctx.font = `${npcEmojiFontSize}px serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = 'white';
                    const npcEmojiVisualOffsetY = npc.size * 0.2;
                    ctx.fillText(npc.emoji, 0, npcEmojiVisualOffsetY);

                    // Draw NPC hitcircle (wireframe)
                    if (showHitCircles) {
                        ctx.strokeStyle = 'white';
                        ctx.lineWidth = Math.max(1, 1 / zoomScale); // Adjust line width for zoom
                        ctx.beginPath();
                        ctx.arc(0, 0, npc.radius, 0, Math.PI * 2);
                        ctx.stroke();
                    }

                    ctx.restore();
                });

                // Draw Spike Launch projectiles
                // sz = playerSize / 4 = 4 world units (static, ~1/4 of player character)
                const sz = playerSize / 4;
                spikeLaunchProjectiles.forEach(spike => {
                    ctx.save();
                    ctx.globalAlpha = 1;
                    ctx.translate(spike.x, spike.y); // world coords — existing transform handles camera/zoom
                    ctx.rotate(spike.angle);
                    ctx.fillStyle = '#FF6600';
                    ctx.strokeStyle = '#FFCC00';
                    ctx.lineWidth = 0.5;
                    // Spiky triangle pointing in travel direction, with rear notch
                    ctx.beginPath();
                    ctx.moveTo(sz * 3, 0);       // forward tip
                    ctx.lineTo(-sz * 1.5, -sz);  // rear-left
                    ctx.lineTo(-sz * 0.5, 0);    // rear notch
                    ctx.lineTo(-sz * 1.5, sz);   // rear-right
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                    ctx.restore();
                });

                deadNpcs.forEach(deadNpc => {
                    ctx.font = '24px serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('🦴', deadNpc.x, deadNpc.y);

                    // Draw loot interaction radius if showHitCircles is true
                    if (showHitCircles) {
                        ctx.strokeStyle = 'lime';
                        ctx.lineWidth = Math.max(1, 1 / zoomScale); // Adjust line width for zoom
                        ctx.beginPath();
                        ctx.arc(deadNpc.x, deadNpc.y, LOOT_INTERACTION_RADIUS, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                });


                ctx.restore(); // Restore context after world transformations
                
                drawTargetedNpcIndicator();

                // UI elements (not scaled by zoomScale)
                if (!isMapModeActive && !gameOver) { // Hide UI if in map mode or game over
                    drawPlayerInfoPanel();
                    drawHotbar();
                }

            // Radial indicator only in normal play, not map mode and not game over
            if (!isMapModeActive && !gameOver) {
                const playerCanvasX = (playerX - cameraX) * zoomScale;
                const playerCanvasY = (playerY - cameraY) * zoomScale;

                const ringRadius = STATIC_RADIAL_INDICATOR_RADIUS;
                const maxIndicatorDistance = 2 * canvas.width;
                const effectiveMinIndicatorDistance = ringRadius + 50;

                // arcScale: 1.0 = normal blur, 0.5 = Tremor Sense (half arc = more precise)
                const drawNpcIndicatorArc = (npcAngle, npcDistance, arcScale) => {
                    if (npcDistance <= ringRadius) return;

                    const minLineThickness = 1.5;
                    const maxLineThickness = 6;
                    const minArcDegrees = 15;
                    const maxArcDegrees = 45;

                    const t = lerp(0, 1, (npcDistance - effectiveMinIndicatorDistance) / (maxIndicatorDistance - effectiveMinIndicatorDistance));
                    const indicatorLineWidth = lerp(maxLineThickness, minLineThickness, t);
                    const currentArcDegrees = lerp(minArcDegrees, maxArcDegrees, t) * arcScale;
                    const currentArcRadians = currentArcDegrees * Math.PI / 180;
                    const halfArcRadians = currentArcRadians / 2;

                    const numSegments = 30;
                    const segmentArcLength = currentArcRadians / numSegments;

                    for (let i = 0; i < numSegments; i++) {
                        const segStartAngle = npcAngle - halfArcRadians + i * segmentArcLength;
                        const segEndAngle = segStartAngle + segmentArcLength;
                        const midSegmentAngle = (segStartAngle + segEndAngle) / 2;

                        const normalizedPosition = Math.abs(midSegmentAngle - npcAngle) / halfArcRadians;
                        const alpha = Math.max(0, Math.cos(normalizedPosition * Math.PI / 2));

                        ctx.strokeStyle = `rgba(255, 0, 0, ${alpha})`;
                        ctx.lineWidth = indicatorLineWidth;
                        ctx.beginPath();
                        ctx.arc(playerCanvasX, playerCanvasY, ringRadius, segStartAngle, segEndAngle);
                        ctx.stroke();
                    }
                };

                if (isTremorSenseActive) {
                    // Draw the full indicator ring in yellowish-grey while Tremor Sense is active
                    ctx.globalAlpha = 1;
                    ctx.strokeStyle = 'rgba(210, 195, 110, 0.5)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(playerCanvasX, playerCanvasY, ringRadius, 0, Math.PI * 2);
                    ctx.stroke();
                }

                if (isTremorSenseActive && tremorSenseNpcData.length > 0) {
                    // Tremor Sense: one precise indicator per NPC within range
                    tremorSenseNpcData.forEach(({ angle, distance }) => {
                        drawNpcIndicatorArc(angle, distance, 0.5);
                    });
                } else if (closestNpcDistance !== Infinity) {
                    // Normal: single indicator for the closest NPC at full blur
                    drawNpcIndicatorArc(closestNpcAngle, closestNpcDistance, 1.0);
                }
            }
                if (gameOver) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    const cx = canvas.width / 2;
                    const cy = canvas.height / 2;

                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';

                    // Title
                    ctx.fillStyle = '#FF4444';
                    ctx.font = `bold 48px "Inter", sans-serif`;
                    ctx.fillText("GAME OVER", cx, cy - 90);

                    // Stats (survivedTimeMs is frozen at moment of death)
                    const survivedSec = Math.floor(survivedTimeMs / 1000);
                    const minutes = Math.floor(survivedSec / 60);
                    const seconds = survivedSec % 60;
                    const timeStr = `${minutes}m ${seconds.toString().padStart(2, '0')}s`;

                    ctx.fillStyle = '#cccccc';
                    ctx.font = `18px "Inter", sans-serif`;
                    ctx.fillText(`Level Reached: ${playerStats.playerLevel}`, cx, cy - 30);
                    ctx.fillText(`Kills: ${npcKillCount}`, cx, cy - 5);
                    ctx.fillText(`Survived: ${timeStr}`, cx, cy + 20);

                    const tryAgainButton = {
                        x: cx - 75,
                        y: cy + 55,
                        width: 150,
                        height: 50,
                        label: "Try Again",
                        action: "restartGame"
                    };
                    ctx.fillStyle = buttonColor;
                    ctx.fillRect(tryAgainButton.x, tryAgainButton.y, tryAgainButton.width, tryAgainButton.height);
                    ctx.strokeStyle = buttonBorderColor;
                    ctx.strokeRect(tryAgainButton.x, tryAgainButton.y, tryAgainButton.width, tryAgainButton.height);
                    ctx.fillStyle = buttonTextColor;
                    ctx.font = `bold 20px "Inter", sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(tryAgainButton.label, tryAgainButton.x + tryAgainButton.width / 2, tryAgainButton.y + tryAgainButton.height / 2);
                }

                // Floating damage texts are always drawn if they exist, regardless of map mode
                floatingDamageTexts = floatingDamageTexts.filter(text => (currentTime - text.timestamp) < text.duration);

                floatingDamageTexts.forEach(text => {
                    const elapsedTime = currentTime - text.timestamp;
                    const floatProgress = Math.min(1, elapsedTime / text.floatDuration);
                    const yFloat = -30 * floatProgress; // Float up by 30 pixels

                    const canvasX = (text.x - cameraX) * zoomScale;
                    const canvasY = (text.y - cameraY + yFloat) * zoomScale; // Apply float to Y

                    ctx.globalAlpha = 1 - floatProgress; // Fade out

                    ctx.fillStyle = text.color;
                    ctx.font = `bold 20px "Inter", sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(text.value, canvasX, canvasY);
                    ctx.globalAlpha = 1; // Reset alpha for other drawings
                });
            }
            drawStatusBarMessage(); // Draw status messages (like swap message or targeted NPC)
        }

        function gameLoop() {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }

            // Only update game logic if not paused by specific panels or game over
            const shouldRunGameLogic = adminPanel.style.display !== 'flex' && originSelectionPopup.style.display !== 'flex' && gameState !== 'gameOver';

            if (shouldRunGameLogic) {
                update();
            }

            draw();
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            playerX = worldWidth / 2;
            playerY = worldHeight / 2;
            targetX = playerX;
            targetY = playerY;
            isMoving = false;
            showTargetIndicator = false;
            isMapModeActive = false; // Reset map mode
            playerDirectionAngle = 0;

            // Reset player bonuses to zero for a new game
            playerStatBonuses = { maxHp: 0, attack: 0, defense: 0, stamina: 0, stealth: 0, speed: 0 };
            
            // Reset non-stat values
            playerStats.currentHunger = 1;
            playerStats.currentXp = 0;
            playerStats.playerLevel = 1;
            playerStats.xpToNextLevel = XP_THRESHOLDS[1]; // Set XP for level 2
            playerStats.playerEvolutionState = LEVEL_DESCRIPTIONS[0];
            
            // Set the initial Level 1 stats
            updatePlayerStatsForLevel();
            // Fully heal the player at the start of the game
            playerStats.currentHp = playerStats.maxHp;
            lastHungerIncreaseTime = performance.now(); // Reset hunger timer

            // Reset player attack and animation state
            playerLastAttackTime = 0;
            playerAttackCooldown = 500;
            playerIsAttacking = false;
            playerAttackAnimStartTime = 0;


            playerAbilities = {
                pounce: 0,
                dash: 0,
                burrow: 0,
                tremorSense: 0,
                spikeLaunch: 0,
            };

            hotbarSlots.forEach(slot => {
                if (slot.keybind === 'F' || slot.keybind === 'R') {
                    slot.abilityRef = null;
                    slot.abilityName = 'Empty';
                    slot.icon = '';
                } else {
                    slot.abilityRef = null;
                    slot.abilityName = '';
                    slot.icon = '';
                }
            });

            cooldowns.pounce.lastUsed = 0; // Updated from jump
            cooldowns.dash.lastUsed = 0;
            cooldowns.burrow.lastUsed = 0;
            cooldowns.spikeLaunch.lastUsed = 0;
            lastNoiseBurstTime = 0;
            currentStealthFactor = 0;
            isInFoliage = false;

            inCombat = false;
            combatTarget = null;

            npcs = []; // Clear current NPCs
            deadNpcs = [];

            floatingDamageTexts = [];
            targetedNpc = null; // Clear targeted NPC on reset
            swapMode = false; // Reset swap mode

        function updatePlayerStatsForLevel() {
            const level = playerStats.playerLevel;
            const baseStats = PLAYER_LEVEL_STATS[level];
        
            // If for some reason we don't have stats for this level, do nothing.
            if (!baseStats) return;
        
            // This is the NEW, CORRECTED code
            const oldMaxHp = playerStats.maxHp;
            
            // Calculate the combined base + bonus stats first
            let combinedMaxHp = baseStats.maxHp + playerStatBonuses.maxHp;
            let combinedAttack = baseStats.attack + playerStatBonuses.attack;
            let combinedDefense = baseStats.defense + playerStatBonuses.defense;
            let combinedStamina = baseStats.stamina + playerStatBonuses.stamina;
            let combinedStealth = baseStats.stealth + playerStatBonuses.stealth;
            let combinedSpeed = baseStats.speed + playerStatBonuses.speed;
            
            // Now, apply the genetic origin bonus if it exists
            if (playerGeneticOrigin && playerGeneticOrigin.bonusStats) {
                if (playerGeneticOrigin.bonusStats.maxHp) combinedMaxHp *= (1 + playerGeneticOrigin.bonusStats.maxHp);
                if (playerGeneticOrigin.bonusStats.attack) combinedAttack *= (1 + playerGeneticOrigin.bonusStats.attack);
                if (playerGeneticOrigin.bonusStats.defense) combinedDefense *= (1 + playerGeneticOrigin.bonusStats.defense);
                if (playerGeneticOrigin.bonusStats.stamina) combinedStamina *= (1 + playerGeneticOrigin.bonusStats.stamina);
                if (playerGeneticOrigin.bonusStats.stealth) combinedStealth *= (1 + playerGeneticOrigin.bonusStats.stealth);
                if (playerGeneticOrigin.bonusStats.speed) combinedSpeed *= (1 + playerGeneticOrigin.bonusStats.speed);
            }
            
            const hpGained = combinedMaxHp - oldMaxHp;
            
            // Update playerStats with the final calculated values
            playerStats.maxHp = combinedMaxHp;
            playerStats.attack = combinedAttack;
            playerStats.defense = combinedDefense;
            playerStats.stamina = combinedStamina;
            playerStats.stealth = combinedStealth;
            playerStats.speed = combinedSpeed;
        
            // When max HP increases, heal the player by the amount gained
            if (hpGained > 0) {
                playerStats.currentHp += hpGained;
            }
            // Ensure current HP doesn't exceed the new max HP
            playerStats.currentHp = Math.min(playerStats.currentHp, playerStats.maxHp);
        }
        
        function updatePlayerSize() {
            // Calculate the new size with a 30% compounding increase per level
            // Math.pow(1.3, playerStats.playerLevel - 1) handles the compounding
            playerSize = BASE_PLAYER_SIZE * Math.pow(1.3, playerStats.playerLevel - 1);
        
            // Recalculate padding and hitbox radius based on the new size
            playerCollisionPadding = playerSize * 0.5;
            playerRadius = playerSize / 2 + playerCollisionPadding;
        }

        // Updated updateHotbarSlot function
        function updateHotbarSlot(newSlotIndex, newAbility, level = 1) {
            const newAbilityKey = newAbility.key;

            // Find the current hotbar slot where newAbility is ALREADY assigned (if any).
            let oldSlotIndex = -1;
            for (let i = 0; i < hotbarSlots.length; i++) {
                if (hotbarSlots[i].abilityRef === newAbilityKey) {
                    oldSlotIndex = i;
                    break;
                }
            }

            // If the new ability is found in an existing slot, and it's not the target slot
            if (oldSlotIndex !== -1 && oldSlotIndex !== newSlotIndex) {
                // Swap abilities: move the ability from the newSlotIndex to the oldSlotIndex
                const abilityInNewSlot = hotbarSlots[newSlotIndex].abilityRef;
                const nameInNewSlot = hotbarSlots[newSlotIndex].abilityName;
                const iconInNewSlot = hotbarSlots[newSlotIndex].icon;

                hotbarSlots[oldSlotIndex].abilityRef = abilityInNewSlot;
                hotbarSlots[oldSlotIndex].abilityName = nameInNewSlot || 'Empty';
                hotbarSlots[oldSlotIndex].icon = iconInNewSlot || '';

                // Displaced ability retains its current level — do not reset it.
            } else {
                // If the new ability was NOT found in an existing slot,
                // or it was already in the newSlotIndex (meaning no move/swap needed for it),
                // then if there's an ability currently in the newSlotIndex, it's about to be replaced.
                // This means its playerAbility level should be set to 0 (unlearned/unbound).
                const abilityToReplaceKey = hotbarSlots[newSlotIndex].abilityRef;
                if (abilityToReplaceKey && abilityToReplaceKey !== newAbilityKey) {
                    playerAbilities[abilityToReplaceKey] = 0; // Unlearn the replaced ability
                }
            }

            // Assign the new ability to the newSlotIndex at the given level
            hotbarSlots[newSlotIndex].abilityRef = newAbilityKey;
            hotbarSlots[newSlotIndex].abilityName = newAbility.name;
            hotbarSlots[newSlotIndex].icon = newAbility.hotbarIcon;
            playerAbilities[newAbilityKey] = level;

            // Sync cooldown duration and ability-specific max durations for Lv2
            if (cooldowns[newAbilityKey]) {
                cooldowns[newAbilityKey].duration = level >= 2
                    ? (newAbilityKey === 'pounce'       ? POUNCE_LV2_COOLDOWN
                     : newAbilityKey === 'dash'         ? DASH_LV2_COOLDOWN
                     : newAbilityKey === 'tremorSense'  ? TREMOR_SENSE_LV2_COOLDOWN
                     : newAbilityKey === 'spikeLaunch'  ? SPIKE_LAUNCH_COOLDOWN
                     : BURROW_LV2_COOLDOWN)
                    : (newAbilityKey === 'tremorSense'  ? TREMOR_SENSE_LV1_COOLDOWN
                     : newAbilityKey === 'spikeLaunch'  ? SPIKE_LAUNCH_COOLDOWN
                     : 5000);
            }
            if (newAbilityKey === 'burrow') {
                burrowMaxDuration = level >= 2 ? BURROW_LV2_MAX_DURATION : 5000;
            }
        }


        function presentActiveAbilityChoice(passiveRewardAbility) {
            // Tremor Sense: 70% chance to replace Burrow when loot is from a level 2+ NPC
            if (passiveRewardAbility && passiveRewardAbility.key === 'burrow' &&
                clickedDeadNpc && clickedDeadNpc.level >= 2 && Math.random() < 0.70) {
                passiveRewardAbility = abilityDetailsMap['tremorSense'];
            }

            // Spike Launch: 70% chance to replace Dash when loot is from a level 2+ NPC
            if (passiveRewardAbility && passiveRewardAbility.key === 'dash' &&
                clickedDeadNpc && clickedDeadNpc.level >= 2 && Math.random() < 0.70) {
                passiveRewardAbility = abilityDetailsMap['spikeLaunch'];
            }

            // Secondary abilities (Tremor Sense / Spike Launch) slot into E (2) and Q (3); primaries use F (0) and R (1)
            const isSecondaryOffer = passiveRewardAbility &&
                (passiveRewardAbility.key === 'tremorSense' || passiveRewardAbility.key === 'spikeLaunch');
            const slotLeftIndex  = isSecondaryOffer ? 2 : 0;
            const slotRightIndex = isSecondaryOffer ? 3 : 1;
            const slotLeftKey    = hotbarSlots[slotLeftIndex].keybind;
            const slotRightKey   = hotbarSlots[slotRightIndex].keybind;

            const activeChoiceSection = document.createElement('div');

            if (!passiveRewardAbility) {

                return;

            // Offer Lv2 upgrade if player already owns Lv1 and is at least player level 2
            const currentOwned = playerAbilities[passiveRewardAbility.key] || 0;
            const abilityLevel = (currentOwned >= 1 && playerStats.playerLevel >= 2) ? 2 : 1;
            const isUpgrade = abilityLevel === 2;

                : `<span style='color:${colorOrange};'>${passiveRewardAbility.name} (Lv. 1)</span>`;

            // Create the left button (Assign to slotLeftKey: F or E)
            const optionFElement = createAbilityOptionElement(templateAbilityOption);
            optionFElement.id = `activeAbilityOption-${slotLeftKey}`;

            if (isAlreadySelected) {

                    updateHotbarSlot(slotLeftIndex, passiveRewardAbility, abilityLevel);
                    activeChoiceMade = true;
                    disableButtonRow(activeRow, optionFElement.id);
                    checkAndClosePopup();
                };

            activeRow.appendChild(optionFElement);

            // Always append the decline button in the middle
            const declineActiveButton = createAbilityOptionElement(templateDeclineButton);
            declineActiveButton.id = 'declineActiveButton';
            declineActiveButton.onclick = () => {
                if (activeChoiceMade) return;
                activeChoiceMade = true;
                disableButtonRow(activeRow, declineActiveButton.id);
                checkAndClosePopup();
            };
            activeRow.appendChild(declineActiveButton);

            // Create the right button (Assign to slotRightKey: R or Q)
            const optionRElement = createAbilityOptionElement(templateAbilityOption);
            optionRElement.id = `activeAbilityOption-${slotRightKey}`;
            optionRElement.querySelector('.ability-name').innerHTML = abilityNameHtml;
            optionRElement.querySelector('.stat-details').innerHTML = `
                <p class="stat-line" style='color:white;'>Assign to: <span style='color:${colorOrange}; font-size:1.2em; font-weight:bold;'>${slotRightKey}</span></p>
            `;
            if (isAlreadySelected) {
                optionRElement.classList.add('ability-option-already-selected');
            } else {
                optionRElement.onclick = () => {
                    if (activeChoiceMade) return;
                    updateHotbarSlot(slotRightIndex, passiveRewardAbility, abilityLevel);
                    activeChoiceMade = true;
                    disableButtonRow(activeRow, optionRElement.id);
                    checkAndClosePopup();

        function populateAdminPanel() {
            adminStatsContainer.innerHTML = '';

            const allStatsAndAbilities = { ...playerStats, ...playerAbilities };

            for (const key in allStatsAndAbilities) {
                if (key === 'playerEvolutionState' || key === 'xpToNextLevel') continue; // Skip derived state

                const div = document.createElement('div');
                div.className = playerAbilities.hasOwnProperty(key) ? 'admin-ability-item' : 'admin-stat-item';

                const labelText = key.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase());

                div.innerHTML = `<label>${labelText}:</label>`; // Add label first

                // Handle playerLevel specifically with buttons
                if (key === 'playerLevel') {
                    const levelButtonsContainer = document.createElement('div');
                    levelButtonsContainer.className = 'admin-level-buttons';
                    for (let i = 1; i <= MAX_PLAYER_LEVEL; i++) {
                        const levelButton = document.createElement('button');
                        levelButton.className = 'admin-level-button';
                        levelButton.textContent = i;
                        if (i === playerStats.playerLevel) {
                            levelButton.classList.add('selected');
                        }
                        levelButton.onclick = () => {
                            updateInputAndValue('playerLevel', i);
                        };
                        levelButtonsContainer.appendChild(levelButton);
                    }
                    div.appendChild(levelButtonsContainer);
                } else {
                    const isNumeric = typeof allStatsAndAbilities[key] === 'number';
                    const inputType = isNumeric ? 'number' : 'text';

                    // Create the input row container for other stats/abilities
                    const inputRow = document.createElement('div');
                    inputRow.className = 'admin-input-row';

                    // Create the input
                    const input = document.createElement('input');
                    input.type = inputType;
                    input.id = `admin-${key}`;
                    input.value = allStatsAndAbilities[key];
                    inputRow.appendChild(input);

                    // Create the decrement button
                    const decrementButton = document.createElement('button');
                    decrementButton.className = 'admin-panel-button';
                    decrementButton.textContent = '-';
                    decrementButton.onclick = () => {
                        let currentValue = parseFloat(input.value);
                        if (isNaN(currentValue)) currentValue = 0; // Default to 0 if not a number
                        let newValue = currentValue - 1;
                        if (playerAbilities.hasOwnProperty(key) || key === 'currentXp') { // XP also cannot go below 0
                            newValue = Math.max(0, newValue); // Abilities and XP cannot go below 0
                        }
                        updateInputAndValue(key, newValue);
                    };
                    inputRow.appendChild(decrementButton);

                    // Create the increment button
                    const incrementButton = document.createElement('button'); // Changed to const
                    incrementButton.className = 'admin-panel-button';
                    incrementButton.textContent = '+';
                    incrementButton.onclick = () => {
                        let currentValue = parseFloat(input.value);
                        if (isNaN(currentValue)) currentValue = 0;
                        let newValue = currentValue + 1;
                        updateInputAndValue(key, newValue);
                    };
                    inputRow.appendChild(incrementButton);

                    // Lock Tremor Sense and Spike Launch controls until player is level 2+
                    if ((key === 'tremorSense' || key === 'spikeLaunch') && playerStats.playerLevel < 2) {
                        input.disabled = true;
                        decrementButton.disabled = true;
                        incrementButton.disabled = true;
                        inputRow.title = 'Requires player level 2';
                        const lockNote = document.createElement('span');
                        lockNote.textContent = ' (Lv.2+)';
                        lockNote.style.cssText = 'color:#888; font-size:0.8em; margin-left:4px;';
                        inputRow.appendChild(lockNote);
                    }

                    div.appendChild(inputRow); // Then add the input row
                }

                adminStatsContainer.appendChild(div);

                if (key !== 'playerLevel') { // Only add change listener for actual input fields
                    const input = div.querySelector(`#admin-${key}`);
                    if (input) {
                        input.addEventListener('change', (e) => {
                            updateInputAndValue(key, e.target.value);
                        });
                    }
                }
            }
        }

        // Helper function to update both the input field and the underlying stat/ability
        function updateInputAndValue(key, value) {
            let numValue;

            if (key === 'playerLevel' || playerAbilities.hasOwnProperty(key)) {
                numValue = parseInt(value); // Ensure integer for levels and abilities
            } else {
                numValue = parseFloat(value);
            }

            if (!isNaN(numValue)) {
                if (playerAbilities.hasOwnProperty(key)) {
                    numValue = Math.max(0, numValue); // Abilities cannot go below 0
                    const oldAbilityLevel = playerAbilities[key];
                    playerAbilities[key] = numValue; // Directly set ability level
                    // Hotbar logic is now handled more robustly by `updateHotbarSlot` in loot screen.
                    // For admin panel, we simply assign/unassign the ability.
                    if (oldAbilityLevel === 0 && numValue > 0) { // Ability was unlocked
                        const abilityDetails = abilityDetailsMap[key];

            playerStats.currentXp = 0;
            playerStats.playerLevel = 1;
            playerStats.xpToNextLevel = XP_THRESHOLDS[1]; // Set XP for level 2
            playerStats.playerEvolutionState = LEVEL_DESCRIPTIONS[0];
            
            // Set the initial Level 1 stats
            updatePlayerStatsForLevel();
            updatePlayerSize();
            // Fully heal the player at the start of the game
            playerStats.currentHp = playerStats.maxHp;
            lastHungerIncreaseTime = performance.now(); // Initialize hunger timer
            gameStartTime = performance.now(); // Track session start for game over stats
            npcKillCount = 0;


            playerAbilities = {
                pounce: 0,
                dash: 0,
                burrow: 0,
                tremorSense: 0,
                spikeLaunch: 0,
            };

            // Assign initial ability based on chosen origin
            if (playerGeneticOrigin.startingAbilityKey) {
                const initialAbility = abilityDetailsMap[playerGeneticOrigin.startingAbilityKey];
                if (initialAbility) {
                    playerAbilities[initialAbility.key] = 1; // Set level to 1
                    updateHotbarSlot(0, initialAbility); // Assign to first hotbar slot (F)
                }
            }


            hotbarSlots.forEach(slot => {
                if (slot.keybind === 'F' || slot.keybind === 'R') {
                    // Skip F for now as it's handled by initial ability.
                    // If R should also be initially empty, this is fine.
                    // If F wasn't assigned an ability, it remains 'Empty'
                    if (slot.abilityRef === null) {
                        slot.abilityName = 'Empty';
                        slot.icon = '';
                    }
                } else {
                    slot.abilityRef = null;
                    slot.abilityName = '';
                    slot.icon = '';
                }
            });

            generateForestElements();
            generateNPCs();

            if (!animationFrameId) {
                gameLoop();
            }
        }


        // Initialize the canvas size and start the game loop when the window loads.
        window.onload = function() {
            resizeCanvas();
            showStartScreen(); // Begin with the start screen
            gameLoop(); // Start the game loop which will draw based on gameState
        };
    </script>
</body>
</html>
