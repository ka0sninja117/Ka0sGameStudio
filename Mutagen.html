<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutagen</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%; /* Ensure body fills the viewport */
            font-family: 'Inter', sans-serif;
            color: #eee;
            background-color: #222; /* Consistent dark background for body */
            overflow: hidden; /* Hide scrollbars to ensure precise layout control */
        }

        .main-content {
            position: absolute; /* Position relative to body */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center; /* Center horizontally */
            align-items: center;
            box-sizing: border-box; /* Include padding in dimensions if added later */
            background-color: #222; /* Ensure main content matches body background */
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #333; /* Slightly lighter than body for contrast */
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            padding: 20px; /* Internal padding around the canvas */
            box-sizing: border-box;
            flex-shrink: 0; /* Prevent it from shrinking more than necessary due to flex */
        }

        canvas {
            background-color: #000;
            border: 2px solid #555;
            border-radius: 10px;
            display: block;
            cursor: crosshair;
            /* Canvas dimensions are set directly by JS using width/height attributes,
               so CSS width/height: 100% is not needed here as canvas's intrinsic size will be respected. */
        }

        /* --- Overlays for Start Screen, Popups, Admin Panel --- */
        .overlay {
            position: absolute; /* Absolute positioning relative to .main-content */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7); /* Consistent dimming */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000; /* Ensure it's on top of canvas but below other popups if any */
            flex-direction: column;
            gap: 20px;
            opacity: 0;
            pointer-events: none; /* Hidden by default for interactions */
            transition: opacity 0.3s ease-in-out;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto; /* Active for interactions */
        }

        .start-screen-content {
            text-align: center;
            color: #eee;
            /* Flex layout to center content vertically/horizontally within itself */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px; /* Space between title, subtitle, and button */
        }

        /* Styling for the HTML title and subtitle */
        .game-title {
            font-size: 5em; /* Large for impact */
            font-weight: bold;
            color: #FF8C00; /* Neon Orange */
            text-shadow: 0 0 15px rgba(255, 140, 0, 0.7), 0 0 25px rgba(255, 140, 0, 0.5);
            margin-bottom: 10px; /* Space between title and subtitle */
        }

        .game-subtitle {
            font-size: 1.8em; /* Slightly larger subtitle */
            margin-bottom: 30px; /* Space between subtitle and button */
        }

        .game-version {
            font-size: 0.8em;
            color: #8a7baa;
            margin-top: 4px;
        }

        .admin-version {
            display: block;
            text-align: center;
            margin-top: -6px;
            margin-bottom: 8px;
        }

        .game-subtitle span {
            font-weight: bold; /* Make all words bold */
            margin: 0 5px; /* Small space between words */
        }

        .game-subtitle .survive {
            color: #6a0dad; /* Vibrant purple (matches action-button bg) */
        }

        .game-subtitle .adapt {
            color: #00ff00; /* Neon green */
        }

        .game-subtitle .consume {
            color: #FF0000; /* Vibrant red */
        }

        .action-button {
            background-color: black; /* Changed to black */
            color: #FF8C00; /* Orange text */
            border: 2px solid white; /* Bold white border */
            border-radius: 10px;
            padding: 12px 30px;
            font-size: 1.4em; /* Larger button text */
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            position: relative; /* For the glint effect */
            overflow: hidden; /* Hide overflowing glint */
        }

        .action-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%; /* Start off-screen to the left */
            width: 50%; /* Width of the glint */
            height: 100%;
            background: linear-gradient(to right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 140, 0, 0.3) 50%, /* Orange glint color, semi-transparent */
                rgba(255, 255, 255, 0) 100%
            );
            transform: skewX(-20deg); /* Angle the glint */
            transition: none; /* No transition for the glint itself initially */
        }

        .action-button:hover {
            background-color: rgba(0, 0, 0, 0.8); /* Slight dark hover */
            transform: translateY(-3px);
            border-color: #FF8C00; /* Orange border on hover */
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.7);
        }

        .action-button:hover::before {
            left: 100%; /* Move across to the right */
            transition: left 0.8s ease-out; /* Animate the glint */
        }


        /* Generic Popup styles */
        .popup-panel {
            background-color: #1a0f2b; /* Dark purple/black theme */
            color: #eee;
            padding: 15px; /* Consistent padding for popups */
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.7);
            text-align: center;
            max-width: 600px;
            width: 90%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 2px solid #6a0dad; /* Darker purple border */
            max-height: 90vh; /* Allow content to fill, but prevent internal scrolling for this panel */
            overflow-y: hidden; /* **CHANGED: Removed scrollbar** */
            transform: scale(0.9); /* Slightly smaller than full size */
            animation: popupAppear 0.3s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: auto; /* Active for interactions */
            z-index: 1001; /* Above general overlays */
        }

        .popup-panel-title {
            font-size: 1.8em;
            font-weight: bold;
            color: #FF8C00;
            margin-top: 3px; /* Reduced from default padding top by 80% (15px * 0.2 = 3px) */
            margin-bottom: 5px; /* Reduced by 50% from 10px */
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }

        /* --- Genetic Origin Selection Specific Styles --- */
        .origin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px; /* Spacing between origin options */
            justify-content: center;
            align-items: stretch;
            width: 100%;
        }

        .origin-option {
            background-color: #2a1a45; /* Darker purple for option cards */
            border: 2px solid #4a1c87;
            border-radius: 10px;
            padding: 2px 15px 15px 15px; /* Reduced top padding further */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .origin-option:hover {
            background-color: #3e2860;
            transform: translateY(-3px);
            border-color: #6200ff;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.6);
        }

        .origin-name-with-emoji {
            display: flex;
            align-items: center;
            gap: 8px; /* Space between name and emoji */
            margin-top: 0; /* Set to 0, padding on parent handles it */
            margin-bottom: 5px; /* Keep bottom margin */
        }
        .origin-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #b39ddb; /* Lighter purple */
            margin: 0; /* Remove default H3 margins */
            padding: 0; /* Remove any default padding */
        }

        .origin-emoji {
            font-size: 1.2em; /* Slightly smaller than name, but still visible */
            line-height: 1; /* Keep emoji vertically centered with text */
        }

        /* Description text removed, so this style might not be strictly needed for content,
           but keeping it for structure in case it's repurposed */
        .origin-description {
            font-size: 0.9em;
            color: #d1c4e9;
            margin-bottom: 10px;
            flex-grow: 1; /* Allows description to take available space */
        }

        .origin-bonus {
            font-size: 0.85em;
            font-weight: bold;
            color: white; /* Base color for the text */
            margin-top: 10px;
            border-top: 1px dashed rgba(255, 255, 255, 0.2);
            padding-top: 8px;
            width: 100%;
        }
        .origin-starting-ability { /* New style for starting ability text */
            font-size: 0.85em;
            font-weight: bold;
            color: white; /* Base color for the text */
            margin-top: 5px; /* Small margin above */
            border-top: 1px dashed rgba(255, 255, 255, 0.2); /* Separator line */
            padding-top: 8px; /* Padding above the text */
            width: 100%;
        }

        /* New styles for the button and instructions container */
        .button-and-instructions-container {
            display: grid; /* Use grid for precise positioning */
            grid-template-columns: 1fr auto 1fr; /* Flexible left, auto for button, flexible right */
            align-items: center; /* Vertically align items */
            gap: 15px; /* Space between grid items */
            margin-top: 10px; /* Space above this whole row */
            width: 100%; /* Ensure it spans the full width of its parent */
            box-sizing: border-box; /* Include padding/border in total width */
        }

        .control-instructions {
            font-size: 0.85em;
            color: #aaa; /* Lighter gray for instructional text */
            text-align: center; /* Ensure text is centered within its own grid cell */
            margin: 0; /* Remove default margins for cleaner grid layout */
        }

        /* Center the button within its grid cell */
        #selectOriginButton {
            justify-self: center;
        }

        /* Styles for disabled button */
        .action-button:disabled {
            background-color: #555;
            border-color: #777;
            color: #ccc; /* Disabled text color */
            cursor: not-allowed;
            opacity: 0.6;
            transform: none;
            box-shadow: none;
        }
        .action-button:disabled::before { /* Disable glint on disabled button */
            content: none;
        }


        /* --- Other existing popup/admin styles remain the same --- */
        /* Healing/Ability Selection Popup */
        .healing-popup {
            background-color: #1a0f2b; /* Dark purple/black theme */
            color: #eee;
            padding: 8px; /* Reduced padding further */
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.7);
            text-align: center;
            max-width: 400px; /* Reduced max-width from 600px */
            width: 90%;
            transform: scale(0.9); /* Slightly smaller than full size */
            animation: popupAppear 0.3s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            gap: 10px; /* Reduced gap between main sections */
            border: 2px solid #6a0dad; /* Darker purple border */
        }

        .popup-message {
            font-size: 1.1em; /* Slightly smaller font */
            margin-bottom: 5px; /* Reduced margin */
            color: #b39ddb; /* Lighter purple for message */
        }
        .healing-amount-text {
            color: #00ff00; /* Green for healing text */
            font-weight: bold;
        }
        .defeated-creature-name {
            color: #dc3545; /* Red color for defeated creature name */
            font-weight: bold;
        }

        .popup-subtitle {
            font-size: 1.3em; /* Slightly smaller font */
            font-weight: bold;
            color: #FF8C00; /* Neon Orange */
            text-align: center;
            margin-top: 5px; /* Reduced margin */
            margin-bottom: 5px; /* Reduced margin */
        }

        .popup-content-area {
            display: flex;
            flex-direction: column;
            gap: 10px; /* Reduced space between rows */
            width: 100%;
        }
        /* New styling for active ability section title */
        .active-ability-section .popup-subtitle {
             margin-top: 15px; /* More space above this subtitle */
             margin-bottom: 10px; /* More space below this subtitle */
             font-size: 1.2em; /* Slightly smaller than main subtitle */
             color: #b39ddb; /* Lighter purple for consistency */
        }

        .ability-row {
            display: flex;
            flex-direction: row;
            gap: 10px; /* Reduced gap */
            justify-content: center;
            align-items: stretch;
            flex-wrap: wrap; /* Allows items to wrap onto next line */
        }

        .ability-option-half {
            flex: 1;
            min-width: 125px; /* Reduced by ~15% from 150px */
            max-width: 160px; /* Reduced by ~15% from 190px */
            background-color: #2a1a45;
            border: 2px solid #4a1c87;
            border-radius: 10px; /* Slightly reduced border radius */
            padding: 5px; /* Reduced padding */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease, border-color 0.2s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4); /* Reduced shadow */
            text-align: center;
        }
        .ability-option-half:hover {
            background-color: #3e2860;
            transform: translateY(-2px); /* Slight lift */
            border-color: #6200ff;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.6);
        }

        .decline-option-button {
            flex-basis: 45px; /* Reduced by 10% from 50px */
            flex-shrink: 0;
            background-color: #8B0000;
            border: 2px solid #FF0000;
            border-radius: 10px;
            padding: 5px; /* Reduced padding */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease, border-color 0.2s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
        }
        .decline-option-button:hover {
            background-color: #CD0000;
            transform: translateY(-2px);
            border-color: #FF4500;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.6);
        }
        .decline-option-button .fat-x {
            font-size: 2.2em; /* Reduced X size further */
            font-weight: bold;
            color: #FFF;
            line-height: 1;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
        }
        .decline-option-button .decline-text {
            font-size: 0.65em; /* Reduced text size further */
            font-weight: normal;
            color: #FFF;
            margin-top: 2px; /* Reduced margin */
        }


        .ability-name {
            font-size: 1em; /* Reduced font size */
            font-weight: bold;
            color: #9c27b0;
            margin-bottom: 2px; /* Reduced margin from 5px to 2px */
            margin-top: 2px; /* Added margin-top to reduce overall vertical space */
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .stat-details {
            text-align: center;
            width: 100%;
            margin-top: auto;
            padding-top: 5px; /* Reduced padding */
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1;
        }
        /* Specific styles for stat-details within passive ability options */
        .healing-popup .ability-option-half .stat-details {
            border-top: none; /* Remove the line */
            padding-top: 0;   /* Remove padding above the stats */
            margin-top: 5px; /* Add a small margin to separate from title */
        }
        .stat-line {
            font-size: 0.75em; /* Reduced font size */
            color: #d1c4e9;
            margin-bottom: 2px; /* Reduced margin */
        }
        .stat-change-positive {
            font-weight: bold;
            color: #00ff00;
        }
        .stat-change-negative {
            font-weight: bold;
            color: #ff4500;
        }
        .stat-name-bold-orange {
            font-weight: bold;
            color: #FF8C00;
        }
        /* Removed passive-description-text style as the element is removed from template */


        /* DNA Emoji as background */
        .dna-background {
            position: absolute;
            font-size: 120px; /* Reduced size */
            opacity: 0;
            color: #7b1fa2;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            user-select: none;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .ability-option-half:hover .dna-background {
            opacity: 0.2;
        }
        .selected-passive .dna-background { /* New style for selected passive */
            opacity: 0.2 !important; /* Force visibility */
        }
        .disabled-dna-hover .dna-background { /* For unselected passive options after choice */
            opacity: 0 !important; /* Force hidden */
            transition: none !important; /* Disable hover effect */
        }
        .flipped-dna {
            transform: translate(-50%, -50%) scaleY(-1);
        }
        .ability-option-already-selected {
            opacity: 0.45;
            cursor: not-allowed !important;
            pointer-events: none;
            position: relative;
        }
        .ability-option-already-selected::after {
            content: '(Already Selected)';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85em;
            font-weight: 600;
            color: #ccc;
            background: rgba(0, 0, 0, 0.45);
            border-radius: inherit;
            letter-spacing: 0.5px;
            pointer-events: none;
        }


        @keyframes popupAppear {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Admin Panel Specific Styles */
        .admin-panel {
            background-color: #2a1a45; /* Dark purple, similar to ability options */
            color: #eee;
            padding: 15px; /* Reduced padding */
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.7);
            text-align: center;
            max-width: 600px; /* Wider for stats */
            width: 95%; /* Responsive width */
            display: flex; /* Use flexbox for internal layout */
            flex-direction: column;
            gap: 10px; /* Reduced space between sections */
            border: 2px solid #6a0dad; /* Purple border */
            position: relative; /* For close button absolute positioning */
            max-height: 90vh; /* Max height to allow scrolling */
            overflow-y: auto; /* Enable vertical scrolling */
        }

        .admin-panel-title {
            font-size: 1.8em;
            font-weight: bold;
            color: #FF8C00;
            margin-bottom: 10px; /* Reduced margin */
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }

        .admin-section {
            background-color: #3e2860; /* Slightly lighter purple for sections */
            border-radius: 10px;
            padding: 10px;
            border: 1px solid #4a1c87;
        }

        .admin-section h3 {
            font-size: 1.2em;
            color: #b39ddb; /* Lighter purple */
            margin-top: 0;
            margin-bottom: 8px; /* Reduced margin */
        }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); /* Adjusted minmax for more condensation */
            gap: 8px; /* Reduced gap */
        }

        .admin-stat-item, .admin-ability-item {
            display: flex; /* Changed to flex */
            flex-direction: column; /* Stack label, then input/buttons */
            align-items: flex-start;
            text-align: left;
            background-color: #4a1c87;
            padding: 6px;
            border-radius: 8px;
            border: 1px solid #6200ff;
        }

        .admin-ability-item { /* Specific style for ability items */
            border-color: #FF8C00; /* Orange border */
        }

        .admin-stat-item label, .admin-ability-item label {
            font-size: 0.85em; /* Slightly smaller font */
            color: #d1c4e9;
            margin-bottom: 3px; /* Reduced margin */
            text-transform: capitalize; /* Capitalize the first letter of labels */
        }

        .admin-input-row { /* New container for input and buttons */
            display: flex;
            align-items: center;
            gap: 4px; /* Small gap between input and buttons */
            width: 100%; /* Make this row take full width */
        }
        /* Specific styling for level buttons container */
        .admin-level-buttons {
            display: flex;
            gap: 4px; /* Gap between level buttons */
            width: 100%;
            justify-content: space-around; /* Distribute buttons evenly */
        }
        /* Styling for individual level buttons */
        .admin-level-button {
            background-color: #6a0dad;
            color: white;
            border: 1px solid #9932CC;
            border-radius: 5px;
            padding: 4px 8px;
            font-size: 0.8em; /* Smaller font for level numbers */
            cursor: pointer;
            transition: background-color 0.1s ease, border-color 0.1s ease;
            flex-grow: 1; /* Make buttons grow to fill space */
            text-align: center;
            min-width: 20px; /* Minimum width for very small screens */
        }
        .admin-level-button.selected {
            background-color: #9932CC;
            border-color: #6200ff;
            box-shadow: 0 0 5px rgba(98, 0, 255, 0.5);
        }
        .admin-level-button:hover:not(.selected) {
            background-color: #8a0dbd;
        }

        .admin-stat-item input, .admin-ability-item input {
            flex-grow: 1; /* Allow input to take available space */
            width: 66%; /* Explicitly set to 2/3 */
            max-width: 66%; /* Ensure it doesn't grow beyond 2/3 */
            min-width: 0; /* Allow shrinking */
            padding: 4px 6px;
            border: 1px solid #9c27b0;
            border-radius: 5px;
            background-color: #1a0f2b;
            color: #00ff00;
            font-family: 'Inter', sans-serif;
            font-size: 0.9em;
            box-sizing: border-box;
            text-align: center;
        }

        .admin-stat-item input:focus, .admin-ability-item input:focus {
            outline: none;
            border-color: #6200ff;
            box-shadow: 0 0 5px rgba(98, 0, 255, 0.5);
        }

        .admin-panel-button { /* Style for +/- buttons */
            background-color: #6a0dad; /* Darker purple */
            color: white;
            border: 1px solid #9932CC;
            border-radius: 5px;
            width: 17%; /* Distribute remaining space - (100-66)/2 = 17 */
            height: 25px; /* Fixed height for buttons */
            font-size: 1.2em; /* Bigger font for +/- */
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.1s ease, border-color 0.1s ease;
            flex-shrink: 0; /* Prevent buttons from shrinking */
        }

        .admin-panel-button:hover {
            background-color: #9932CC;
            border-color: #6200ff;
        }

        .admin-close-button {
            background-color: #8B0000;
            color: white;
            border: 2px solid #FF0000;
            border-radius: 10px;
            padding: 8px 15px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease, border-color 0.2s ease;
            margin-top: 15px;
            align-self: center; /* Center the button in flex column */
        }

        .admin-close-button:hover {
            background-color: #CD0000;
            transform: translateY(-2px);
            border-color: #FF4500;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .game-container {
                padding: 15px;
            }
            .healing-popup {
                padding: 10px; /* Further reduced for smaller screens */
                gap: 8px;
                max-width: 98%; /* Further restrict max-width */
            }
            .ability-row {
                flex-direction: column;
                gap: 8px;
            }
            .ability-option-half {
                padding: 8px;
                min-width: unset;
                max-width: 100%;
            }
            .ability-name {
                font-size: 1em;
            }
            .stat-line {
                font-size: 0.7em;
            }
            .dna-background {
                font-size: 100px;
            }
            .decline-option-button {
                flex-basis: 100%;
                height: 45px;
                padding: 6px;

                applyBoost: (boost1, boost2) => {

                    return previewLines;
                }
            }
        ];
        // Controls how steeply spawn probability falls off with level distance from the player.
        // 0.1 = each level away is 10× less likely. Lower = sharper drop-off, higher = flatter spread.
        const NPC_SPAWN_DECAY = 0.44; // ~5% chance of L1 NPC at max level. Lower = tighter cluster, higher = more variety.

        // Returns the NPC level to use when spawning a replacement.
        // The "center" of the distribution is the player's level plus fractional progress toward
        // the next level (up to +0.7), so the mix shifts gradually rather than snapping at thresholds.
        // Any NPC level can technically spawn; probability just decays exponentially with distance.
        function getSpawnableNpcLevel() {
            const level = playerStats.playerLevel;
            const xp    = playerStats.currentXp;

            // Linear progress within the current level (0–1)
            const startXp = XP_THRESHOLDS[level - 1] || 0;
            const endXp   = XP_THRESHOLDS[level];
            const progress = Number.isFinite(endXp)
                ? Math.min(1, (xp - startXp) / (endXp - startXp))
                : 0;

            // Spawn center shifts up to 0.7 levels ahead of the player as they near the threshold
            const center = level + progress * 0.7;

            // Build a weight for each NPC level: exponential drop-off with distance from center.
            // Hard-cap the upper range: any level ≥ playerLevel+2 gets weight 0, making it
            // statistically impossible (<1 in 100) for an enemy 2+ levels above the player to spawn.
            const weights = [];
            for (let n = 1; n <= MAX_PLAYER_LEVEL; n++) {
                const w = (n >= level + 2) ? 0 : Math.pow(NPC_SPAWN_DECAY, Math.abs(n - center));
                weights.push(w);
            }

            // Weighted random pick
            const total = weights.reduce((sum, w) => sum + w, 0);
            let rand = Math.random() * total;
            for (let n = 1; n <= MAX_PLAYER_LEVEL; n++) {
                rand -= weights[n - 1];
                if (rand <= 0) return n;
            }
            return MAX_PLAYER_LEVEL;
        }

        function generateLootBonus(statKey, playerLevel) {

        // --- Canvas Resizing Logic ---
        function resizeCanvas() {

            const viewportUsableHeight = window.innerHeight;

            let newCanvasWidth = viewportUsableWidth;
            let newCanvasHeight = viewportUsableWidth / desiredAspectRatio;

            if (newCanvasHeight > viewportUsableHeight) {
                newCanvasHeight = viewportUsableHeight;
                newCanvasWidth = viewportUsableHeight * desiredAspectRatio;
            }

            const minCanvasDisplayWidth = 320;
            const minCanvasDisplayHeight = minCanvasDisplayWidth / desiredAspectRatio;

            if (newCanvasWidth < minCanvasDisplayWidth) {
                newCanvasWidth = minCanvasDisplayWidth;
                newCanvasHeight = minCanvasDisplayHeight;
            }

            canvas.width = newCanvasWidth;
            canvas.height = newCanvasHeight;

            canvas.style.height = `${newCanvasHeight}px`;

            gameContainer.style.width = `${newCanvasWidth + (2 * containerPadding)}px`;
            gameContainer.style.height = `${newCanvasHeight + (2 * containerPadding)}px`;

        // --- Drawing Functions ---
        function generateForestElements() {

                const size = 20 + Math.random() * 50;
                const color = `rgba(60, 118, 59, ${0.4 + Math.random() * 0.2})`;
                forestElements.push({ type: 'rect', x, y, width: size, height: size, color });
            }

            // Generate foliage patches in clusters — player can hide inside these
            foliagePatches = [];
            const numClusters = 6;
            for (let c = 0; c < numClusters; c++) {
                const clusterX = 200 + Math.random() * (worldWidth - 400);
                const clusterY = 200 + Math.random() * (worldHeight - 400);
                const patchCount = 4 + Math.floor(Math.random() * 3); // 4–6 per cluster
                for (let p = 0; p < patchCount; p++) {
                    const angle = Math.random() * Math.PI * 2;
                    const spread = (60 + Math.random() * 100) * Math.random();
                    const cx = clusterX + Math.cos(angle) * spread;
                    const cy = clusterY + Math.sin(angle) * spread;
                    // Varied shapes: wide, tall, or squarish
                    let pw, ph;
                    const shapeRoll = Math.random();
                    if (shapeRoll < 0.33) {
                        pw = 130 + Math.random() * 90; ph = 35 + Math.random() * 25; // wide strip
                    } else if (shapeRoll < 0.66) {
                        pw = 35 + Math.random() * 25; ph = 110 + Math.random() * 70; // tall strip
                    } else {
                        const s = 65 + Math.random() * 75;
                        pw = s; ph = s * (0.7 + Math.random() * 0.6);               // squarish blob
                    }
                    foliagePatches.push({ x: cx - pw / 2, y: cy - ph / 2, w: pw, h: ph });
                }
            }
        }

        function renderForestBackground() {
            ctx.fillStyle = '#22572a';
            ctx.fillRect(0, 0, worldWidth, worldHeight);

            forestElements.forEach(element => {
                if (element.type === 'rect') {
                    ctx.fillStyle = element.color;
                    ctx.fillRect(element.x, element.y, element.width, element.height);
                }
            });

            // Foliage patch base layer — drawn below the player (dense undergrowth floor)
            foliagePatches.forEach(p => {
                ctx.fillStyle = 'rgba(18, 62, 24, 0.88)';
                ctx.fillRect(p.x, p.y, p.w, p.h);
            });
        }

        // --- NPC Pathing Generation Functions ---
        function generateLinePath(centerX, centerY, radius) {
            const startX = centerX - radius;
            const endX = centerX + radius;
            return [{ x: startX, y: centerY }, { x: endX, y: centerY }];
        }

        function generateCirclePath(centerX, centerY, radius, numSegments = 8) {
            const waypoints = [];
            for (let i = 0; i < numSegments; i++) {
                const angle = (i / numSegments) * Math.PI * 2;
                const x = centerX + radius * Math.cos(angle);
                const y = centerY + radius * Math.sin(angle);
                waypoints.push({ x, y });
            }
            return waypoints;
        }

        function generatePolygonPath(centerX, centerY, radius, minVertices = 3, maxVertices = 6) {
            const numVertices = Math.floor(Math.random() * (maxVertices - minVertices + 1)) + minVertices;
            const waypoints = [];
            for (let i = 0; i < numVertices; i++) {
                const angle = Math.random() * Math.PI * 2; // Random angle for irregular polygon
                const currentRadius = radius * (0.8 + Math.random() * 0.2); // Vary radius slightly
                const x = centerX + currentRadius * Math.cos(angle);
                const y = centerY + currentRadius * Math.sin(angle);
                waypoints.push({ x, y });
            }
            return waypoints;
        }

        function createSingleNPC(level = 1) {
            const baseStats = PLAYER_LEVEL_STATS[level];
            if (!baseStats) {
                console.error(`Cannot create NPC: No stats found for player level ${level}`);
                return; 
            }
        
            let finalName, finalEmoji, geneticOrigin = null, finalRotation; // CHANGED: Added finalRotation
            let npcAbilities = {};
        
            const getRandomStatMultiplier = () => (Math.random() * 0.5) + 0.7;
            let finalHp = Math.round(baseStats.maxHp * getRandomStatMultiplier());
            let finalAttack = Math.round(baseStats.attack * getRandomStatMultiplier());
            let finalDefense = Math.round(baseStats.defense * getRandomStatMultiplier());
            let finalStamina = Math.round(baseStats.stamina * getRandomStatMultiplier());
            let finalStealth = Math.round(baseStats.stealth * getRandomStatMultiplier());
            let finalSpeed = Math.round(baseStats.speed * getRandomStatMultiplier());
        
            if (level >= 2) {
                // Level 2+ NPCs are genetic mutants — same icons the player can select
                geneticOrigin = geneticOrigins[Math.floor(Math.random() * geneticOrigins.length)];

                const levelDescriptor = LEVEL_DESCRIPTIONS[level - 1] || 'Unknown';
                finalName = `${geneticOrigin.name} ${levelDescriptor}`;
                finalEmoji = geneticOrigin.emoji;
                finalRotation = -Math.PI / 2 + geneticOrigin.rotation;

                if (geneticOrigin.startingAbilityKey) {
                    npcAbilities[geneticOrigin.startingAbilityKey] = 1;
                }

                if (geneticOrigin.bonusStats) {
                    if (geneticOrigin.bonusStats.maxHp) finalHp = Math.round(finalHp * (1 + geneticOrigin.bonusStats.maxHp));
                    if (geneticOrigin.bonusStats.attack) finalAttack = Math.round(finalAttack * (1 + geneticOrigin.bonusStats.attack));
                    if (geneticOrigin.bonusStats.defense) finalDefense = Math.round(finalDefense * (1 + geneticOrigin.bonusStats.defense));
                    if (geneticOrigin.bonusStats.stamina) finalStamina = Math.round(finalStamina * (1 + geneticOrigin.bonusStats.stamina));
                    if (geneticOrigin.bonusStats.stealth) finalStealth = Math.round(finalStealth * (1 + geneticOrigin.bonusStats.stealth));
                    if (geneticOrigin.bonusStats.speed) finalSpeed = Math.round(finalSpeed * (1 + geneticOrigin.bonusStats.speed));
                }

            } else {
                // Level 1 NPCs are common creatures (bugs, spiders, butterflies)
                finalEmoji = npcEmojis[Math.floor(Math.random() * npcEmojis.length)];
                const speciesInfo = npcEmojiNames[finalEmoji] || { name: 'Creature', rotation: Math.PI / 2 };
                const levelDescriptor = LEVEL_DESCRIPTIONS[level - 1] || 'Unknown';
                finalName = `${speciesInfo.name} ${levelDescriptor}`;
                finalRotation = speciesInfo.rotation;
            }
        
            const minNpcNpcDistance = 300;
            let newNpcX, newNpcY;
            let validSpawn = false;
            let attempts = 0;
            const maxAttempts = 100;
        
            const screenBuffer = 100;
            const playerViewWorldX_min = cameraX - screenBuffer;
            const playerViewWorldX_max = cameraX + (canvas.width / zoomScale) + screenBuffer;
            const playerViewWorldY_min = cameraY - screenBuffer;
            const playerViewWorldY_max = cameraY + (canvas.height / zoomScale) + screenBuffer;
        
            while (!validSpawn && attempts < maxAttempts) {
                newNpcX = Math.random() * worldWidth;
                newNpcY = Math.random() * worldHeight;
        
                const distToPlayer = Math.sqrt(Math.pow(newNpcX - playerX, 2) + Math.pow(newNpcY - playerY, 2));
                if (distToPlayer < 700) {
                    attempts++;
                    continue;
                }
        
                const isInsidePlayerView = (
                    newNpcX + npcSize / 2 > playerViewWorldX_min &&
                    newNpcX - npcSize / 2 < playerViewWorldX_max &&
                    newNpcY + npcSize / 2 > playerViewWorldY_min &&
                    newNpcY - npcSize / 2 < playerViewWorldY_max
                );
        
                if (isInsidePlayerView) {
                    attempts++;
                    continue;
                }
        
                let tooCloseToOtherNpc = false;
                for (const existingNpc of npcs) {
                    const distFromOtherNpc = Math.sqrt(Math.pow(newNpcX - existingNpc.x, 2) + Math.pow(newNpcY - existingNpc.y, 2));
                    if (distFromOtherNpc < minNpcNpcDistance) {
                        tooCloseToOtherNpc = true;
                        break;
                    }
                }
        
                if (!tooCloseToOtherNpc) {
                    validSpawn = true;
                }
                attempts++;
            }
        
            if (!validSpawn) {
                console.warn("Could not find a valid spawn location for NPC after multiple attempts. Spawning randomly within world.");
                newNpcX = Math.random() * worldWidth;
                newNpcY = Math.random() * worldHeight;
            }
        
            newNpcX = Math.max(npcSize / 2, Math.min(newNpcX, worldWidth - npcSize / 2));
            newNpcY = Math.max(npcSize / 2, Math.min(newNpcY, worldHeight - npcSize / 2));
        
            const pathingTypes = ['line', 'circle', 'polygon'];
            const pathingType = pathingTypes[Math.floor(Math.random() * pathingTypes.length)];
            const patrolRadius = 75 + Math.random() * 50;
            let patrolWaypoints = [];
        
            if (pathingType === 'line') {
                patrolWaypoints = generateLinePath(newNpcX, newNpcY, patrolRadius);
            } else if (pathingType === 'circle') {
                patrolWaypoints = generateCirclePath(newNpcX, newNpcY, patrolRadius, 8);
            } else if (pathingType === 'polygon') {
                patrolWaypoints = generatePolygonPath(newNpcX, newNpcY, patrolRadius, 3, 6);
            }
        
            patrolWaypoints.forEach(waypoint => {
                waypoint.x = Math.max(npcSize / 2, Math.min(waypoint.x, worldWidth - npcSize / 2));
                waypoint.y = Math.max(npcSize / 2, Math.min(waypoint.y, worldHeight - npcSize / 2));
            });
        
            return {
                level: level,
                id: ++npcIdCounter,
                name: finalName,
                x: newNpcX,
                y: newNpcY,
                size: npcSize,
                radius: npcRadius,

                rotation: finalRotation,
                combatTarget: null,
                geneticOrigin: geneticOrigin,
                abilities: npcAbilities,
                currentHp: finalHp,
                maxHp: finalHp,
                attack: finalAttack,
                defense: finalDefense,
                stamina: finalStamina,
                stealth: finalStealth,
                speed: finalSpeed,
                patrolWaypoints: patrolWaypoints,
                pathingType: (level >= 2 || geneticOrigin) ? 'roam' : pathingType,
                currentPatrolPointIndex: 0,
                patrolDirection: 1,
                patrolTargetX: patrolWaypoints.length > 0 ? patrolWaypoints[0].x : newNpcX,
                patrolTargetY: patrolWaypoints.length > 0 ? patrolWaypoints[0].y : newNpcY,

                totalDamageReceivedFromPlayer: 0,
                dashedThrough: false,
                lastAttackTime: 0,
                attackCooldown: 500,

                attackAnimStartTime: 0
            };
        }
        function generateNPCs() {
            npcs = [];
            const numNPCsToGenerate = 3;
            for (let i = 0; i < numNPCsToGenerate; i++) {
                npcs.push(createSingleNPC(1));

        function lerp(a, b, t) {
            return a + (b - a) * Math.max(0, Math.min(1, t));
        }

        // New function for circle-to-circle collision
        function checkCircleCollision(x1, y1, r1, x2, y2, r2) {
            const dx = x1 - x2;
            const dy = y1 - y2;
            const distance = Math.sqrt(dx * dx + dy * dy);
            return distance < (r1 + r2);
        }

        /**
         * Normalizes an angle to be between -PI and PI.
         * @param {number} angle The angle in radians.
         * @returns {number} The normalized angle.
         */
        function normalizeAngle(angle) {
            return Math.atan2(Math.sin(angle), Math.cos(angle));
        }

        // --- NPC AI Helpers ---

        function returnToPatrol(npc) {
            npc.state = 'patrol';
            npc.aggroTarget = null;
            npc.inCombat = false;
            npc.loseInterestAt = 0;
            // Level 1 NPCs snap back to their nearest patrol waypoint
            if (npc.level === 1 && npc.patrolWaypoints.length > 0) {
                let nearestIdx = 0, nearestDist = Infinity;
                npc.patrolWaypoints.forEach((wp, i) => {
                    const d = Math.sqrt((wp.x - npc.x) ** 2 + (wp.y - npc.y) ** 2);
                    if (d < nearestDist) { nearestDist = d; nearestIdx = i; }
                });
                npc.currentPatrolPointIndex = nearestIdx;
                npc.patrolTargetX = npc.patrolWaypoints[nearestIdx].x;
                npc.patrolTargetY = npc.patrolWaypoints[nearestIdx].y;
            }
            // Level 2 NPCs continue roaming from current position (no reset needed)
        }

        function enterChase(npc, target) {
            npc.state = 'chasing';
            npc.aggroTarget = target; // 'player' string or NPC object
            npc.inCombat = true;
            const duration = npc.level >= 2
                ? 3000 + Math.random() * 2000   // 3–5 s for level 2+
                : 1000 + Math.random() * 2000;  // 1–3 s for level 1
            npc.loseInterestDuration = duration;
            npc.loseInterestAt = performance.now() + duration;
        }

        // Lightweight NPC-vs-NPC damage (no floating text, no player stat tracking)
        function dealDamageNpcToNpc(attacker, defender) {
            let damage = attacker.attack - defender.defense;
            damage = damage > 0 ? Math.max(0.1, damage) : 0;
            damage = Math.round(damage * 10) / 10;
            defender.currentHp = Math.max(0, Math.round((defender.currentHp - damage) * 10) / 10);
        }

        function dealDamage(attacker, defender, currentTime) {
            // 1. Calculate raw damage with flat defense subtraction.
            let effectiveDamage = attacker.attack - defender.defense;

            // 2. If positive damage, floor it at 0.1; otherwise no damage is dealt.
            if (effectiveDamage > 0) {
                effectiveDamage = Math.max(0.1, effectiveDamage);
            } else {
                effectiveDamage = 0;
            }

            // 3. Round to one decimal place for clean numbers.
            effectiveDamage = Math.round(effectiveDamage * 10) / 10;
        
            const actualHpReduction = Math.min(effectiveDamage, defender.currentHp);
        
            // 5. *** THE CORE BUG FIX ***
            //    Apply damage directly to the correct object by checking the 'isPlayer' tag.
            if (defender.isPlayer) {
                playerStats.currentHp -= effectiveDamage;
                playerStats.currentHp = Math.max(0, Math.round(playerStats.currentHp * 10) / 10);
            } else {
                defender.currentHp -= effectiveDamage;
                defender.currentHp = Math.max(0, Math.round(defender.currentHp * 10) / 10);
            }
        
            const isKillingBlow = defender.currentHp <= 0;
            const duration = isKillingBlow ? 1000 : 500;
            let textX, textY;
        
            // When the player damages an NPC, make that NPC aggro the player
            if (attacker.isPlayer && !defender.isPlayer) {
                if (defender.state === 'patrol') {
                    enterChase(defender, 'player');
                } else if (defender.state === 'chasing' || defender.state === 'combat') {
                    // Refresh lose-interest timer and redirect aggro to player
                    defender.aggroTarget = 'player';
                    defender.loseInterestAt = currentTime + defender.loseInterestDuration;
                }
            }

            if (attacker.isPlayer) {
                // This part for Player attacking NPC is fully preserved.
                defender.totalDamageReceivedFromPlayer += actualHpReduction;
                const anglePlayerToNpc = Math.atan2(defender.y - attacker.y, defender.x - attacker.x);
                const offsetDistance = defender.radius + 15;
                textX = defender.x + Math.cos(anglePlayerToNpc + Math.PI) * offsetDistance;
                textY = defender.y + Math.sin(anglePlayerToNpc + Math.PI) * offsetDistance;
        
                floatingDamageTexts.push({
                    value: actualHpReduction.toFixed(1),
                    x: textX, y: textY, color: 'yellow',
                    timestamp: performance.now(), duration: duration, floatDuration: duration
                });
        
            } else { // NPC is attacker, player is defender
                attacker.totalDamageDealtToPlayer += actualHpReduction;
        
                // This part now correctly uses playerX/playerY for text position.
                const angleNpcToPlayer = Math.atan2(playerY - attacker.y, playerX - attacker.x);
                const offsetDistance = playerRadius + 15;
                textX = playerX + Math.cos(angleNpcToPlayer + Math.PI) * offsetDistance;
                textY = playerY + Math.sin(angleNpcToPlayer + Math.PI) * offsetDistance;
        
                floatingDamageTexts.push({
                    value: actualHpReduction.toFixed(1),
                    x: textX, y: textY, color: 'red',
                    timestamp: currentTime, duration: duration, floatDuration: duration
                });
            }
        }

        function reducePlayerHunger(xpGained) {
            let hungerDivisor = 1;
            // Determine the divisor based on the player's current level
            switch (playerStats.playerLevel) {
                case 2:
                    hungerDivisor = 10;
                    break;
                case 3:
                    hungerDivisor = 100;
                    break;
                case 4:
                    hungerDivisor = 1000;
                    break;
            }
        
            const hungerReduced = xpGained / hungerDivisor;
            playerStats.currentHunger = Math.max(0, playerStats.currentHunger - hungerReduced);
        }

        function endBurrow() {
            if (!isBurrowing) return;

            isBurrowing = false;
            canMoveFreeLy = false; // Player is briefly immobilized after unburrowing
            showTargetIndicator = false; // Clear target indicator on unburrow

            playerVisualScale = 1.5; // Short visual flourish
            setTimeout(() => {
                playerVisualScale = 1;
                setTimeout(() => {
                    canMoveFreeLy = true;
                }, postMovementImmobilityDuration);
            }, 100);

            // Lv2: burst damage to all NPCs within emerge radius on unburrow
            if (playerAbilities.burrow >= 2) {
                const emergeTime = performance.now();
                npcs.forEach(npc => {
                    const dist = Math.sqrt(Math.pow(npc.x - playerX, 2) + Math.pow(npc.y - playerY, 2));
                    if (dist <= BURROW_LV2_EMERGE_RADIUS + npc.radius) {
                        dealDamage({ attack: playerStats.attack, isPlayer: true, x: playerX, y: playerY, radius: playerRadius }, npc, emergeTime);
                    }
                });
            }

            // Check for collision with NPCs on unburrow
            let foundNpcToTarget = null;
            for (const npc of npcs) {
                if (checkCircleCollision(playerX, playerY, playerRadius, npc.x, npc.y, npc.radius)) {
                    foundNpcToTarget = npc;
                    break; // Target the first one found
                }
            }

            if (foundNpcToTarget) {
                targetedNpc = foundNpcToTarget;
                isMoving = true; // Player will attempt to engage this target
                // showTargetIndicator is handled above, so not explicitly set here

                if (!inCombat || combatTarget !== targetedNpc) { // Initiate combat if not already in combat with this target
                    inCombat = true;
                    combatTarget = targetedNpc;
                    combatTarget.inCombat = true;
                    determineFirstAttackerAndSetTimers({ x: playerX, y: playerY, directionAngle: playerDirectionAngle, isPlayer: true }, combatTarget);
                }
            } else {
                // Restore pre-ability target if one was saved and is still alive
                const resumeTarget = targetedNpc || preAbilityTarget;
                if (resumeTarget && npcs.includes(resumeTarget) && resumeTarget.currentHp > 0) {
                    targetedNpc = resumeTarget;
                    isMoving = true;
                } else {
                    targetedNpc = null;
                }
            }
            preAbilityTarget = null;

            // Update player direction based on mouse when unburrowing (ending burrow)
            const currentMouseWorldX = lastMouseCanvasX / zoomScale + cameraX;
            const currentMouseWorldY = lastMouseCanvasY / zoomScale + cameraY;
            playerDirectionAngle = Math.atan2(currentMouseWorldY - playerY, currentMouseWorldX - playerX);
        }

        function endTremorSense() {
            if (!isTremorSenseActive) return;
            isTremorSenseActive = false;
            startCooldown('tremorSense');
        }

        // New function to stop Dash early
        function endDash() {
            if (!isPerformingMovementAbility || lastActivatedAbilityRef !== 'dash') return;

            isPerformingMovementAbility = false;
            canMoveFreeLy = true; // Player is immediately able to move
            showTargetIndicator = false; // Hide the 'X'
            playerVisualScale = 1; // Reset scale if it was changed
            npcs.forEach(npc => npc.dashedThrough = false); // Reset dash-through status
            startCooldown('dash'); // Apply cooldown for early termination
            lastActivatedAbilityRef = null;

            // Resume targeting if a target was active before the dash
            const resumeTarget = targetedNpc || preAbilityTarget;
            if (resumeTarget && npcs.includes(resumeTarget) && resumeTarget.currentHp > 0) {
                targetedNpc = resumeTarget;
                isMoving = true;
            }
            preAbilityTarget = null;
        }


        // New global variables for hunger mechanic
        let lastHungerIncreaseTime = 0;
        const HUNGER_INCREASE_INTERVAL = 5000; // 5 seconds

        /**
         * Determines which character (player or NPC) has the first strike advantage
         * based on their orientation towards the opponent. Sets their initial attack timers.
         * @param {object} playerObj The player object (with x, y, directionAngle, isPlayer:true).
         * @param {object} npcObj The combat target NPC object (with x, y, directionAngle).
         */
        function determineFirstAttackerAndSetTimers(playerObj, npcObj) {
            const currentTime = performance.now();

            // Angle from player to NPC
            const anglePlayerToNpc = Math.atan2(npcObj.y - playerObj.y, npcObj.x - playerObj.x);
            // Angle from NPC to player
            const angleNpcToPlayer = Math.atan2(playerObj.y - npcObj.y, playerObj.x - npcObj.x);

            // Calculate how "off" the player's current direction is from facing the NPC
            const playerOrientationDiff = Math.abs(normalizeAngle(playerObj.directionAngle - anglePlayerToNpc));
            // Calculate how "off" the NPC's current direction is from facing the player
            const npcOrientationDiff = Math.abs(normalizeAngle(npcObj.directionAngle - angleNpcToPlayer));

            // Player attacks first if their orientation is more direct OR if it's a tie
            if (playerOrientationDiff <= npcOrientationDiff) {
                playerLastAttackTime = currentTime;
                playerAttackCooldown = 0; // First attack is immediate
                npcObj.lastAttackTime = currentTime + FIRST_STRIKE_DELAY;
                npcObj.attackCooldown = 500; // Will be set to 500 after the first delayed attack
            } else {
                npcObj.lastAttackTime = currentTime;
                npcObj.attackCooldown = 0; // First attack is immediate
                playerLastAttackTime = currentTime + FIRST_STRIKE_DELAY;
                playerAttackCooldown = 500; // Will be set to 500 after the first delayed attack
            }
        }


        function update() {
            // Game logic for movement, AI, combat should run if NOT gameOver AND NOT adminPanel/originPanel
            // The loot menu (abilitySelectionPopup) should NOT pause game logic.
            const shouldRunGameLogic = gameState === 'inGame' && adminPanel.style.display !== 'flex' && originSelectionPopup.style.display !== 'flex';

            if (playerStats.currentHp <= 0 && gameState !== 'gameOver') {
                survivedTimeMs = gameStartTime > 0 ? performance.now() - gameStartTime : 0;
                gameOver = true;
                gameState = 'gameOver'; // Set game state to game over
                cancelAnimationFrame(animationFrameId); // Stop the animation loop
                return; // Stop further updates once game over
            }

            if (shouldRunGameLogic) {
                const currentTime = performance.now();

                // Hunger increase logic (always runs if inGame and not paused by specific panels)
                if (currentTime - lastHungerIncreaseTime >= HUNGER_INCREASE_INTERVAL) {
                    if (playerStats.currentHunger >= playerStats.maxHunger) {
                        const hpLoss = Math.round(playerStats.maxHp * 0.1 * 10) / 10;
                        playerStats.currentHp -= hpLoss;
                        playerStats.currentHp = Math.max(0, Math.round(playerStats.currentHp * 10) / 10);
                        floatingDamageTexts.push({
                            value: `-${hpLoss.toFixed(1)} HP`, // Display as HP loss
                            x: playerX,
                            y: playerY - playerSize, // Above player
                            color: 'red',
                            timestamp: currentTime,
                            duration: 1000, // Longer duration for hunger damage
                            floatDuration: 1000
                        });
                        // Check for game over after hunger damage
                        if (playerStats.currentHp <= 0) {
                            survivedTimeMs = gameStartTime > 0 ? performance.now() - gameStartTime : 0;
                            gameOver = true;
                            gameState = 'gameOver';
                            cancelAnimationFrame(animationFrameId);
                            return;
                        }
                    } else {
                        playerStats.currentHunger++;
                        // Hunger can now go below 1, so no Math.min here
                    }
                    lastHungerIncreaseTime = currentTime;
                }

                // Update attack animation state
                if (playerIsAttacking && (currentTime - playerAttackAnimStartTime >= ATTACK_ANIM_DURATION)) {
                    playerIsAttacking = false;
                }
                npcs.forEach(npc => {
                    if (npc.isAttacking && (currentTime - npc.attackAnimStartTime >= ATTACK_ANIM_DURATION)) {
                        npc.isAttacking = false;
                    }
                });


                if (isPerformingMovementAbility) {
                    const elapsedTime = currentTime - movementAbilityStartTime;
                    const progress = Math.min(1, elapsedTime / currentMovementAbilityDuration);

                    playerX = lerp(movementAbilityStartX, movementAbilityEndX, progress);
                    playerY = lerp(movementAbilityStartY, movementAbilityEndY, progress);

                    playerX = Math.max(playerSize / 2, Math.min(playerX, worldWidth - playerSize / 2));
                    playerY = Math.max(playerSize / 2, Math.min(playerY, worldHeight - playerSize / 2));

                    if (lastActivatedAbilityRef === 'pounce') { // Updated from jump
                        playerVisualScale = 1 + Math.sin(progress * Math.PI) * 0.5;
                    } else if (lastActivatedAbilityRef === 'dash') {
                        playerVisualScale = 1;
                        npcs.forEach(npc => {
                            if (!npc.dashedThrough && checkCircleCollision(playerX, playerY, playerRadius, npc.x, npc.y, npc.radius)) {
                                const dashDmgMult = playerAbilities.dash >= 2 ? DASH_LV2_DAMAGE_MULT : 1;
                                dealDamage({ attack: playerStats.attack * dashDmgMult, isPlayer: true, x: playerX, y: playerY, radius: playerRadius }, npc, currentTime); // Pass currentTime
                                npc.dashedThrough = true;
                                if (npc.currentHp <= 0) {
                                    const xpGained = NPC_XP_REWARDS[npc.level] || 0;
                                    playerStats.currentXp += xpGained;
                                    updatePlayerLevel();
                                
                                    // Hunger is reduced by the amount of XP gained, adjusted per level.
                                    reducePlayerHunger(xpGained);
                                    npcKillCount++;

                                    deadNpcs.push({
                                        level: npc.level,
                                        x: npc.x,
                                        y: npc.y,
                                        maxHp: npc.maxHp,
                                        id: npc.id,
                                        name: npc.name,
                                        emoji: npc.emoji,
                                        totalDamageDealtByPlayer: npc.totalDamageReceivedFromPlayer,
                                        totalDamageReceivedByPlayer: npc.totalDamageDealtToPlayer
                                    });
                                    npcs = npcs.filter(n => n !== npc);
                                    if (combatTarget === npc) {
                                        inCombat = false;
                                        combatTarget.inCombat = false;
                                        combatTarget = null;
                                        isMoving = false;
                                        showTargetIndicator = false;
                                        targetedNpc = null; // Clear target on death
                                    }
                                // Ensure new NPCs are spawned when one dies
                                    while (npcs.length < MAX_ENEMIES) {
                                        npcs.push(createSingleNPC(getSpawnableNpcLevel()));
                                    }
                                }
                            }
                        });
                    }

                    if (progress >= 1) {
                        isPerformingMovementAbility = false;
                        playerVisualScale = 1;
                        showTargetIndicator = false; // Clear target indicator after ability completion

                        if (lastActivatedAbilityRef === 'pounce') { // Updated from jump
                            postMovementImmobilityDuration = playerAbilities.pounce >= 2 ? POUNCE_LV2_POST_LAND_LOCK : 250;

                            // NEW: Check for collision with NPCs on pounce landing
                            let foundNpcToTarget = null;
                            for (const npc of npcs) {
                                if (checkCircleCollision(playerX, playerY, playerRadius, npc.x, npc.y, npc.radius)) {
                                    foundNpcToTarget = npc;
                                    break; // Target the first one found
                                }
                            }

                            if (foundNpcToTarget) {
                                // Lv2: deal impact damage on landing before combat starts
                                if (playerAbilities.pounce >= 2) {
                                    dealDamage({ attack: playerStats.attack * POUNCE_LV2_LAND_DAMAGE_MULT, isPlayer: true, x: playerX, y: playerY, radius: playerRadius }, foundNpcToTarget, currentTime);
                                }
                                targetedNpc = foundNpcToTarget;
                                isMoving = true; // Player will attempt to engage this target
                                // showTargetIndicator handled above
                                if (!inCombat || combatTarget !== targetedNpc) { // Initiate combat if not already in combat with this target
                                    inCombat = true;
                                    combatTarget = targetedNpc;
                                    combatTarget.inCombat = true;
                                    determineFirstAttackerAndSetTimers({ x: playerX, y: playerY, directionAngle: playerDirectionAngle, isPlayer: true }, combatTarget);
                                }
                            } else {
                                // Pounce missed — restore pre-ability target if still alive
                                const resumeTarget = preAbilityTarget;
                                if (resumeTarget && npcs.includes(resumeTarget) && resumeTarget.currentHp > 0) {
                                    targetedNpc = resumeTarget;
                                    isMoving = true;
                                } else {
                                    targetedNpc = null;
                                }
                            }

                        } else if (lastActivatedAbilityRef === 'dash') {
                            postMovementImmobilityDuration = 0;
                            npcs.forEach(npc => npc.dashedThrough = false);

                            // Resume targeting if a target was active before the dash
                            const resumeTarget = targetedNpc || preAbilityTarget;
                            if (resumeTarget && npcs.includes(resumeTarget) && resumeTarget.currentHp > 0) {
                                targetedNpc = resumeTarget;
                                isMoving = true;
                            }
                        }

                        preAbilityTarget = null;

                        if (postMovementImmobilityDuration > 0) {
                            setTimeout(() => {
                                canMoveFreeLy = true;
                            }, postMovementImmobilityDuration);
                        } else {
                            canMoveFreeLy = true;
                        }
                        lastActivatedAbilityRef = null;
                    }
                }
                else if (isBurrowing) {
                    if (currentTime - burrowStartTime >= burrowMaxDuration) {
                        endBurrow();
                    }
                }

                if (isTremorSenseActive && currentTime - tremorSenseStartTime >= TREMOR_SENSE_MAX_DURATION) {
                    endTremorSense();
                }

                // Update Spike Launch projectiles
                for (let i = spikeLaunchProjectiles.length - 1; i >= 0; i--) {
                    const spike = spikeLaunchProjectiles[i];
                    spike.x += Math.cos(spike.angle) * SPIKE_LAUNCH_SPEED;
                    spike.y += Math.sin(spike.angle) * SPIKE_LAUNCH_SPEED;
                    spike.distanceTravelled += SPIKE_LAUNCH_SPEED;

                    if (spike.distanceTravelled >= SPIKE_LAUNCH_RANGE) {
                        spikeLaunchProjectiles.splice(i, 1);
                        continue;
                    }

                    let spikeHit = false;
                    for (const npc of npcs) {
                        if (checkCircleCollision(spike.x, spike.y, 4, npc.x, npc.y, npc.radius)) {
                            // 80% of post-defense melee damage: pass an attack value that produces (playerStats.attack - npc.defense) * 0.8 after dealDamage subtracts defense
                            const spikeAttack = playerStats.attack * SPIKE_LAUNCH_DAMAGE_MULT + npc.defense * (1 - SPIKE_LAUNCH_DAMAGE_MULT);
                            dealDamage({ attack: spikeAttack, isPlayer: true, x: spike.x, y: spike.y, radius: 4 }, npc, currentTime);
                            spikeLaunchProjectiles.splice(i, 1);
                            if (npc.currentHp <= 0) {
                                const xpGained = NPC_XP_REWARDS[npc.level] || 0;
                                playerStats.currentXp += xpGained;
                                updatePlayerLevel();
                                reducePlayerHunger(xpGained);
                                npcKillCount++;
                                deadNpcs.push({
                                    level: npc.level, x: npc.x, y: npc.y,
                                    maxHp: npc.maxHp, id: npc.id, name: npc.name, emoji: npc.emoji,
                                    totalDamageDealtByPlayer: npc.totalDamageReceivedFromPlayer,
                                    totalDamageReceivedByPlayer: npc.totalDamageDealtToPlayer
                                });
                                npcs = npcs.filter(n => n !== npc);
                                if (combatTarget === npc) {
                                    inCombat = false;
                                    combatTarget.inCombat = false;
                                    combatTarget = null;
                                    isMoving = false;
                                    showTargetIndicator = false;
                                    targetedNpc = null;
                                }
                                while (npcs.length < MAX_ENEMIES) {
                                    npcs.push(createSingleNPC(getSpawnableNpcLevel()));
                                }
                            }
                            spikeHit = true;
                            break;
                        }
                    }
                }

                if (isMoving && canMoveFreeLy) { // Regular movement
                    let destinationX, destinationY;
                    let stopMovingCondition = false;

                    let currentCalculatedPlayerSpeed = Math.max(0.1, basePlayerSpeed * (1 + playerStats.speed / 100));
                    if (isBurrowing) {
                        currentCalculatedPlayerSpeed *= playerAbilities.burrow >= 2 ? BURROW_LV2_SPEED_MULT : 0.5;
                    }
                    if (isTremorSenseActive) {
                        currentCalculatedPlayerSpeed *= 0.5;
                    }

                    if (targetedNpc) {
                        destinationX = targetedNpc.x;
                        destinationY = targetedNpc.y;
                        playerDirectionAngle = Math.atan2(destinationY - playerY, destinationX - playerX); // Constantly face NPC
                        stopMovingCondition = checkCircleCollision(playerX, playerY, playerRadius, targetedNpc.x, targetedNpc.y, targetedNpc.radius);

                        if (stopMovingCondition) { // Reached targeted NPC
                            if (!inCombat) { // If not already in combat, initiate it
                                inCombat = true;
                                combatTarget = targetedNpc;
                                combatTarget.inCombat = true;
                                determineFirstAttackerAndSetTimers({ x: playerX, y: playerY, directionAngle: playerDirectionAngle, isPlayer: true }, combatTarget);
                            }
                            isMoving = false; // Stop movement when combat starts
                            showTargetIndicator = false;
                        }
                    } else { // Moving to a specific point (right-click on empty space)
                        destinationX = targetX;
                        destinationY = targetY;
                        const distanceToTarget = Math.sqrt(Math.pow(destinationX - playerX, 2) + Math.pow(destinationY - playerY, 2));
                        stopMovingCondition = distanceToTarget < currentCalculatedPlayerSpeed;

                        if (stopMovingCondition) {
                            playerX = destinationX;
                            playerY = destinationY;
                            isMoving = false;
                            showTargetIndicator = false;
                        }
                    }

                    if (!stopMovingCondition) { // Continue moving if not stopped
                        const dx = destinationX - playerX;
                        const dy = destinationY - playerY;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        const ratio = currentCalculatedPlayerSpeed / distance;
                        playerX += dx * ratio;
                        playerY += dy * ratio;
                    }

                    // Clamp player position to world bounds
                    playerX = Math.max(playerSize / 2, Math.min(playerX, worldWidth - playerSize / 2));
                    playerY = Math.max(playerSize / 2, Math.min(playerY, worldHeight - playerSize / 2));
                }

                npcs.forEach(npc => {
                    if (npc.state === 'patrol') { // NPC patrols if not in combat
                        const currentCalculatedNpcSpeed = Math.max(0.1, baseNpcSpeed * (1 + npc.speed / 100));
                    
                        // This logic can fail if an NPC has no waypoints, so we'll add a check.
                        if (!npc.patrolTargetX || !npc.patrolTargetY) {
                            // If an NPC has no target (e.g. a roam NPC on its first frame), it does nothing this frame.
                            // It will generate a target on the next frame.
                        } else {
                            const dx = npc.patrolTargetX - npc.x;
                            const dy = npc.patrolTargetY - npc.y;
                            const distance = Math.sqrt(dx * dx + dy * dy);
                    
                            // Point the NPC toward its target if it's not already there
                            if (distance > currentCalculatedNpcSpeed) {
                                npc.directionAngle = Math.atan2(dy, dx);
                            }
                    
                            // --- Handle Pathing ---
                            if (distance < currentCalculatedNpcSpeed) { // If the NPC has reached its target...
                                if (npc.pathingType === 'roam') {
                                    // --- Roaming Logic for Elite NPCs ---
                                    const roamAngle = Math.random() * Math.PI * 2;
                                    const roamDistance = Math.random() * 1000; // Max distance of 1000
                    
                                    let newX = npc.x + Math.cos(roamAngle) * roamDistance;
                                    let newY = npc.y + Math.sin(roamAngle) * roamDistance;
                    
                                    newX = Math.max(npc.size / 2, Math.min(newX, worldWidth - npc.size / 2));
                                    newY = Math.max(npc.size / 2, Math.min(newY, worldHeight - npc.size / 2));
                    
                                    npc.patrolTargetX = newX;
                                    npc.patrolTargetY = newY;
                    
                                } else {
                                    // --- Standard Pathing Logic (Line, Circle, Polygon) ---
                                    if (npc.pathingType === 'line') {
                                        if (npc.currentPatrolPointIndex === npc.patrolWaypoints.length - 1) {
                                            npc.patrolDirection = -1;
                                        } else if (npc.currentPatrolPointIndex === 0) {
                                            npc.patrolDirection = 1;
                                        }
                                        npc.currentPatrolPointIndex += npc.patrolDirection;
                                    } else { // 'circle' or 'polygon'
                                        npc.currentPatrolPointIndex = (npc.currentPatrolPointIndex + 1) % npc.patrolWaypoints.length;
                                    }
                                    npc.patrolTargetX = npc.patrolWaypoints[npc.currentPatrolPointIndex].x;
                                    npc.patrolTargetY = npc.patrolWaypoints[npc.currentPatrolPointIndex].y;
                                }
                            } else {
                                // Move towards the current target
                                const ratio = currentCalculatedNpcSpeed / distance;
                                npc.x += dx * ratio;
                                npc.y += dy * ratio;
                            }
                        }
                    
                        // Clamp NPC position to world bounds every frame for safety
                        npc.x = Math.max(npc.size / 2, Math.min(npc.x, worldWidth - npc.size / 2));
                        npc.y = Math.max(npc.size / 2, Math.min(npc.y, worldHeight - npc.size / 2));
                    }
                });

                // --- Check if player is inside a foliage patch (center-based AABB) ---
                isInFoliage = foliagePatches.some(p =>
                    playerX > p.x && playerX < p.x + p.w &&
                    playerY > p.y && playerY < p.y + p.h
                );

                // --- Update currentStealthFactor (0.0–1.0) ---
                {
                    const baseStealthFactor = playerStats.stealth / 100;
